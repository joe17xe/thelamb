<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les veilleurs — mille ans d'annonces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e18;--bg2:#11141f;--ink:#e9e3d3;--muted:#9a94a8;--gold:#d3a94f;--line:#23273a;--crimson:#a33;
    --loi:#c98a5e;--royaume:#d3a94f;--exil:#6b9bd8;--retour:#7cb47c;--attente:#a583d6;--christ:#d05c5c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,serif;line-height:1.6}
  html[dir="rtl"] body{font-family:'Amiri',serif;line-height:1.9}
  .display{font-family:'Cormorant Garamond',serif;font-weight:500}
  html[dir="rtl"] .display{font-family:'Amiri',serif;font-weight:700}
  .ui{font-family:system-ui,sans-serif}
  .top{max-width:1160px;margin:0 auto;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
  .brand{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.34em;color:var(--gold)}
  .langs{display:flex;gap:6px}
  .langs button{font-family:system-ui,sans-serif;font-size:12px;background:none;border:1px solid var(--line);border-radius:6px;color:var(--muted);padding:6px 12px;cursor:pointer}
  .langs button[aria-pressed="true"]{color:var(--ink);border-color:var(--gold)}
  .hero{max-width:820px;margin:0 auto;padding:48px 22px 20px;text-align:center}
  .eyebrow{font-family:system-ui,sans-serif;font-size:11.5px;letter-spacing:.26em;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
  html[dir="rtl"] .eyebrow{letter-spacing:.05em}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,5.5vw,50px);line-height:1.12}
  html[dir="rtl"] h1{font-family:'Amiri',serif;font-weight:700}
  h1 em{font-style:italic;color:var(--gold)}
  .lede{max-width:640px;margin:16px auto 0;color:var(--muted);font-size:16px}
  /* Les 6 grandes phases — "l'AT expliqué" */
  .phases{max-width:1160px;margin:24px auto 0;padding:0 16px}
  .ptitle{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px}
  html[dir="rtl"] .ptitle{letter-spacing:.05em}
  .pflow{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  @media(max-width:860px){.pflow{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.pflow{grid-template-columns:1fr}}
  .phase{background:var(--bg2);border:1px solid var(--line);border-top:3px solid var(--pc,var(--gold));border-radius:8px;padding:14px 14px}
  .phase .pnum{font-family:system-ui,sans-serif;font-size:10px;letter-spacing:.2em;color:var(--pc,var(--gold))}
  .phase h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;margin:4px 0 2px}
  html[dir="rtl"] .phase h3{font-family:'Amiri',serif}
  .phase .pdate{font-family:system-ui,sans-serif;font-size:11px;color:var(--muted);margin-bottom:6px}
  .phase p{font-size:13px;color:#c6c0b2}
  .phase .pwho{font-style:italic;color:var(--gold);font-size:12.5px;margin-top:6px;display:block}
  html[dir="rtl"] .phase .pwho{font-style:normal}
  /* Frise des prophètes */
  .filter{max-width:1160px;margin:34px auto 6px;padding:0 16px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .fchip{font-family:system-ui,sans-serif;font-size:12px;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .fchip .d{width:8px;height:8px;border-radius:50%;background:var(--c,#888)}
  .fchip[aria-pressed="true"]{color:var(--ink);border-color:var(--c,var(--gold));background:color-mix(in srgb,var(--c,#888) 12%,transparent)}
  .timeline{max-width:1160px;margin:14px auto 0;padding:0 16px}
  .tlwrap{position:relative;overflow-x:auto;padding:20px 0 8px}
  .axis{position:relative;height:2px;background:linear-gradient(90deg,var(--loi),var(--royaume),var(--exil),var(--retour),var(--attente),var(--christ));min-width:900px;margin:0 10px}
  html[dir="rtl"] .axis{background:linear-gradient(270deg,var(--loi),var(--royaume),var(--exil),var(--retour),var(--attente),var(--christ))}
  .tick{position:absolute;top:-6px;width:1px;height:14px;background:var(--line)}
  .tlabel{position:absolute;top:14px;font-family:system-ui,sans-serif;font-size:10px;color:#6b6f85;transform:translateX(-50%);white-space:nowrap}
  .prow{position:relative;min-width:900px;margin:26px 10px 0;height:auto}
  .pnode{position:absolute;transform:translateX(-50%);width:96px;text-align:center;cursor:pointer}
  html[dir="rtl"] .pnode{transform:translateX(50%)}
  .pnode .dot{width:13px;height:13px;border-radius:50%;background:var(--c,var(--gold));margin:0 auto 5px;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--c,var(--gold));transition:transform .15s}
  .pnode:hover .dot{transform:scale(1.35)}
  .pnode .pn{font-family:'Cormorant Garamond',serif;font-size:15px;line-height:1.1}
  html[dir="rtl"] .pnode .pn{font-family:'Amiri',serif}
  .pnode .pd{font-family:system-ui,sans-serif;font-size:9.5px;color:var(--muted)}
  .pnode.dim{opacity:.2}
  .rows{position:relative}
  /* Panneau détail */
  .panel{max-width:820px;margin:30px auto 0;padding:0 18px;min-height:80px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:26px 28px;position:relative;overflow:hidden;opacity:0;transform:translateY(8px);transition:.4s}
  .card.show{opacity:1;transform:none}
  .card::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--pc,var(--gold))}
  .card .badge{display:inline-block;font-family:system-ui,sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pc,var(--gold));border:1px solid color-mix(in srgb,var(--pc,var(--gold)) 45%,transparent);border-radius:999px;padding:4px 12px;margin-bottom:12px}
  html[dir="rtl"] .card .badge{letter-spacing:.04em}
  .card h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,4vw,32px);margin-bottom:2px}
  html[dir="rtl"] .card h2{font-family:'Amiri',serif;font-weight:700}
  .card .when{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
  html[dir="rtl"] .card .when{letter-spacing:.03em}
  .card .lbl{font-family:system-ui,sans-serif;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:14px 0 4px}
  html[dir="rtl"] .card .lbl{letter-spacing:.03em}
  .card .ctx{font-size:15px;color:#cfc9bb}
  .card .msg{font-size:16.5px}
  .card .link{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .card .link .ref{color:var(--gold);font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.08em}
  .card .link p{font-style:italic;font-size:15px;margin-top:3px}
  html[dir="rtl"] .card .link p{font-style:normal}
  .placeholder{text-align:center;color:#5c6077;font-family:system-ui,sans-serif;font-size:13px;padding:24px 0}
  footer{max-width:820px;margin:34px auto 46px;padding:22px 22px 0;border-top:1px solid var(--line);color:#5c6077;font-size:12.5px;font-family:system-ui,sans-serif;text-align:center;line-height:1.8}
</style>
</head>

function render(l){
  const c=T[l];
  document.documentElement.lang=l;document.documentElement.dir=c.dir;
  document.getElementById('brand').textContent=c.brand;
  document.getElementById('eyebrow').textContent=c.eyebrow;
  document.getElementById('title').innerHTML=c.title;
  document.getElementById('lede').textContent=c.lede;
  document.getElementById('phtitle').textContent=c.phtitle;
  // phases
  const pf=document.getElementById('pflow');pf.innerHTML="";
  c.phases.forEach(p=>{
    const d=document.createElement('div');d.className='phase';d.style.setProperty('--pc',PHASES[p[0]].c);
    d.innerHTML=`<div class="pnum">${p[1]}</div><h3>${p[2]}</h3><div class="pdate">${p[3]}</div><p>${p[4]}</p><span class="pwho">${p[5]}</span>`;
    d.addEventListener('click',()=>{setFilter(p[0]);});
    pf.appendChild(d);
  });
  // filtres
  const fl=document.getElementById('filter');fl.innerHTML="";
  const all=document.createElement('button');all.className='fchip';all.dataset.k="__all";all.setAttribute('aria-pressed','true');
  all.innerHTML=`${c.filterAll}`;all.addEventListener('click',()=>setFilter("__all"));fl.appendChild(all);
  c.phases.forEach(p=>{
    const b=document.createElement('button');b.className='fchip';b.dataset.k=p[0];b.setAttribute('aria-pressed','false');
    b.style.setProperty('--c',PHASES[p[0]].c);
    b.innerHTML=`<span class="d"></span>${p[2]}`;
    b.addEventListener('click',()=>setFilter(p[0]));fl.appendChild(b);
  });
  // axe : graduations
  const ax=document.getElementById('axis');ax.querySelectorAll('.tick,.tlabel').forEach(e=>e.remove());
  c.axislabels.forEach(([y,lab])=>{
    const x=px(+y);
    const t=document.createElement('div');t.className='tick';t.style.left=x+"%";ax.appendChild(t);
    const tl=document.createElement('div');tl.className='tlabel';tl.style.left=x+"%";tl.textContent=lab;ax.appendChild(tl);
  });
  // prophètes : disposer sur plusieurs "voies" pour éviter le chevauchement
  const rows=document.getElementById('rows');rows.innerHTML="";
  const lanes=[]; const NODE_W=10; // % largeur approx
  const sorted=[...c.prophets].sort((a,b)=>a.x-b.x);
  const laneOf={};
  sorted.forEach(p=>{
    let lane=0;
    while(lanes[lane]!==undefined && p.x-lanes[lane]<NODE_W) lane++;
    lanes[lane]=p.x; laneOf[p.k]=lane;
  });
  const laneH=64; const maxLane=Math.max(...Object.values(laneOf));
  rows.style.height=((maxLane+1)*laneH)+"px";
  c.prophets.forEach(p=>{
    const node=document.createElement('div');node.className='pnode';node.dataset.k=p.k;node.dataset.phase=p.phase;
    node.style.left=p.x+"%";node.style.top=(laneOf[p.k]*laneH)+"px";
    node.style.setProperty('--c',PHASES[p.phase].c);
    node.innerHTML=`<div class="dot"></div><div class="pn">${p.n}</div><div class="pd">${p.d}</div>`;
    node.addEventListener('click',()=>select(p,l));
    rows.appendChild(node);
  });
  document.getElementById('ph').textContent=c.placeholder;
  document.getElementById('panel').innerHTML='<div class="placeholder" id="ph">'+c.placeholder+'</div>';
  document.getElementById('foot').innerHTML=`<strong>${c.footTitle}.</strong> ${c.foot}<br>Segond 1910 · WEB · Van Dyck.`;
  document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.l===l?'true':'false'));
  window.__lang=l;
}
function setFilter(k){
  const chips=document.querySelectorAll('.fchip');
  chips.forEach(c=>c.setAttribute('aria-pressed', (c.dataset.k===k)?'true':'false'));
  document.querySelectorAll('.pnode').forEach(n=>{
    n.classList.toggle('dim', k!=="__all" && n.dataset.phase!==k);
  });
}
function select(p,l){
  const c=T[l];
  document.querySelectorAll('.pnode .dot').forEach(d=>d.style.transform="");
  const panel=document.getElementById('panel');
  const col=PHASES[p.phase].c;
  panel.innerHTML=`<div class="card show" style="--pc:${col}">
    <span class="badge">${c.phases.find(ph=>ph[0]===p.phase)[2]}</span>
    <h2>${p.n}</h2>
    <div class="when">${p.d}</div>
    <div class="lbl">${c.label.ctx}</div><div class="ctx">${p.ctx}</div>
    <div class="lbl">${c.label.msg}</div><div class="msg">${p.msg}</div>
    <div class="link"><div class="ref">${p.ref}</div><p>« ${p.v} »</p>
      <div class="lbl" style="margin-top:12px">${c.label.link}</div><div class="ctx">${p.christ}</div>
    </div>
  </div>`;
  if(window.innerWidth<900) panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.l)));
render('fr');
</script>
