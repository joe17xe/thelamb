"The blood of the covenant","Exodus 24:8","Moses took the blood and said, Look, this is the blood of the covenant, which Yahweh has made with you.","Matthew 26:28","This is my blood of the new covenant, which is poured out for many for the remission of sins.","At the last supper, Jesus takes up the Sinai formula word for word — and puts himself in the place of the sacrifice."],["The new covenant","Jeremiah 31:31","Behold, the days come, says Yahweh, that I will make a new covenant with the house of Israel.","Luke 22:20","This cup is the new covenant in my blood, which is poured out for you.","Jeremiah is the only book of the Old Testament to use the phrase “new covenant.” Jesus takes it up, cup in hand."],["The law written on hearts","Jeremiah 31:33","I will put my law in their inward parts, and I will write it in their heart.","Hebrews 8:10","The Epistle to the Hebrews quotes Jeremiah's promise in full — the longest Old Testament quotation in the New Testament.",""],["A heart of flesh","Ezekiel 36:26","I will also give you a new heart… I will take away the stony heart out of your flesh.","2 Corinthians 3:3","A letter written not in tablets of stone, but in tablets that are hearts of flesh.",""],["“Not-my-people” becomes my people","Hosea 2:25","I will tell those who were not my people, You are my people; and they will say, My God!","Romans 9:25","As he says also in Hosea, I will call them my people, which were not my people.","The opening of the covenant to the nations was already present in the prophets."],["The nuptial covenant","Genesis 2:24","A man will leave his father and his mother, and will join with his wife, and they will be one flesh.","Ephesians 5:31-32","This mystery is great, but I speak concerning Christ and of the assembly.","Paul rereads the very first marriage as a figure of the union between Christ and his people."],["Christ, our Passover","Exodus 12:6","The whole assembly of the congregation of Israel shall kill it at evening.","1 Corinthians 5:7","Christ, our Passover, has been sacrificed in our place.","A few words from Paul suffice: the whole night of Egypt finds its meaning at the cross."],["The Passover he longed for","Exodus 12:14","This day shall be a memorial for you… you shall keep it as a feast by an ordinance forever.","Luke 22:15","I have earnestly desired to eat this Passover with you before I suffer.","It is during the memorial of the first deliverance that Jesus institutes the memorial of the second."],["The true bread from heaven","Exodus 16:4","Behold, I will rain bread from the sky for you.","John 6:32-35","My Father gives you the true bread out of heaven… I am the bread of life.","The whole of John 6 is a commentary on the manna: the gift in the wilderness heralded a greater gift."],["The grain of heaven","Psalm 78:24","He rained down manna on them to eat… gave them food from the sky.","John 6:31","Our fathers ate the manna in the wilderness. As it is written, He gave them bread out of heaven to eat.","The crowd quotes this psalm to Jesus — who answers by pointing to himself."],["The stricken rock","Exodus 17:6","You shall strike the rock, and water will come out of it, that the people may drink.","1 Corinthians 10:4","They drank of a spiritual rock that followed them, and the rock was Christ.","Struck once, and water gushes out for a whole people."],["The bread and wine of Melchizedek","Genesis 14:18","Melchizedek king of Salem brought out bread and wine. He was priest of God Most High.","Hebrews 7:1-3","Melchizedek… made like the Son of God, remains a priest continually.","A priest-king without genealogy, bread, wine, a blessing — fourteen chapters into the Bible."],["“Come, eat of my bread”","Proverbs 9:5","Wisdom cries out: Come, eat some of my bread, drink some of the wine which I have mixed!","John 6:51","I am the living bread which came down out of heaven. If anyone eats of this bread, he will live forever.","Wisdom's invitation becomes Christ's invitation."],["The first fruits","Leviticus 23:10","You shall bring the sheaf of the first fruits of your harvest to the priest.","1 Corinthians 15:20","Christ has been raised from the dead. He became the first fruits of those who are asleep.","The feast of first fruits fell on the day after the Passover Sabbath — the very morning of the resurrection."],["Come, without money","Isaiah 55:1","Come, everyone who thirsts, to the waters; buy… without money and without price.","Revelation 22:17","He who is thirsty, let him come. He who desires, let him take the water of life freely.","The next-to-last verse of invitation in the Bible answers Isaiah: everything is a gift."],["The first and the last Adam","Genesis 2:7","Yahweh God formed man… and man became a living soul.","1 Corinthians 15:45","The first man, Adam, became a living soul. The last Adam became a life-giving spirit.","Paul reads the whole of history between two men: the one through whom death enters, the one through whom life returns."],["Through one man","Genesis 3:6","She took some of its fruit, and ate. Then she gave some to her husband, and he ate it, too.","Romans 5:19","Through the obedience of the one, many will be made righteous.","A tree in the garden, a tree at Calvary: disobedience undone by obedience."],["The Ark and Baptism","Genesis 6:14","Make a ship of gopher wood… I will establish my covenant with you.","1 Peter 3:20-21","Eight souls were saved through water: this is a symbol of baptism.","Peter himself uses the word “figure” (antitype): the Bible teaches its own typological reading."],["Jacob's Ladder","Genesis 28:12","A stairway was set upon the earth, and its top reached to heaven; the angels were ascending and descending on it.","John 1:51","You will see heaven opened, and the angels of God ascending and descending on the Son of Man.","Jesus points to himself as the ladder itself: the place where heaven and earth meet."],["Sold by His Own","Genesis 37:28","They sold Joseph to the Ishmaelites for twenty pieces of silver.","Matthew 26:15","They weighed out for him thirty pieces of silver.","Joseph: betrayed by his brothers, sold, unjustly condemned, then raised up to save those who had handed him over. A whole life in miniature."],["The Deliverer First Rejected","Exodus 2:14","Who made you a prince and a judge over us?","Acts 7:35","This Moses whom they refused… God has sent him as both a ruler and a deliverer.","Stephen, in his final speech, reads Moses as a figure of Christ: rejected the first time, acknowledged the second."],["A Rest Greater than Joshua","Joshua 1:2","Arise, go across this Jordan, you and all these people, to the land which I am giving to them.","Hebrews 4:8","For if Joshua had given them rest, he would not have spoken afterward of another day.","Joshua and Jesus bear the same Hebrew name: Yeshua, “the LORD saves.”"],["The Sign of Jonah","Jonah 2:1","Jonah was in the belly of the fish three days and three nights.","Matthew 12:40","So will the Son of Man be three days and three nights in the heart of the earth.","The only “sign” Jesus promises his generation: his death and resurrection, prefigured by Jonah."],["The Loaves Multiplied","2 Kings 4:43-44","Give the people, that they may eat; for Yahweh says, They will eat, and will have some left over.","John 6:11-13","Jesus took the loaves, and having given thanks, he distributed them… and they filled twelve baskets with broken pieces which were left over.","Elisha feeds a hundred men with twenty loaves; Jesus, five thousand with five. The figure is surpassed on every side."],["God Dwells Among Us","Exodus 25:8","Let them make me a sanctuary, that I may dwell among them.","John 1:14","The Word became flesh, and lived among us.","John's Greek verb literally means “to pitch one's tent”: the wilderness tabernacle becomes a person."],["The Torn Veil","Exodus 26:33","The veil shall separate the holy place from the most holy for you.","Matthew 27:51","Behold, the veil of the temple was torn in two from the top to the bottom.","Torn from the top: it was not man who opened the way."],["A Way Through the Veil","Exodus 26:33","The veil shall separate for you…","Hebrews 10:20","…the new and living way which he dedicated for us, through the veil, that is to say, his flesh.",""],["The High Priest Enters Once","Leviticus 16:15","Aaron shall enter the most holy place with the blood, once in the year.","Hebrews 9:12","Christ entered in once for all into the Holy Place with his own blood.","Once a year becomes once for all; the blood of an animal becomes his own."],["A Priest Forever","Psalm 110:4","You are a priest forever in the order of Melchizedek.","Hebrews 7:17","For it is testified: You are a priest forever, according to the order of Melchizedek.","A priesthood older than Aaron's, and one that never ends."],["The Temple of His Body","1 Kings 8:11","Yahweh's glory filled Yahweh's house.","John 2:19-21","Destroy this temple, and in three days I will raise it up… But he spoke of the temple of his body.","The glory that filled Solomon's temple now dwells in a body."],["The River Flowing from the Temple","Ezekiel 47:1","Waters flowed out from under the threshold of the house eastward.","John 7:38","He who believes in me, as the Scripture has said, from within him will flow rivers of living water.",""],["The River of Life","Ezekiel 47:1","Waters flowed out from under the threshold of the house…","Revelation 22:1","He showed me a river of water of life, proceeding out of the throne of God and of the Lamb.","At the end, no more temple of stone: the throne of the Lamb is the spring."],["The Branch Will Build the Temple","Zechariah 6:12","Behold, the man whose name is the Branch… he will build Yahweh's temple.","John 2:19","Destroy this temple, and in three days I will raise it up.",""],["Heaven Is My Throne","Isaiah 66:1","Thus says Yahweh: Heaven is my throne, and the earth is my footstool. What kind of house will you build to me?","Acts 7:49","The Most High doesn't dwell in temples made with hands, as the prophet says.",""],["An Everlasting Dominion","Daniel 7:14","Dominion was given him, and glory, and a kingdom, that all the peoples, nations, and languages should serve him.","Matthew 28:18","All authority has been given to me in heaven and on earth.","Matthew's final scene, on the mountain, is the enthronement of the Son of Man foretold by Daniel."],["“What Is the Son of Man?”","Psalm 8:5-7","What is man, that you think of him? What is the son of man, that you care for him? You have put all things under his feet.","Hebrews 2:8-9","We see Jesus, crowned with glory and honor because of the suffering of death.","The psalm that marvels at humanity in general becomes, in Hebrews, the portrait of the Man par excellence."],["Jesus' Favorite Title","Ezekiel 2:1","Son of man, stand on your feet, and I will speak with you.","Mark 2:10","The Son of Man has authority on earth to forgive sins.","“Son of man”: addressed 93 times to Ezekiel — frail humanity before God — and once to the heavenly figure of Daniel 7. In choosing this title, Jesus takes on both: the lowliness and the glory."],["Among the Lampstands","Daniel 7:13","…and behold, there came with the clouds of the sky one like a son of man.","Revelation 1:13","I saw one like a son of man, clothed with a robe reaching down to his feet, and with a golden sash.","John, on Patmos, recognizes in the Risen One the very figure of Daniel's vision."],["The Harvest of the Son of Man","Daniel 7:13","…there came with the clouds of the sky one like a son of man.","Revelation 14:14","On the cloud was one sitting like a son of man, having on his head a golden crown, and in his hand a sharp sickle.",""],["The Man of Your Right Hand","Psalm 80:18","Let your hand be on the man of your right hand, on the son of man whom you made strong for yourself.","Luke 22:69","From now on, the Son of Man will be seated at the right hand of the power of God.","The psalm already joined the two images that Jesus unites before his judges: the son of man and the right hand of God."],["All Things Under His Feet","Psalm 8:7","You make him ruler over the works of your hands. You have put all things under his feet.","1 Corinthians 15:27","He put all things in subjection under his feet.",""],["“Let Us Make Man”","Genesis 1:26","God said: Let's make man in our image, after our likeness.","Colossians 1:16","For by him all things were created in the heavens and on the earth… all things have been created through him and for him.","From the very first page, God deliberates in a mysterious plural. The New Testament names the Word and the Spirit present at creation."],["The Spirit Who Overshadows","Genesis 1:2","God's Spirit was hovering over the surface of the waters.","Luke 1:35","The Holy Spirit will come on you, and the power of the Most High will overshadow you.","The Spirit who hovered over the first creation overshadows Mary at the dawn of the new."],["By His Word and His Breath","Psalm 33:6","By Yahweh's word, the heavens were made: all their army by the breath of his mouth.","John 1:3","All things were made through him. Without him, nothing was made that has been made.","Word and Breath at work in creation: what the psalm sings, John names."],["“I AM”","Exodus 3:14","God said to Moses: I AM WHO I AM. You shall tell the children of Israel this: I AM has sent me to you.","John 8:58","Most certainly, I tell you, before Abraham came into existence, I AM.","The hearers understand perfectly: they pick up stones. Jesus has just pronounced over himself the Name of the burning bush."],["The Shema Enlarged","Deuteronomy 6:4","Hear, Israel: Yahweh is our God. Yahweh is one.","1 Corinthians 8:6","To us there is one God, the Father, of whom are all things… and one Lord, Jesus Christ, through whom are all things.","Paul, a fervent Jew, rewrites Israel's confession of faith with Jesus placed within it — without for one second ceasing to confess one God."],["The Glory Isaiah Saw","Isaiah 6:3","Holy, holy, holy, is Yahweh of Armies! The whole earth is full of his glory!","John 12:41","Isaiah said these things when he saw his glory, and spoke of him.","John affirms it: the glory the prophet beheld in the temple was the glory of Christ."],["“Your Throne, O God”","Psalm 45:7-8","Your throne, God, is forever and ever… Therefore God, your God, has anointed you with the oil of gladness.","Hebrews 1:8-9","But of the Son he says: Your throne, O God, is forever and ever.","The psalm calls “God” the one whom “his God” anoints: two persons, one divinity. Hebrews applies it to the Son."],["The Creator Son","Psalm 102:26-28","Of old, you laid the foundation of the earth. The heavens are the work of your hands… But you are the same. Your years will have no end.","Hebrews 1:10-12","And: You, Lord, in the beginning, laid the foundation of the earth. The heavens are the works of your hands.","A psalm addressed to Yahweh is quoted in Hebrews as addressed to the Son — without a single line of justification: it went without saying."],["Calling on the Name","Joel 3:5","It will happen that whoever will call on Yahweh's name shall be saved.","Romans 10:13","Whoever will call on the name of the Lord will be saved.","In Joel, the Name called upon is Yahweh's; in Paul, the Lord confessed three verses earlier is Jesus."],["The First and the Last","Isaiah 44:6","This is what Yahweh says: I am the first, and I am the last; and besides me there is no God.","Revelation 22:13","I am the Alpha and the Omega, the First and the Last, the Beginning and the End.","The title God reserves exclusively for himself in Isaiah, Christ bears on the last page of the Bible."],["The Scene at the Jordan","Isaiah 42:1","Behold, my servant… my chosen, in whom my soul delights: I have put my Spirit on him.","Matthew 3:16-17","He saw the Spirit of God descending as a dove. Behold, a voice out of the heavens said: This is my beloved Son, with whom I am well pleased.","At the baptism of Jesus: the Father speaks from heaven, the Son stands in the water, the Spirit descends. The scene Isaiah announced — three presences, one God."],["The Zeal of Your House","Psalm 69:10","The zeal of your house consumes me.","John 2:17","His disciples remembered that it was written: Zeal for your house will eat me up.","Quoted at Jesus' first public act in the Temple."],["Hated Without a Cause","Psalm 69:5","Those who hate me without a cause are more than the hairs of my head.","John 15:25","That the word may be fulfilled which was written in their law: They hated me without a cause.",""],["A Stone of Stumbling","Isaiah 8:14","He will be a sanctuary, but a stumbling stone and a rock that makes them fall.","Romans 9:33","Behold, I lay in Zion a stumbling stone… and no one who believes in him will be disappointed.","The same stone: foundation for some, obstacle for others."],["The Root of Jesse","Isaiah 11:10","The root of Jesse stands as a banner of the peoples; the nations will seek him.","Romans 15:12","Again, Isaiah says: There will be the root of Jesse… in him the Gentiles will hope.",""],["A Light to the Nations","Isaiah 49:6","I will also give you as a light to the nations, that you may be my salvation to the end of the earth.","Acts 13:47","For so has the Lord commanded us: I have set you as a light for the Gentiles.","Paul and Barnabas read their own mission in the Servant's song."],["The Back Given Up","Isaiah 50:6","I gave my back to those who beat me, and my cheeks to those who plucked off the hair.","Matthew 26:67","Then they spat in his face and beat him with their fists.",""],["The Sun Set at Noon","Amos 8:9","I will cause the sun to go down at noon, and I will darken the earth in the clear day.","Matthew 27:45","Now from the sixth hour there was darkness over all the land until the ninth hour.",""],["Into Your Hands","Psalm 31:6","Into your hand I commend my spirit. You redeem me, Yahweh, God of truth.","Luke 23:46","Jesus, crying with a loud voice, said: Father, into your hands I commit my spirit!","The last word from the cross is a psalm verse — the evening prayer of the children of Israel."],["The Signs of the Messiah","Isaiah 35:5-6","Then the eyes of the blind will be opened… Then the lame man will leap like a deer.","Matthew 11:5","The blind receive their sight, the lame walk… and the poor have good news preached to them.","Jesus' answer to John the Baptist's messengers is a mosaic of Isaiah."],["Elijah Must Come","Malachi 4:5","Behold, I will send you Elijah the prophet before the day of Yahweh comes.","Matthew 17:11-13","Elijah has come already… Then the disciples understood that he spoke to them of John the Baptizer.",""],["The Third Day","Hosea 6:2","After two days he will revive us. On the third day he will raise us up.","1 Corinthians 15:4","He was raised on the third day according to the Scriptures.","Paul says “according to the Scriptures” without quoting; Hosea is one of the texts tradition has heard behind the phrase."],["Ascended on High","Psalm 68:19","You have ascended on high. You have led away captives.","Ephesians 4:8","Therefore he says: When he ascended on high, he led captivity captive.",""],["The Star of Jacob","Numbers 24:17","A star will come out of Jacob. A scepter will rise out of Israel.","Matthew 2:2","Where is he who is born King of the Jews? For we saw his star in the east.","Balaam's oracle, read as messianic long before the magi ever came."],["Gold and Frankincense","Isaiah 60:6","All from Sheba will come. They will bring gold and frankincense, and will proclaim the praises of Yahweh.","Matthew 2:11","They offered to him gifts: gold, frankincense, and myrrh.",""],["“Let Him Deliver Him!”","Psalm 22:9","He trusts in Yahweh. Let him deliver him. Let him rescue him, since he delights in him.","Matthew 27:43","He trusts in God. Let God deliver him now, if he wants him.","At the foot of the cross, the mockers quote Psalm 22 without knowing it."],["Those Who Had Not Heard","Isaiah 52:15","They will see that which had not been told them, and they will understand that which they had not heard.","Romans 15:21","As it is written: They will see, to whom no news of him came.","Paul makes the closing verse of the Servant song's prologue his missionary road map."],["Blessed Is He Who Comes","Psalm 118:26","Blessed is he who comes in the name of Yahweh!","Matthew 21:9","Hosanna to the son of David! Blessed is he who comes in the name of the Lord!",""],["The Hand Laid on the Head","Leviticus 1:4","He shall lay his hand on the head of the burnt offering, and it shall be accepted for him to make atonement for him.","2 Corinthians 5:21","Him who knew no sin he made to be sin on our behalf.","The gesture of transfer: the guilt passes from the offerer to the victim."],["The Curse of the Tree","Deuteronomy 21:23","He who is hanged is accursed of God.","Galatians 3:13","Christ redeemed us from the curse of the law, having become a curse for us: Cursed is everyone who hangs on a tree.",""],["Our Diseases Borne","Isaiah 53:4","Surely he has borne our sickness and carried our suffering.","Matthew 8:17","That it might be fulfilled which was spoken through Isaiah: He took our infirmities and bore our diseases.","Matthew applies Isaiah 53 already to the healings: the bearing begins before the cross."],["Neither Violence nor Deceit","Isaiah 53:9","He had done no violence, nor was any deceit in his mouth.","1 Peter 2:22","Who didn't sin, neither was deceit found in his mouth.",""],["He Keeps All His Bones","Psalm 34:21","He protects all of his bones. Not one of them is broken.","John 19:36","These things happened that the Scripture might be fulfilled: A bone of him will not be broken.","Behind John 19:36 two texts overlap: the rule for the Passover lamb and the promise made to the righteous."],["Outside the Camp","Leviticus 16:27","The bull for the sin offering and the goat for the sin offering shall be carried outside the camp and burned with fire.","Hebrews 13:12","Therefore Jesus also, that he might sanctify the people through his own blood, suffered outside of the gate.",""],["The Ashes That Purify","Numbers 19:9","The ashes of the heifer shall be gathered up: it is for use in water for cleansing impurity.","Hebrews 9:13-14","If the ashes of a heifer sanctify those who have been defiled… how much more will the blood of Christ cleanse your conscience!",""],["“Here I Am”","Psalm 40:7-9","Sacrifice and offering you didn't desire… Then I said: Behold, I have come.","Hebrews 10:5-7","When Christ comes into the world, he says: You didn't desire sacrifice and offering, but you prepared a body for me… Behold, I have come to do your will.","In Hebrews, the psalm becomes the prayer of the Son as he enters the world."],["Neither Too Much nor Too Little","Exodus 16:18","He who gathered much had nothing over, and he who gathered little had no lack.","2 Corinthians 8:15","As it is written: He who gathered much had nothing left over.","The rule of the manna becomes the rule of Christian sharing."],["Not by Bread Alone","Deuteronomy 8:3","Man does not live by bread only, but man lives by every word that proceeds out of Yahweh's mouth.","Matthew 4:4","It is written: Man shall not live by bread alone, but by every word that proceeds out of God's mouth.","In the wilderness, Jesus answers temptation with the very lesson of the manna."],["The Cup of Salvation","Psalm 116:13","I will take the cup of salvation, and call on Yahweh's name.","1 Corinthians 10:16","The cup of blessing which we bless, isn't it a sharing of the blood of Christ?","“Cup of blessing”: a term from the Passover meal, taken up by Paul word for word."],["They Saw God, and They Ate","Exodus 24:11","They saw God, and ate and drank.","Revelation 3:20","If anyone hears my voice and opens the door, then I will come in to him, and will dine with him, and he with me.","The covenant is sealed at table — from Sinai to the door of Laodicea."],["From the Fruit Taken to the Feast Given","Genesis 3:6","She took some of its fruit, and ate.","Revelation 19:9","Blessed are those who are invited to the wedding supper of the Lamb!","Evil entered through a mouth; communion returns through a table. First page and last: a meal."],["The Feast for All Peoples","Isaiah 25:6","Yahweh of Armies will make all peoples a feast of choice meat.","Revelation 19:9","Blessed are those who are invited to the wedding supper of the Lamb!",""],["The Hyssop","Exodus 12:22","You shall take a bunch of hyssop, and dip it in the blood.","John 19:29","They put a sponge full of the vinegar on hyssop, and held it at his mouth.","The instrument of the paschal blood reappears at the very moment the Lamb dies."],["The Oath of Moriah","Genesis 22:16-17","I have sworn by myself… I will bless you greatly, and I will multiply your offspring.","Hebrews 6:13-14","God, since he could swear by no one greater, swore by himself, saying, Surely blessing I will bless you.",""],["“I Will Be His Father”","2 Samuel 7:14","I will be his father, and he will be my son.","Hebrews 1:5","And again, I will be to him a Father, and he will be to me a Son.",""],["All Taught by God","Isaiah 54:13","All your children will be taught by Yahweh.","John 6:45","It is written in the prophets, They will all be taught by God.",""],["An Everlasting Covenant","Jeremiah 32:40","I will make an everlasting covenant with them, that I will not turn away from following them.","Hebrews 13:20","…with the blood of an eternal covenant.",""],["One Shepherd","Ezekiel 34:23","I will set up one shepherd over them, and he will feed them, even my servant David.","John 10:11","I am the good shepherd. The good shepherd lays down his life for the sheep.","In Ezekiel, God says “I myself will feed my sheep,” then announces “one shepherd”: John 10 holds both ends together."],["The Word Very Near","Deuteronomy 30:14","The word is very near to you, in your mouth and in your heart.","Romans 10:8","But what does it say? The word is near you… that is, the word of faith which we preach.",""],["“I Will Walk Among You”","Leviticus 26:12","I will walk among you, and will be your God, and you will be my people.","2 Corinthians 6:16","Even as God said, I will dwell in them and walk in them; and I will be their God, and they will be my people.",""],["The Deliverer of Zion","Isaiah 59:20","A Redeemer will come to Zion.","Romans 11:26","Even as it is written, There will come out of Zion the Deliverer.",""],["The Kinsman-Redeemer","Ruth 4:14","Blessed be Yahweh, who has not left you today without a near kinsman!","Luke 1:68","Blessed be the Lord, the God of Israel, for he has visited and redeemed his people.","Boaz the goel — the kinsman with both the right and the heart to redeem — sketches from afar the Redeemer born of his line (Matthew 1:5)."],["The Son Restored to His Mother","1 Kings 17:22","Yahweh listened to the voice of Elijah; and the soul of the child came into him again.","Luke 7:14-15","Young man, I tell you, arise!… And he gave him to his mother.","At Nain the crowd cries out “a great prophet”: they have recognized the scene of Elijah at Zarephath. But Elijah prayed; Jesus commands."],["The Scarlet Cord","Joshua 2:18","You shall bind this line of scarlet thread in the window.","Matthew 1:5","Salmon became the father of Boaz by Rahab.","The woman with the scarlet thread enters the Messiah's genealogy; ancient tradition saw in her cord the thread of salvation at the window."],["The Counselor Who Hanged Himself","2 Samuel 17:23","Ahithophel… set his house in order, and hanged himself.","Matthew 27:5","He threw down the pieces of silver in the sanctuary and departed. Then he went away and hanged himself.","David's friend who betrays and then hangs himself: the shadow cast ahead of Judas (see Psalm 41:10)."],["Every Day — Once for All","Exodus 29:38-39","Now this is that which you shall offer on the altar: two lambs day by day continually.","Hebrews 10:11-12","Every priest indeed stands day by day serving… but he, when he had offered one sacrifice for sins forever, sat down on the right hand of God.","The tamid ceases where the one offering begins — and the priest who always stood at last sits down."],["The Veil Taken Away","Exodus 34:34","When Moses went in before Yahweh, he took the veil off.","2 Corinthians 3:16","Whenever one turns to the Lord, the veil is taken away.",""],["The Glory of the Second House","Haggai 2:9","The latter glory of this house will be greater than the former.","Luke 2:27-32","Simeon received the child in the temple: My eyes have seen your salvation… a light for revelation to the nations.","The Second Temple had neither ark nor cloud — but a forty-day-old child was carried into it."],["The Lord Comes to His Temple","Malachi 3:1","The Lord, whom you seek, will suddenly come to his temple.","Matthew 21:12","Jesus entered into the temple of God and drove out all of those who sold and bought.",""],["A House of Prayer for All","Isaiah 56:7","My house will be called a house of prayer for all peoples.","Mark 11:17","Isn't it written, My house will be called a house of prayer for all the nations?",""],["Three in One Verse","Isaiah 48:16","Now the Lord Yahweh has sent me, with his Spirit.","John 20:21-22","As the Father has sent me, even so I send you. Then he breathed on them: Receive the Holy Spirit.","Already in Isaiah: one who is Sent speaks, one who Sends sends, and a Spirit accompanies."],["“What Is His Son's Name?”","Proverbs 30:4","Who has ascended up into heaven, and descended?… What is his name, and what is his son's name, if you know?","John 3:13","No one has ascended into heaven but he who descended out of heaven, the Son of Man.","The question Proverbs leaves open; Jesus answers Nicodemus in the very same terms."],["The Spirit Who Can Be Grieved","Isaiah 63:10","They rebelled and grieved his Holy Spirit.","Ephesians 4:30","Don't grieve the Holy Spirit of God.","A Spirit who can be “grieved” is not a force: he is someone — already in Isaiah."]],"ar":[["هابيل: أول حمل يُقدَّم","تكوين ٤: ٤","قدّم هابيل من أبكار غنمه؛ فنظر الرب إلى قربانه.","عبرانيين ١١: ٤","بالإيمان قدّم هابيل لله ذبيحة أفضل من قايين.","منذ الصفحة الرابعة من الكتاب المقدس، يُقبَل حملٌ قُدِّم بإيمان. من هنا يبدأ الخيط."],["«الله يرى له الخروف»","تكوين ٢٢: ٨","الله يرى له الخروف للمحرقة يا ابني.","يوحنا ١: ٢٩","هوذا حمل الله الذي يرفع خطية العالم!","يبقى جواب إبراهيم لإسحاق معلّقًا ألفي سنة — حتى صرخة يوحنا المعمدان على ضفاف الأردن."],["الابن يحمل الحطب","تكوين ٢٢: ٦","فأخذ إبراهيم حطب المحرقة ووضعه على إسحاق ابنه.","يوحنا ١٩: ١٧","فخرج وهو حامل صليبه إلى الموضع الذي يقال له موضع الجمجمة، ويقال له جلجثة.","يصعد إسحاق جبل المريا تحت حطب الذبيحة، ويصعد يسوع الجلجثة تحت خشبة الصليب. التلة نفسها، بحسب التقليد."],["البديل","تكوين ٢٢: ١٣","فأخذ إبراهيم الكبش وأصعده محرقة عوضًا عن ابنه.","رومية ٨: ٣٢","الذي لم يشفق على ابنه، بل بذله لأجلنا أجمعين.","على جبل المريا يُشفق الله على ابن إبراهيم. وعلى الجلجثة لا يُشفق على ابنه هو."],["بلا عيب ولا دنس","خروج ١٢: ٥","تكون لكم شاة صحيحة ذكرًا ابن سنة.","١ بطرس ١: ١٩","…بل بدم كريم، كما من حمل بلا عيب ولا دنس، دم المسيح.","يصف بطرس المسيح بالمفردات الدقيقة نفسها الواردة في طقس الفصح في خروج ١٢."],["الدم الذي يحمي","خروج ١٢: ١٣","فأرى الدم وأعبر عنكم.","رومية ٥: ٩","فبالأولى كثيرًا ونحن متبرّرون الآن بدمه نخلص به من الغضب.","في مصر، تعبر الدينونة عن البيوت الموسومة بدم الخروف."],["لا يُكسر منه عظم","خروج ١٢: ٤٦","وعظمًا لا تكسروا منه.","يوحنا ١٩: ٣٦","لأن هذا كان ليتمّ الكتاب القائل: عظم لا يُكسر منه.","تُكسر ساقا المصلوبَين إلى جانبه — أما ساقا يسوع فلا. ويرى يوحنا في ذلك فريضة خروف الفصح."],["حامل الخطايا","لاويين ١٦: ٢٢","ليحمل التيس عليه كل ذنوبهم إلى أرض مقفرة.","عبرانيين ٩: ٢٨","هكذا المسيح أيضًا، بعدما قُدّم مرة لكي يحمل خطايا كثيرين.","يوم الكفارة العظيم: خطايا الشعب توضع على ذبيحة تحملها إلى مكان بعيد."],["الحياة في الدم","لاويين ١٧: ١١","لأن الدم يكفّر عن النفس.","عبرانيين ٩: ٢٢","وبدون سفك دم لا تحصل مغفرة.","تقرأ الرسالة إلى العبرانيين سفر اللاويين كله بوصفه القواعد التي تجعل الصليب مفهومًا."],["مرفوع لكي نحيا","عدد ٢١: ٩","فكان متى لدغت حية إنسانًا ونظر إلى حية النحاس، يحيا.","يوحنا ٣: ١٤","وكما رفع موسى الحية في البرية هكذا ينبغي أن يُرفع ابن الإنسان.","يسوع نفسه هو من يعقد هذا الربط، ليلًا، أمام نيقوديموس — قبل يوحنا ٣: ١٦ بثلاث آيات."],["مجروح لأجل معاصينا","إشعياء ٥٣: ٥","وهو مجروح لأجل معاصينا… وبحُبُره شُفينا.","١ بطرس ٢: ٢٤","الذي بجلدته شُفيتم.","كُتب نحو سنة ٧٠٠ قبل الميلاد. ودرج إشعياء الكامل الذي عُثر عليه في قمران يسبق زمن يسوع: النبوءة تتقدم الحدث."],["الحمل الصامت","إشعياء ٥٣: ٧","كشاة تُساق إلى الذبح، لم يفتح فاه.","أعمال الرسل ٨: ٣٢-٣٥","كان الحبشي يقرأ هذا المقطع. فابتدأ فيلبس من هذا الكتاب وبشّره بيسوع.","أول تفسير مسيحي لإشعياء ٥٣ موجود في الكتاب المقدس نفسه: مركبة، ودرج، وسؤال."],["الخراف الضالة","إشعياء ٥٣: ٦","كلنا كغنم ضللنا. ملنا كل واحد إلى طريقه.","١ بطرس ٢: ٢٥","لأنكم كنتم كخراف ضالة، لكنكم رجعتم الآن إلى راعي نفوسكم.",""],["أُحصي مع أثمة","إشعياء ٥٣: ١٢","وأُحصي مع أثمة.","لوقا ٢٢: ٣٧","ينبغي أن يتم فيّ أيضًا هذا المكتوب: وأُحصي مع أثمة.","يقتبس يسوع إشعياء ٥٣ عن نفسه، قبل ساعات قليلة من صلبه بين لصّين."],["الصرخة","مزمور ٢٢: ٢","إلهي، إلهي، لماذا تركتني؟","متى ٢٧: ٤٦","صرخ يسوع: إيلي، إيلي، لما شبقتني؟ أي: إلهي، لماذا تركتني؟","على الصليب يصلّي يسوع المزمور ٢٢ — وقد كُتب قبل نحو ألف سنة. اقرأ بقية المزمور: فهو يصف المشهد."],["القرعة على القميص","مزمور ٢٢: ١٩","يقسمون ثيابي بينهم، وعلى لباسي يقترعون.","يوحنا ١٩: ٢٤","اقترعوا على القميص، ليتمّ الكتاب.",""],["يدان ورجلان مثقوبتان","مزمور ٢٢: ١٧","ثقبوا يديّ ورجليّ.","يوحنا ٢٠: ٢٥","إن لم أبصر في يديه أثر المسامير… لا أؤمن.","لم يكن الصلب قد وُجد بعد حين كُتب هذا المزمور."],["الذي طعنوه","زكريا ١٢: ١٠","فينظرون إليّ، الذي طعنوه.","يوحنا ١٩: ٣٧","وأيضًا يقول كتاب آخر: سينظرون إلى الذي طعنوه.","في سفر زكريا، المتكلم بضمير الأنا هو الله نفسه."],["الراعي المضروب","زكريا ١٣: ٧","اضرب الراعي فتتشتّت الغنم!","متى ٢٦: ٣١","أضرب الراعي فتتبدد خراف الرعية.","يقتبس يسوع هذه الآية في ليلة القبض عليه نفسها، معلنًا مسبقًا هروب التلاميذ."],["الخروف المذبوح يملك","إشعياء ٥٣: ٧","كشاة تُساق إلى الذبح…","رؤيا ٥: ٦","ورأيت في وسط العرش خروفًا قائمًا كأنه مذبوح.","نهاية الخيط: حمل إشعياء المذبوح واقف في وسط عرش الله. لقد صارت الذبيحة مُلكًا."],["الإنجيل الأول","تكوين ٣: ١٥","أضع عداوة بين نسلك ونسلها. هو يسحق رأسك.","غلاطية ٤: ٤","لما جاء ملء الزمان، أرسل الله ابنه مولودًا من امرأة.","وعد النسل الغالب يُعطى في يوم السقوط نفسه. ويسميه التقليد «البشارة الأولى»."],["تتبارك جميع الأمم","تكوين ١٢: ٣","وتتبارك فيك جميع قبائل الأرض.","غلاطية ٣: ٨","الكتاب سبق فبشّر إبراهيم أن فيك تتبارك جميع الأمم.",""],["الأسد الذي من سبط يهوذا","تكوين ٤٩: ١٠","لا يزول قضيب من يهوذا، حتى يأتي شيلون وله يكون خضوع شعوب.","رؤيا ٥: ٥","هوذا قد غلب الأسد الذي من سبط يهوذا.","بركة يعقوب وهو يحتضر لابنه يهوذا — يتردد صداها في الصفحة الأخيرة من الكتاب المقدس."],["النبي الآتي","تثنية ١٨: ١٥","يقيم لك الرب إلهك نبيا من وسط إخوتك مثلي. له تسمعون.","أعمال ٣: ٢٢","قال موسى: إن نبيا مثلي سيقيم لكم الرب إلهكم.",""],["كرسي داود","٢ صموئيل ٧: ١٣","أنا أثبت كرسي مملكته إلى الأبد.","لوقا ١: ٣٢-٣٣","يعطيه الرب الإله كرسي داود أبيه، ولا يكون لملكه نهاية.","بشارة الملاك لمريم تردد حرفيا الوعد الذي قطع لداود قبل ألف سنة."],["«أنت ابني»","مزمور ٢: ٧","أنت ابني، أنا اليوم ولدتك.","أعمال ١٣: ٣٣","إن الله قد أكمل الموعد إذ أقام يسوع، كما هو مكتوب في المزمور الثاني.",""],["لن يرى فسادا","مزمور ١٦: ١٠","لن تدع تقيك يرى فسادا.","أعمال ٢: ٣١","سبق داود فرأى وتكلم عن قيامة المسيح: أن جسده لم ير فسادا.","أول عظة مسيحية في التاريخ، يوم الخمسين، هي شرح لهذا المزمور."],["رب داود","مزمور ١١٠: ١","قال الرب لربي: اجلس عن يميني.","متى ٢٢: ٤٤","فإن كان داود يدعوه ربا، فكيف يكون ابنه؟","آية العهد القديم الأكثر اقتباسا في العهد الجديد كله."],["العذراء تلد ابنا","إشعياء ٧: ١٤","ها العذراء تحبل وتلد ابنا وتدعو اسمه عمانوئيل.","متى ١: ٢٣","هذا كله كان لكي يتم ما قيل من الرب بالنبي.","عمانوئيل: «الله معنا»."],["يولد لنا ولد","إشعياء ٩: ٥","يولد لنا ولد… ويدعى اسمه إلها قديرا، رئيس السلام.","لوقا ٢: ١١","ولد لكم اليوم في مدينة داود مخلص هو المسيح الرب.",""],["الصوت الصارخ في البرية","إشعياء ٤٠: ٣","صوت صارخ في البرية: أعدوا طريق الرب.","مرقس ١: ٣","صوت صارخ في البرية: أعدوا طريق الرب.","الأناجيل الأربعة تفتتح خدمة يوحنا المعمدان بهذه الآية عينها من إشعياء."],["«اليوم قد تم هذا المكتوب»","إشعياء ٦١: ١","روح السيد الرب علي، لأن الرب مسحني لأبشر المساكين.","لوقا ٤: ٢١","اليوم قد تم هذا المكتوب في مسامعكم.","في الناصرة يقرأ يسوع إشعياء في المجمع، ثم يطوي السفر ويطبقه على نفسه."],["بيت لحم","ميخا ٥: ١","أما أنت يا بيت لحم… فمنك يخرج لي الذي يكون متسلطا على إسرائيل، ومخارجه منذ القديم، منذ أيام الأزل.","متى ٢: ٦","لما سألهم هيرودس، أجاب الكتبة بكلام ميخا: في بيت لحم يولد المسيح.","مكان ولادة المسيا كان محددا قبل سبعة قرون — ومعروفا لدى الجميع."],["من مصر","هوشع ١١: ١","لما كان إسرائيل غلاما أحببته، ومن مصر دعوت ابني.","متى ٢: ١٥","…لكي يتم ما قيل من الرب بالنبي: من مصر دعوت ابني.","يسوع يعيش تاريخ إسرائيل من جديد: النزول إلى مصر، والخروج، والبرية، والتجربة — لكن من غير أن يسقط."],["الملك الوديع على حمار","زكريا ٩: ٩","هوذا ملكك يأتي إليك. هو عادل ومنصور، وديع وراكب على حمار.","متى ٢١: ٥","قولوا لابنة صهيون: هوذا ملكك يأتيك وديعا راكبا على أتان.","أحد الشعانين، مكتوب قبل خمسة قرون."],["ثلاثون من الفضة","زكريا ١١: ١٢-١٣","فوزنوا أجرتي ثلاثين من الفضة… فألقيتها إلى الفخاري في بيت الرب.","متى ٢٧: ٩","فأخذوا الثلاثين من الفضة، ثمن المثمن الذي ثمنوه، وأعطوها عن حقل الفخاري.","الثمن، والمكان (الهيكل)، والوجهة (الفخاري): ثلاثة تفاصيل في آية واحدة."],["الملاك الذي يهيئ الطريق","ملاخي ٣: ١","هأنذا أرسل ملاكي فيهيئ الطريق أمامي.","متى ١١: ١٠","هذا هو الذي كتب عنه: ها أنا أرسل أمام وجهك ملاكي.","آخر أنبياء العهد القديم يبشر بأول أنبياء العهد الجديد."],["الحجر المرفوض","مزمور ١١٨: ٢٢","الحجر الذي رفضه البناؤون قد صار رأس الزاوية.","أعمال ٤: ١١","يسوع هو الحجر الذي احتقرتموه أيها البناؤون، الذي صار رأس الزاوية.",""],["الصديق الذي يخون","مزمور ٤١: ١٠","آكل خبزي رفع علي عقبه.","يوحنا ١٣: ١٨","ليتم الكتاب: الذي يأكل معي الخبز رفع علي عقبه.","استشهد به يسوع في العشاء الأخير، ويهوذا لا يزال إلى المائدة."],["الخل","مزمور ٦٩: ٢٢","في عطشي يسقونني خلا.","يوحنا ١٩: ٢٩","فملأوا إسفنجة من الخل وقدموها إلى فمه.",""],["ابن الإنسان على السحاب","دانيال ٧: ١٣","وإذا مع سحب السماء مثل ابن إنسان أتى.","متى ٢٦: ٦٤","تبصرون ابن الإنسان جالسا عن يمين القوة وآتيا على سحاب السماء.","أمام رئيس الكهنة يجيب يسوع بدانيال ٧ — وهذا الاقتباس هو الذي حسم الحكم عليه."],["ابتلاع الموت","إشعياء ٢٥: ٨","يبلع الموت إلى الأبد، ويمسح السيد الرب الدموع عن كل الوجوه.","١ كورنثوس ١٥: ٥٤","حينئذ تصير الكلمة المكتوبة: ابتلع الموت إلى غلبة.",""],["حجر الزاوية الموضوع في صهيون","إشعياء ٢٨: ١٦","هأنذا أؤسس في صهيون حجرا، حجر زاوية كريما.","١ بطرس ٢: ٦","يتضمن في الكتاب: هأنذا أضع في صهيون حجر زاوية مختارا كريما.",""],["الروح المسكوب على كل بشر","يوئيل ٣: ١","أسكب روحي على كل بشر، فيتنبأ بنوكم وبناتكم.","أعمال ٢: ١٧","هذا ما قيل بيوئيل النبي، كما يعلن بطرس صبيحة يوم الخمسين.",""],["تسبيح الأطفال","مزمور ٨: ٣","من أفواه الأطفال والرضّع أسّست حمدًا.","متى ٢١: ١٦","أما قرأتم قط: من أفواه الأطفال هيّأت تسبيحًا؟",""],["القوس فوق العرش","تكوين ٩: ١٣","وضعت قوسي في السحاب فتكون علامة ميثاق بيني وبين الأرض.","رؤيا ٤: ٣","وقوس قزح حول العرش في المنظر شبه الزمرّد.","العلامة المعطاة لنوح تحيط بعرش الله في آخر الأزمنة: الميثاق ما زال قائمًا."],["الإيمان محسوبًا برًّا","تكوين ١٥: ٦","فآمن بالرب فحسبه له برًّا.","رومية ٤: ٣","لأنه ماذا يقول الكتاب؟ فآمن إبراهيم بالله فحُسب له برًّا.","آية بولس المفتاحية: البرّ المنال بالإيمان يسبق الناموس بأربعة قرون."],["ختان القلب","تثنية ٣٠: ٦","ويختن الرب إلهك قلبك، لكي تحب الرب إلهك من كل قلبك.","رومية ٢: ٢٩","وختان القلب بالروح لا بالكتاب هو الختان.","كان موسى قد أعلن منذ البدء أن العلامة الخارجية غايتها تحوّل داخلي."],["مملكة كهنة","خروج ١٩: ٦","وأنتم تكونون لي مملكة كهنة وأمة مقدسة.","١ بطرس ٢: ٩","وأما أنتم فجنس مختار، وكهنوت ملوكي، أمة مقدسة، شعب اقتناء.","الدعوة المعطاة في سيناء يوسّعها بطرس لتشمل جميع الذين هم للمسيح."],["دم العهد","خروج ٢٤: ٨","وأخذ موسى الدم وقال: هوذا دم العهد الذي قطعه الرب معكم.","متى ٢٦: ٢٨","هذا هو دمي الذي للعهد الجديد الذي يُسفك من أجل كثيرين لمغفرة الخطايا.","في العشاء الأخير يستعيد يسوع صيغة سيناء حرفيًا — ويضع نفسه موضع الذبيحة."],["العهد الجديد","إرميا ٣١: ٣١","ها أيام تأتي، يقول الرب، وأقطع مع بيت إسرائيل عهدًا جديدًا.","لوقا ٢٢: ٢٠","هذه الكأس هي العهد الجديد بدمي الذي يُسفك عنكم.","إرميا هو السفر الوحيد في العهد القديم الذي يستعمل عبارة «عهد جديد». ويستعيدها يسوع والكأس في يده."],["الشريعة المكتوبة في القلوب","إرميا ٣١: ٣٣","أجعل شريعتي في داخلهم وأكتبها على قلوبهم.","عبرانيين ٨: ١٠","تقتبس الرسالة إلى العبرانيين وعد إرميا كاملًا — وهو أطول اقتباس من العهد القديم في العهد الجديد.",""],["قلب لحم","حزقيال ٣٦: ٢٦","وأعطيكم قلبًا جديدًا… وأنزع قلب الحجر من لحمكم.","٢ كورنثوس ٣: ٣","رسالة مكتوبة لا في ألواح حجرية بل في ألواح قلب لحمية.",""],["«لُوعَمِّي» يصير شعبي","هوشع ٢: ٢٥","وأقول لِلُوعَمِّي: أنت شعبي، وهو يقول: أنت إلهي.","رومية ٩: ٢٥","كما يقول في هوشع أيضًا: سأدعو الذي ليس شعبي شعبي.","انفتاح العهد على الأمم كان حاضرًا في الأنبياء من قبل."],["العهد الزوجي","تكوين ٢: ٢٤","يترك الرجل أباه وأمه ويلتصق بامرأته ويكونان جسدًا واحدًا.","أفسس ٥: ٣١-٣٢","هذا السرّ عظيم، ولكنني أنا أقول من نحو المسيح والكنيسة.","يعيد بولس قراءة أول زواج بوصفه صورةً لاتحاد المسيح بشعبه."],["المسيح فصحنا","خروج ١٢: ٦","يذبحه كل جمهور جماعة إسرائيل في العشية.","١ كورنثوس ٥: ٧","فصحنا أيضًا المسيح قد ذُبح لأجلنا.","كلمات قليلة من بولس تكفي: ليلة مصر كلها تجد معناها عند الصليب."],["الفصح المشتهى","خروج ١٢: ١٤","ويكون لكم هذا اليوم تذكارًا… تعيّدونه فريضة أبدية.","لوقا ٢٢: ١٥","شهوةً اشتهيت أن آكل هذا الفصح معكم قبل أن أتألم.","في أثناء تذكار الخلاص الأول يؤسس يسوع تذكار الخلاص الثاني."],["الخبز الحقيقي من السماء","خروج ١٦: ٤","ها أنا أمطر لكم خبزًا من السماء.","يوحنا ٦: ٣٢-٣٥","أبي يعطيكم الخبز الحقيقي من السماء… أنا هو خبز الحياة.","يوحنا ٦ كله شرحٌ للمنّ: عطية البرية كانت تبشّر بعطية أعظم."],["برّ السماء","مزمور ٧٨: ٢٤","وأمطر عليهم منًّا للأكل… وبرّ السماء أعطاهم.","يوحنا ٦: ٣١","آباؤنا أكلوا المنّ في البرية، كما هو مكتوب: أنه أعطاهم خبزًا من السماء ليأكلوا.","الجمع يستشهد بهذا المزمور أمام يسوع — فيجيب مشيرًا إلى نفسه."],["الصخرة المضروبة","خروج ١٧: ٦","تضرب الصخرة فيخرج منها ماء ليشرب الشعب.","١ كورنثوس ١٠: ٤","كانوا يشربون من صخرة روحية تابعتهم، والصخرة كانت المسيح.","ضُربت مرة واحدة، فتدفّق الماء لشعب بأكمله."],["خبز ملكي صادق وخمره","تكوين ١٤: ١٨","وملكي صادق، ملك شاليم، أخرج خبزًا وخمرًا. وكان كاهنًا لله العلي.","عبرانيين ٧: ١-٣","ملكي صادق… مشبَّهًا بابن الله، يبقى كاهنًا إلى الأبد.","ملكٌ كاهن بلا نسب، خبز وخمر وبركة — بعد أربعة عشر أصحاحًا من بداية الكتاب المقدس."],["«هلموا كلوا من طعامي»","أمثال ٩: ٥","الحكمة تنادي: هلموا كلوا من طعامي، واشربوا من الخمر التي مزجتها.","يوحنا ٦: ٥١","أنا هو الخبز الحي الذي نزل من السماء. إن أكل أحد من هذا الخبز يحيا إلى الأبد.","دعوة الحكمة تصير دعوة المسيح."],["الباكورة","لاويين ٢٣: ١٠","تجيئون بحزمة أول حصيدكم إلى الكاهن.","١ كورنثوس ١٥: ٢٠","قد قام المسيح من الأموات وصار باكورة الراقدين.","كان عيد الباكورة يقع غداة سبت الفصح — صبيحة القيامة نفسها."],["هلموا بلا فضة","إشعياء ٥٥: ١","أيها العطاش جميعًا هلموا إلى المياه؛ اشتروا… بلا فضة وبلا ثمن.","رؤيا ٢٢: ١٧","ومن يعطش فليأتِ. ومن يُرد فليأخذ ماء حياة مجانًا.","آية الدعوة قبل الأخيرة في الكتاب المقدس تجيب إشعياء: كل شيء عطية."],["آدم الأول وآدم الأخير","تكوين ٢: ٧","وجبل الرب الإله آدم… فصار آدم نفسًا حية.","١ كورنثوس ١٥: ٤٥","صار آدم، الإنسان الأول، نفسًا حية، وآدم الأخير روحًا محييًا.","يقرأ بولس التاريخ كله بين رجلين: واحد به دخل الموت، وآخر به تعود الحياة."],["بإنسان واحد","تكوين ٣: ٦","فأخذت من ثمره وأكلت، وأعطت رجلها أيضًا فأكل.","رومية ٥: ١٩","بإطاعة الواحد سيُجعل الكثيرون أبرارًا.","شجرة في الجنة وشجرة في الجلجثة: المعصية تُبطلها الطاعة."],["الفلك والمعمودية","تكوين ٦: ١٤","اصنع لنفسك فلكًا من خشب جفر… أقيم عهدي معك.","١ بطرس ٣: ٢٠-٢١","ثماني أنفس خلصوا بالماء: الذي مثاله المعمودية.","بطرس نفسه يستعمل كلمة «مثال»: فالكتاب المقدس يعلّم بنفسه قراءته الرمزية."],["سلّم يعقوب","تكوين ٢٨: ١٢","سلّم منصوبة على الأرض ورأسها يمسّ السماء، والملائكة صاعدة ونازلة عليها.","يوحنا ١: ٥١","ترون السماء مفتوحة، وملائكة الله يصعدون وينزلون على ابن الإنسان.","يسوع يشير إلى نفسه بوصفه السلّم عينه: الموضع الذي تلتقي فيه السماء والأرض."],["مُباعٌ من ذويه","تكوين ٣٧: ٢٨","باعوا يوسف للإسماعيليين بعشرين من الفضة.","متى ٢٦: ١٥","فجعلوا له ثلاثين من الفضة.","يوسف: خانه إخوته، وبيع، وحُكم عليه ظلمًا، ثم رُفع ليخلّص الذين أسلموه. حياة كاملة في صورة مصغّرة."],["الفادي المرفوض أولاً","خروج ٢: ١٤","من جعلك رئيسًا وقاضيًا علينا؟","أعمال ٧: ٣٥","هذا موسى الذي أنكروه… هذا أرسله الله رئيسًا وفاديًا.","إسطفانوس، في خطابه الأخير، يقرأ موسى رمزًا للمسيح: مرفوضًا في المرة الأولى، ومعترفًا به في الثانية."],["راحة أعظم من يشوع","يشوع ١: ٢","قم اعبر هذا الأردن أنت وكل هذا الشعب إلى الأرض التي أنا معطيها لهم.","عبرانيين ٤: ٨","لأنه لو كان يشوع قد أراحهم لما تكلم بعد ذلك عن يوم آخر.","يشوع ويسوع يحملان الاسم العبري نفسه: يشوع، «الرب يخلّص»."],["آية يونان","يونان ٢: ١","كان يونان في جوف الحوت ثلاثة أيام وثلاث ليال.","متى ١٢: ٤٠","هكذا يكون ابن الإنسان في قلب الأرض ثلاثة أيام وثلاث ليال.","«الآية» الوحيدة التي وعد بها يسوع جيله: موته وقيامته، وقد رسمهما يونان من قبل."],["تكثير الأرغفة","٢ ملوك ٤: ٤٣-٤٤","أعط الشعب فيأكلوا، لأنه هكذا قال الرب: يأكلون ويفضل عنهم.","يوحنا ٦: ١١-١٣","أخذ يسوع الأرغفة وشكر ووزّع… فملأوا اثنتي عشرة قفة من الكسر التي فضلت.","أليشع أطعم مئة رجل بعشرين رغيفًا؛ ويسوع خمسة آلاف بخمسة. لقد فاقت الحقيقة الرمزَ من كل جهة."],["الله يسكن في وسطنا","خروج ٢٥: ٨","فيصنعون لي مقدسًا لأسكن في وسطهم.","يوحنا ١: ١٤","والكلمة صار جسدًا وحلّ بيننا.","الفعل اليوناني عند يوحنا يعني حرفيًا «نصب خيمته»: خيمة البرية تصير شخصًا."],["الحجاب المنشق","خروج ٢٦: ٣٣","ويفصل لكم الحجاب بين القدس وقدس الأقداس.","متى ٢٧: ٥١","وإذا حجاب الهيكل قد انشق إلى اثنين، من فوق إلى أسفل.","انشق من فوق: ليس الإنسان هو الذي فتح الطريق."],["طريق عبر الحجاب","خروج ٢٦: ٣٣","ويفصل لكم الحجاب…","عبرانيين ١٠: ٢٠","…طريقًا كرّسه لنا حديثًا حيًّا، بالحجاب، أي جسده.",""],["رئيس الكهنة يدخل مرة واحدة","لاويين ١٦: ١٥","يدخل هارون إلى قدس الأقداس بالدم مرة في السنة.","عبرانيين ٩: ١٢","دخل المسيح مرة واحدة إلى الأقداس بدم نفسه.","مرة في السنة تصير مرة واحدة وإلى الأبد؛ ودم الحيوان يصير دمه هو."],["كاهن إلى الأبد","مزمور ١١٠: ٤","أنت كاهن إلى الأبد على رتبة ملكي صادق.","عبرانيين ٧: ١٧","لأنه يشهد أنك كاهن إلى الأبد على رتبة ملكي صادق.","كهنوت أقدم من كهنوت هارون، ولا ينتهي أبدًا."],["هيكل جسده","١ ملوك ٨: ١١","مجد الرب ملأ بيت الرب.","يوحنا ٢: ١٩-٢١","انقضوا هذا الهيكل، وفي ثلاثة أيام أقيمه… وأما هو فكان يقول عن هيكل جسده.","المجد الذي ملأ هيكل سليمان يسكن الآن في جسد."],["النهر الخارج من الهيكل","حزقيال ٤٧: ١","وإذا بمياه تخرج من تحت عتبة البيت نحو المشرق.","يوحنا ٧: ٣٨","من آمن بي، كما قال الكتاب، تجري من بطنه أنهار ماء حي.",""],["نهر الحياة","حزقيال ٤٧: ١","وإذا بمياه تخرج من تحت عتبة البيت…","رؤيا ٢٢: ١","وأراني نهرًا من ماء حياة، خارجًا من عرش الله والخروف.","في النهاية لا يبقى هيكل من حجر: عرش الخروف هو الينبوع."],["الغصن يبني الهيكل","زكريا ٦: ١٢","هوذا الرجل «الغصن» اسمه… ويبني هيكل الرب.","يوحنا ٢: ١٩","انقضوا هذا الهيكل، وفي ثلاثة أيام أقيمه.",""],["السماوات كرسيي","إشعياء ٦٦: ١","هكذا قال الرب: السماوات كرسيي، والأرض موطئ قدمي. أين البيت الذي تبنون لي؟","أعمال ٧: ٤٩","لكن العلي لا يسكن في هياكل مصنوعات الأيادي، كما يقول النبي.",""],["سلطان أبدي","دانيال ٧: ١٤","فأُعطي سلطانًا ومجدًا وملكوتًا لتتعبد له كل الشعوب والأمم والألسنة.","متى ٢٨: ١٨","دُفع إليّ كل سلطان في السماء وعلى الأرض.","المشهد الأخير في إنجيل متى، على الجبل، هو تتويج ابن الإنسان الذي أنبأ به دانيال."],["«من هو ابن الإنسان؟»","مزمور ٨: ٥-٧","من هو الإنسان حتى تذكره؟ وابن آدم حتى تفتقده؟ جعلت كل شيء تحت قدميه.","عبرانيين ٢: ٨-٩","نرى يسوع مكللاً بالمجد والكرامة من أجل ألم الموت.","المزمور الذي يتعجب من الإنسان عامة يصير، في الرسالة إلى العبرانيين، صورة الإنسان الكامل بامتياز."],["اللقب المفضّل لدى يسوع","حزقيال ٢: ١","يا ابن آدم، قم على قدميك فأتكلم معك.","مرقس ٢: ١٠","لابن الإنسان سلطان على الأرض أن يغفر الخطايا.","«ابن الإنسان»: خوطب بها حزقيال ٩٣ مرة — الإنسان الضعيف أمام الله — ومرة واحدة قيلت عن الشخص السماوي في دانيال ٧. وباختياره هذا اللقب، يجمع يسوع الأمرين معًا: الاتضاع والمجد."],["في وسط المناير","دانيال ٧: ١٣","…وإذا مع سحب السماء مثل ابن إنسان أتى.","رؤيا ١: ١٣","رأيت شبه ابن إنسان، متسربلاً بثوب إلى الرجلين، ومتمنطقًا بمنطقة من ذهب.","يوحنا، في بطمس، يتعرف في القائم من الأموات على صورة رؤيا دانيال بعينها."],["حصاد ابن الإنسان","دانيال ٧: ١٣","…مع سحب السماء مثل ابن إنسان أتى.","رؤيا ١٤: ١٤","وعلى السحابة جالس شبه ابن إنسان، له على رأسه إكليل من ذهب، وفي يده منجل حاد.",""],["رجل يمينك","مزمور ٨٠: ١٨","لتكن يدك على رجل يمينك، وعلى ابن آدم الذي اخترته لنفسك.","لوقا ٢٢: ٦٩","منذ الآن يكون ابن الإنسان جالسًا عن يمين قوة الله.","كان المزمور يجمع مسبقًا بين الصورتين اللتين يقرنهما يسوع أمام قضاته: ابن الإنسان ويمين الله."],["كل شيء تحت قدميه","مزمور ٨: ٧","تسلّطه على أعمال يديك. جعلت كل شيء تحت قدميه.","١ كورنثوس ١٥: ٢٧","أخضع كل شيء تحت قدميه.",""],["«نعمل الإنسان»","تكوين ١: ٢٦","وقال الله: نعمل الإنسان على صورتنا كشبهنا.","كولوسي ١: ١٦","فإنه فيه خُلق الكل: ما في السموات وما على الأرض… الكل به وله قد خُلق.","منذ الصفحة الأولى يتشاور الله بصيغة جمع غامضة. والعهد الجديد يسمّي الكلمة والروح حاضرَين في الخلق."],["الروح الذي يظلّل","تكوين ١: ٢","وروح الله يرفّ على وجه المياه.","لوقا ١: ٣٥","الروح القدس يحلّ عليك، وقوة العليّ تظللك.","الروح الذي كان يرفّ فوق الخليقة الأولى يظلّل مريم في فجر الخليقة الجديدة."],["بكلمته ونسمة فيه","مزمور ٣٣: ٦","بكلمة الرب صُنعت السموات، وبنسمة فيه كل جنودها.","يوحنا ١: ٣","كل شيء به كان، وبغيره لم يكن شيء مما كان.","الكلمة والنسمة عاملتان في الخلق: ما يترنّم به المزمور يسمّيه يوحنا."],["«أهيه»","خروج ٣: ١٤","فقال الله لموسى: أهيه الذي أهيه. هكذا تقول لبني إسرائيل: أهيه أرسلني إليكم.","يوحنا ٨: ٥٨","الحق الحق أقول لكم: قبل أن يكون إبراهيم أنا كائن.","السامعون يفهمون تمامًا فيرفعون حجارة: لقد نطق يسوع للتوّ على نفسه باسم العليقة المتّقدة."],["«اسمع يا إسرائيل» موسَّعة","تثنية ٦: ٤","اسمع يا إسرائيل: الرب إلهنا رب واحد.","١ كورنثوس ٨: ٦","لنا إله واحد: الآب الذي منه جميع الأشياء… ورب واحد: يسوع المسيح الذي به جميع الأشياء.","بولس، اليهودي الغيور، يعيد صياغة قانون إيمان إسرائيل واضعًا يسوع في قلبه — دون أن يكفّ لحظة عن الاعتراف بإله واحد."],["المجد الذي رآه إشعياء","إشعياء ٦: ٣","قدوس قدوس قدوس رب الجنود. مجده ملء كل الأرض.","يوحنا ١٢: ٤١","قال إشعياء هذا حين رأى مجده وتكلم عنه.","يوحنا يؤكد ذلك: المجد الذي شاهده النبي في الهيكل كان مجد المسيح."],["«كرسيك يا الله»","مزمور ٤٥: ٧-٨","كرسيك يا الله إلى دهر الدهور… من أجل ذلك مسحك الله إلهك بدهن الابتهاج.","عبرانيين ١: ٨-٩","وأما عن الابن: كرسيك يا الله إلى دهر الدهور.","المزمور يدعو «الله» ذاك الذي يمسحه «إلهه»: أقنومان وألوهة واحدة. والرسالة إلى العبرانيين تطبّق ذلك على الابن."],["الابن الخالق","مزمور ١٠٢: ٢٦-٢٨","من قِدَم أسستَ الأرض، والسموات هي عمل يديك… وأنت هو وسنوك لن تنتهي.","عبرانيين ١: ١٠-١٢","وأنت يا رب في البدء أسستَ الأرض، والسموات هي عمل يديك.","مزمور موجَّه إلى الرب يُقتبس في الرسالة إلى العبرانيين موجَّهًا إلى الابن — بلا سطر واحد من التبرير: كان ذلك بديهيًا."],["الدعاء بالاسم","يوئيل ٣: ٥","ويكون أن كل من يدعو باسم الرب ينجو.","رومية ١٠: ١٣","كل من يدعو باسم الرب يخلص.","عند يوئيل، الاسم المدعوّ به هو اسم الرب (يهوه)؛ وعند بولس، الرب المعترَف به قبل ثلاث آيات هو يسوع."],["الأول والآخر","إشعياء ٤٤: ٦","هكذا يقول الرب: أنا الأول وأنا الآخر، ولا إله غيري.","رؤيا ٢٢: ١٣","أنا الألف والياء، البداية والنهاية، الأول والآخر.","اللقب الذي يحتفظ به الله لنفسه وحده في إشعياء، يحمله المسيح في الصفحة الأخيرة من الكتاب المقدس."],["مشهد الأردن","إشعياء ٤٢: ١","هوذا عبدي… مختاري الذي سُرَّت به نفسي. وضعت روحي عليه.","متى ٣: ١٦-١٧","رأى روح الله نازلًا مثل حمامة. وصوت من السموات قائلًا: هذا هو ابني الحبيب الذي به سررت.","عند معمودية يسوع: الآب يتكلم من السماء، والابن واقف في الماء، والروح ينزل. إنه المشهد الذي أعلنه إشعياء: حضور ثلاثي وإله واحد."],["غيرة بيتك","مزمور ٦٩: ١٠","غيرة بيتك أكلتني.","يوحنا ٢: ١٧","فتذكر تلاميذه أنه مكتوب: غيرة بيتك أكلتني.","اقتُبست عند أول عمل علني ليسوع في الهيكل."],["مُبغَض بلا سبب","مزمور ٦٩: ٥","أكثر من شعر رأسي الذين يبغضونني بلا سبب.","يوحنا ١٥: ٢٥","لكي تتم الكلمة المكتوبة في ناموسهم: إنهم أبغضوني بلا سبب.",""],["حجر صدمة","إشعياء ٨: ١٤","ويكون مقدسًا، وحجر صدمة وصخرة عثرة.","رومية ٩: ٣٣","ها أنا أضع في صهيون حجر صدمة… وكل من يؤمن به لا يُخزى.","الحجر نفسه: أساس لقوم وعثرة لآخرين."],["أصل يسّى","إشعياء ١١: ١٠","أصل يسّى القائم راية للشعوب، إياه تطلب الأمم.","رومية ١٥: ١٢","وأيضًا يقول إشعياء: سيكون أصل يسّى… عليه سيكون رجاء الأمم.",""],["نور للأمم","إشعياء ٤٩: ٦","فقد جعلتك نورًا للأمم، لتكون خلاصي إلى أقصى الأرض.","أعمال ١٣: ٤٧","لأن هكذا أوصانا الرب: قد أقمتك نورًا للأمم.","بولس وبرنابا يقرآن رسالتهما الخاصة في نشيد العبد."],["الظهر المبذول","إشعياء ٥٠: ٦","بذلت ظهري للضاربين، وخدّيّ للناتفين.","متى ٢٦: ٦٧","حينئذ بصقوا في وجهه ولكموه.",""],["الشمس تغيب في الظهر","عاموس ٨: ٩","أغيّب الشمس في الظهر، وأقتم الأرض في يوم نور.","متى ٢٧: ٤٥","ومن الساعة السادسة كانت ظلمة على كل الأرض إلى الساعة التاسعة.",""],["في يديك","مزمور ٣١: ٦","في يدك أستودع روحي. فديتني يا رب إله الحق.","لوقا ٢٣: ٤٦","ونادى يسوع بصوت عظيم وقال: يا أبتاه، في يديك أستودع روحي.","آخر كلمة على الصليب آية من مزمور — صلاة المساء عند بني إسرائيل."],["علامات المسيّا","إشعياء ٣٥: ٥-٦","حينئذ تتفقّح عيون العمي… حينئذ يقفز الأعرج كالإيل.","متى ١١: ٥","العمي يبصرون والعرج يمشون… والمساكين يبشَّرون.","جواب يسوع لرسل يوحنا المعمدان فسيفساء من نصوص إشعياء."],["لا بد أن يأتي إيليا","ملاخي ٤: ٥","هأنذا أرسل إليكم إيليا النبي قبل مجيء يوم الرب.","متى ١٧: ١١-١٣","إيليا قد جاء… حينئذ فهم التلاميذ أنه قال لهم عن يوحنا المعمدان.",""],["اليوم الثالث","هوشع ٦: ٢","يحيينا بعد يومين. في اليوم الثالث يقيمنا.","١ كورنثوس ١٥: ٤","أنه قام في اليوم الثالث حسب الكتب.","يقول بولس «حسب الكتب» من غير أن يقتبس؛ وهوشع أحد النصوص التي سمعها التقليد وراء هذه العبارة."],["صعد إلى العلاء","مزمور ٦٨: ١٩","صعدت إلى العلاء. سبيت سبيا.","أفسس ٤: ٨","لذلك يقول: إذ صعد إلى العلاء سبى سبيا.",""],["كوكب يعقوب","عدد ٢٤: ١٧","يبرز كوكب من يعقوب، ويقوم قضيب من إسرائيل.","متى ٢: ٢","أين هو المولود ملك اليهود؟ فإننا رأينا نجمه في المشرق.","نبوءة بلعام، التي قُرئت قراءة مسيانية قبل مجيء المجوس بزمن طويل."],["الذهب واللبان","إشعياء ٦٠: ٦","كلها تأتي من شبا. تحمل ذهبا ولبانا، وتبشر بتسابيح الرب.","متى ٢: ١١","قدموا له هدايا: ذهبا ولبانا ومرا.",""],["«فلينقذه!»","مزمور ٢٢: ٩","اتكل على الرب فلينجه. لينقذه لأنه سر به.","متى ٢٧: ٤٣","قد اتكل على الله، فلينقذه الآن إن أراده!","عند أقدام الصليب يقتبس المستهزئون المزمور ٢٢ من غير أن يدروا."],["الذين لم يسمعوا","إشعياء ٥٢: ١٥","قد أبصروا ما لم يخبروا به، وما لم يسمعوه فهموه.","رومية ١٥: ٢١","كما هو مكتوب: الذين لم يخبروا به سيبصرون.","يجعل بولس من الآية الأخيرة في مقدمة نشيد العبد خارطة طريقه الإرسالية."],["مبارك الآتي","مزمور ١١٨: ٢٦","مبارك الآتي باسم الرب!","متى ٢١: ٩","أوصنا لابن داود! مبارك الآتي باسم الرب!",""],["اليد الموضوعة على الرأس","لاويين ١: ٤","يضع يده على رأس المحرقة، فيرضى عليه للتكفير عنه.","٢ كورنثوس ٥: ٢١","جعل الذي لم يعرف خطية، خطية لأجلنا.","حركة النقل: الذنب ينتقل من المقرِّب إلى الذبيحة."],["لعنة الخشبة","تثنية ٢١: ٢٣","المعلق ملعون من الله.","غلاطية ٣: ١٣","المسيح افتدانا من لعنة الناموس، إذ صار لعنة لأجلنا: ملعون كل من علق على خشبة.",""],["حمل أمراضنا","إشعياء ٥٣: ٤","أحزاننا حملها، وأوجاعنا تحملها.","متى ٨: ١٧","لكي يتم ما قيل بإشعياء النبي: هو أخذ أسقامنا وحمل أمراضنا.","يطبق متى إشعياء ٥٣ على الشفاءات منذ الآن: الحمل يبدأ قبل الصليب."],["لا ظلم ولا غش","إشعياء ٥٣: ٩","لم يعمل ظلما، ولم يكن في فمه غش.","١ بطرس ٢: ٢٢","الذي لم يفعل خطية، ولا وجد في فمه مكر.",""],["يحفظ جميع عظامه","مزمور ٣٤: ٢١","يحفظ جميع عظامه. واحد منها لا ينكسر.","يوحنا ١٩: ٣٦","هذا كان ليتم الكتاب القائل: عظم لا يكسر منه.","وراء يوحنا ١٩: ٣٦ يتراكب نصان: قاعدة خروف الفصح والوعد المقطوع للبار."],["خارج المحلة","لاويين ١٦: ٢٧","ثور الخطية وتيس الخطية يخرجان إلى خارج المحلة ويحرقان بالنار.","عبرانيين ١٣: ١٢","لذلك يسوع أيضا، لكي يقدس الشعب بدم نفسه، تألم خارج الباب.",""],["الرماد الذي يطهر","عدد ١٩: ٩","يجمع رماد البقرة: هو ماء نجاسة، إنها ذبيحة خطية.","عبرانيين ٩: ١٣-١٤","إن كان رماد عجلة مرشوشا على المنجسين يقدس… فكم بالحري دم المسيح يطهر ضمائركم!",""],["«هأنذا»","مزمور ٤٠: ٧-٩","بذبيحة وتقدمة لم تسر… حينئذ قلت: هأنذا جئت.","عبرانيين ١٠: ٥-٧","المسيح عند دخوله إلى العالم يقول: ذبيحة وقربانا لم ترد، ولكن هيأت لي جسدا… هأنذا أجيء لأفعل مشيئتك.","في الرسالة إلى العبرانيين يصير المزمور صلاة الابن وهو داخل إلى العالم."],["لا زيادة ولا نقصان","خروج ١٦: ١٨","لم يفضل المكثر، والمقلل لم ينقص.","٢ كورنثوس ٨: ١٥","كما هو مكتوب: الذي جمع كثيرا لم يفضل.","قاعدة المن تصير قاعدة المشاركة المسيحية."],["ليس بالخبز وحده","تثنية ٨: ٣","ليس بالخبز وحده يحيا الإنسان، بل بكل ما يخرج من فم الرب يحيا الإنسان.","متى ٤: ٤","مكتوب: ليس بالخبز وحده يحيا الإنسان، بل بكل كلمة تخرج من فم الله.","في البرية يرد يسوع على التجربة بدرس المن نفسه."],["كأس الخلاص","مزمور ١١٦: ١٣","كأس الخلاص أتناول، وباسم الرب أدعو.","١ كورنثوس ١٠: ١٦","كأس البركة التي نباركها، أليست هي شركة دم المسيح؟","«كأس البركة»: عبارة من وليمة الفصح، يستعيدها بولس كما هي."],["رأوا الله وأكلوا","خروج ٢٤: ١١","رأوا الله وأكلوا وشربوا.","رؤيا ٣: ٢٠","إن سمع أحد صوتي وفتح الباب، أدخل إليه وأتعشى معه وهو معي.","العهد يُختم على المائدة — من سيناء إلى باب لاودكية."],["من الثمر المأخوذ إلى الوليمة الممنوحة","تكوين ٣: ٦","أخذت من ثمره وأكلت.","رؤيا ١٩: ٩","طوبى للمدعوين إلى عشاء عرس الخروف!","دخل الشر من فم، وتعود الشركة من مائدة. الصفحة الأولى والصفحة الأخيرة: وليمة."],["الوليمة لجميع الشعوب","إشعياء ٢٥: ٦","يصنع رب الجنود لجميع الشعوب وليمة سمائن.","رؤيا ١٩: ٩","طوبى للمدعوين إلى عشاء عرس الخروف!",""],["الزوفا","خروج ١٢: ٢٢","وخذوا باقة زوفا واغمسوها في الدم.","يوحنا ١٩: ٢٩","فملأوا إسفنجة من الخل، ووضعوها على زوفا وقدموها إلى فمه.","أداة دم الفصح تعود فتظهر في اللحظة عينها التي يموت فيها الحمل."],["قسم المريا","تكوين ٢٢: ١٦-١٧","بذاتي أقسمت… أباركك مباركة وأكثر نسلك تكثيرا.","عبرانيين ٦: ١٣-١٤","الله، إذ لم يكن له أعظم يقسم به، أقسم بنفسه قائلا: إني لأباركنك بركة.",""],["«أنا أكون له أبا»","٢ صموئيل ٧: ١٤","أنا أكون له أبا وهو يكون لي ابنا.","عبرانيين ١: ٥","وأيضا: أنا أكون له أبا وهو يكون لي ابنا.",""],["الجميع متعلمون من الله","إشعياء ٥٤: ١٣","وكل بنيك تلاميذ الرب.","يوحنا ٦: ٤٥","إنه مكتوب في الأنبياء: ويكون الجميع متعلمين من الله.",""],["عهد أبدي","إرميا ٣٢: ٤٠","وأقطع لهم عهدا أبديا، أني لا أرجع عنهم.","عبرانيين ١٣: ٢٠","…بدم العهد الأبدي.",""],["راع واحد","حزقيال ٣٤: ٢٣","وأقيم عليها راعيا واحدا فيرعاها، عبدي داود.","يوحنا ١٠: ١١","أنا هو الراعي الصالح، والراعي الصالح يبذل نفسه عن الخراف.","عند حزقيال يقول الله «أنا أرعى غنمي»، ثم يعلن «راعيا واحدا»: ويوحنا ١٠ يمسك بالطرفين معا."],["الكلمة القريبة جدا","تثنية ٣٠: ١٤","الكلمة قريبة منك جدا، في فمك وفي قلبك.","رومية ١٠: ٨","لكن ماذا يقول؟ الكلمة قريبة منك… أي كلمة الإيمان التي نكرز بها.",""],["«أسير بينكم»","لاويين ٢٦: ١٢","وأسير بينكم وأكون لكم إلها وأنتم تكونون لي شعبا.","٢ كورنثوس ٦: ١٦","كما قال الله: إني سأسكن فيهم وأسير بينهم، وأكون لهم إلها وهم يكونون لي شعبا.",""],["منقذ صهيون","إشعياء ٥٩: ٢٠","ويأتي الفادي إلى صهيون.","رومية ١١: ٢٦","كما هو مكتوب: سيخرج من صهيون المنقذ.",""],["الولي الفادي","راعوث ٤: ١٤","مبارك الرب الذي لم يعدمك وليا اليوم!","لوقا ١: ٦٨","مبارك الرب إله إسرائيل لأنه افتقد وصنع فداء لشعبه.","بوعز، الولي — القريب الذي له حق الفداء وقلبه — يرسم من بعيد صورة الفادي المولود من نسله (متى ١: ٥)."],["الابن المردود إلى أمه","١ ملوك ١٧: ٢٢","فسمع الرب لصوت إيليا، فرجعت نفس الولد إلى جوفه.","لوقا ٧: ١٤-١٥","أيها الشاب، لك أقول: قم!… فدفعه إلى أمه.","في نايين تهتف الجموع «نبي عظيم»: فقد عرفت مشهد إيليا في صرفة. لكن إيليا كان يصلي، أما يسوع فيأمر."],["خيط القرمز","يشوع ٢: ١٨","اربطي هذه الطاقة من خيوط القرمز في الكوة.","متى ١: ٥","وسلمون ولد بوعز من راحاب.","المرأة ذات الخيط القرمزي تدخل في سلسلة نسب المسيح؛ وقد رأى التقليد القديم في حبلها خيط الخلاص المدلى من الكوة."],["المشير الذي خنق نفسه","٢ صموئيل ١٧: ٢٣","أخيتوفل… أوصى لبيته وخنق نفسه.","متى ٢٧: ٥","فطرح الفضة في الهيكل وانصرف، ثم مضى وخنق نفسه.","صديق داود الذي خان ثم خنق نفسه: الظل الممتد قدام يهوذا (انظر مزمور ٤١: ١٠)."],["كل يوم — مرة واحدة","خروج ٢٩: ٣٨-٣٩","وهذا ما تقدمه على المذبح: خروفان كل يوم دائما.","عبرانيين ١٠: ١١-١٢","وكل كاهن يقوم كل يوم يخدم… وأما هذا فبعدما قدم ذبيحة واحدة، جلس إلى الأبد عن يمين الله.","ذبيحة التاميد الدائمة تتوقف حيث يبدأ القربان الواحد — والكاهن الواقف دائما يجلس أخيرا."],["البرقع المرفوع","خروج ٣٤: ٣٤","وكان موسى عند دخوله أمام الرب ينزع البرقع.","٢ كورنثوس ٣: ١٦","ولكن عندما يرجع إلى الرب يرفع البرقع.",""],["مجد البيت الثاني","حجي ٢: ٩","مجد هذا البيت الأخير يكون أعظم من مجد الأول.","لوقا ٢: ٢٧-٣٢","أخذ سمعان الصبي في الهيكل: عيناي قد أبصرتا خلاصك… نور إعلان للأمم.","الهيكل الثاني لم يكن فيه تابوت ولا سحابة — لكن طفلا ابن أربعين يوما حمل إليه."],["السيد يأتي إلى هيكله","ملاخي ٣: ١","ويأتي بغتة إلى هيكله السيد الذي تطلبونه.","متى ٢١: ١٢","ودخل يسوع إلى هيكل الله وأخرج جميع الذين كانوا يبيعون ويشترون.",""],["بيت صلاة لجميع الشعوب","إشعياء ٥٦: ٧","لأن بيتي بيت الصلاة يدعى لكل الشعوب.","مرقس ١١: ١٧","أليس مكتوبا: بيتي بيت صلاة يدعى لجميع الأمم؟",""],["ثلاثة في آية واحدة","إشعياء ٤٨: ١٦","والآن السيد الرب أرسلني وروحه.","يوحنا ٢٠: ٢١-٢٢","كما أرسلني الآب أرسلكم أنا. ثم نفخ وقال لهم: اقبلوا الروح القدس.","عند إشعياء منذ البدء: مُرسَل يتكلم، ومُرسِل يُرسِل، وروح يرافق."],["«ما اسم ابنه؟»","أمثال ٣٠: ٤","من صعد إلى السماوات ونزل؟… ما اسمه وما اسم ابنه إن عرفت؟","يوحنا ٣: ١٣","وليس أحد صعد إلى السماء إلا الذي نزل من السماء، ابن الإنسان.","السؤال الذي تركه سفر الأمثال مفتوحا؛ ويجيب يسوع نيقوديموس بالعبارات نفسها."],["الروح الذي يمكن إحزانه","إشعياء ٦٣: ١٠","تمردوا وأحزنوا روح قدسه.","أفسس ٤: ٣٠","ولا تحزنوا روح الله القدوس.","روح يمكن أن «يحزن» ليس قوة: إنه شخص — منذ إشعياء."]]};

const DOORS=[{"href":"salle-bibliotheque.html","c":"#b07d54","fr":["La source","Qu'est-ce que la Bible ?","66 livres, une bibliothèque : qui l'a écrite, quand, et comment elle est composée."],"en":["The source","What is the Bible?","66 books, a library: who wrote it, when, and how it is composed."],"ar":["المصدر","ما هو الكتاب المقدس؟","٦٦ سفرًا، مكتبة: من كتبها، ومتى، وكيف تتألف."]},{"href":"section-bible-fiable.html","c":"#7cb47c","fr":["Vérifier","Peut-on lui faire confiance ?","Manuscrits, datations, prophéties, archéologie : les faits, vérifiables."],"en":["Verify","Can it be trusted?","Manuscripts, dating, prophecies, archaeology: the facts, verifiable."],"ar":["تحقَّق","أيمكن الوثوق به؟","مخطوطات وتأريخ ونبوءات وآثار: وقائع يمكن التحقق منها."]},{"href":"frise-prophetes.html","c":"#a583d6","fr":["Les dates","Les veilleurs","Mille ans d'annonces datées, antérieures aux événements — la frise chronologique."],"en":["The dates","The watchmen","A thousand years of dated announcements, prior to the events — the timeline."],"ar":["التواريخ","الحرّاس","ألف سنة من الإعلانات المؤرَّخة السابقة للأحداث — الخط الزمني."]},{"href":"page-fondatrice-emmaus.html","c":"#e0b04f","fr":["Le fil en personne","L'Agneau de Dieu","Pourquoi Jésus meurt-il à l'heure des agneaux ? Le fil central, pas à pas, par la route d'Emmaüs."],"en":["The thread in person","The Lamb of God","Why does Jesus die at the hour of the lambs? The central thread, step by step, by the road to Emmaus."],"ar":["الخيط بذاته","حمل الله","لماذا يموت يسوع في ساعة الحملان؟ الخيط المركزي خطوة خطوة، من طريق عمواس."]},{"href":"salle-trinite.html","c":"#8fb8d8","fr":["Celui qui parle","Le Père, le Fils, l'Esprit","Un seul Dieu, révélé en trois. Qui l'a révélé, et comment ?"],"en":["The one who speaks","The Father, the Son, the Spirit","One God, revealed as three. Who revealed it, and how?"],"ar":["المتكلِّم","الآب والابن والروح","إله واحد، معلَن ثلاثة. من أعلنه وكيف؟"]},{"href":"section-offrande.html","c":"#c98a5e","fr":["La table","L'Offrande","Pourquoi « ceci est mon corps » ? La table, expliquée par les Écritures."],"en":["The table","The Offering","Why “this is my body”? The table, explained by the Scriptures."],"ar":["المائدة","التقدمة","لماذا «هذا هو جسدي»؟ المائدة بحسب الكتب."]}];

let LANG='fr';
const bookName=(k)=>{const b=BOOKS.find(x=>x[0]===k);return LANG==='fr'?b[1]:(LANG==='en'?BLOC[k][1]:BLOC[k][3]);};
const bookAbbr=(k)=>LANG==='fr'?k:(LANG==='en'?BLOC[k][0]:BLOC[k][2]);
function loc(i){
  if(LANG!=='fr'&&i<D.length){const e=TR[LANG][i];return{t:e[0],ra:e[1],ta:e[2],rn:e[3],tn:e[4],n:e[5]};}
  const d=ALL[i]||D[i];return{t:d[7],ra:d[2],ta:d[8],rn:d[5],tn:d[9],n:d[10]};
}

/* ---------- Géométrie ---------- */
const W=1200,H=585,ML=24,MR=24,BASE=436,MAXH=396;
const offs={};let tot=0;BOOKS.forEach(b=>{offs[b[0]]=tot;tot+=b[2];});
const innerW=W-ML-MR;
const X=(bk,ch)=>ML+((offs[bk]+ch-0.5)/tot)*innerW;

const svg=document.getElementById('viz');
const NS="http://www.w3.org/2000/svg";
function el(n,at,parent){const e=document.createElementNS(NS,n);for(const k in at)e.setAttribute(k,at[k]);(parent||svg).appendChild(e);return e;}

/* barres des livres (titre localisé à la volée) */
const barTitles=[];
BOOKS.forEach(b=>{
  const x=ML+(offs[b[0]]/tot)*innerW, w=(b[2]/tot)*innerW;
  const h=8+(b[2]/150)*58;
  const r=el('rect',{x:x+0.4,y:BASE+4,width:Math.max(w-0.8,1),height:h,class:'bar'});
  const t=el('title',{},r);barTitles.push({k:b[0],ch:b[2],node:t});
});
el('line',{x1:ML,y1:BASE,x2:W-MR,y2:BASE,class:'baseline'});
const xdiv=ML+(offs["Mt"]/tot)*innerW;
el('line',{x1:xdiv,y1:60,x2:xdiv,y2:BASE+70,class:'divider'});
const atLabel=el('text',{x:ML+2,y:H-8,class:'tlabel'});
const ntLabel=el('text',{x:W-MR-2,y:H-8,class:'tlabel','text-anchor':'end'});
const abbrEls=[];
["Gen","Ex","Lév","Deut","Ps","És","Jér","Éz","Dan","Za","Mt","Lc","Jn","Ac","Rm","Héb","Ap"].forEach(a=>{
  const b=BOOKS.find(x=>x[0]===a);
  const x=ML+((offs[a]+b[2]/2)/tot)*innerW;
  abbrEls.push({k:a,node:el('text',{x:x,y:BASE+82,class:'blabel','text-anchor':'middle'})});
});
function refreshSvgLabels(){
  const c=T[LANG];
  atLabel.textContent=c.at;ntLabel.textContent=c.nt;
  barTitles.forEach(o=>o.node.textContent=bookName(o.k)+" — "+o.ch+" "+c.chWord);
  abbrEls.forEach(o=>o.node.textContent=bookAbbr(o.k));
}

/* arcs — rendu dynamique (base + contributions validées) */
const tt=document.getElementById('tt');
const arcs=[];
let ALL=[];
function makeArc(d,i,comm){
  const x1=X(d[0],d[1]),x2=X(d[3],d[4]);
  if(!(x1<x2))return;
  const rx=(x2-x1)/2, ry=Math.min(rx*0.72,MAXH);
  const p=el('path',{d:`M ${x1} ${BASE} A ${rx} ${ry} 0 0 1 ${x2} ${BASE}`,class:'arc draw'+(comm?' comm':''),stroke:THEMES[d[6]].hex});
  p.style.animationDelay=(Math.min(i,90)*14)+"ms";
  p.style.color=THEMES[d[6]].hex;
  p.dataset.i=i;p.dataset.t=d[6];p.dataset.comm=comm?"1":"";
  p.addEventListener('mousemove',ev=>{
    const L=loc(i);
    tt.style.display='block';
    tt.innerHTML=`<div>${esc(L.t)}</div><div class="tt-refs">${esc(L.ra)} → ${esc(L.rn)}</div>`;
    const r=svg.parentElement.getBoundingClientRect();
    tt.style.left=Math.min(ev.clientX-r.left+14,r.width-250)+"px";
    tt.style.top=(ev.clientY-r.top-10)+"px";
  });
  p.addEventListener('mouseleave',()=>tt.style.display='none');
  p.addEventListener('click',()=>select(i));
  arcs.push(p);
}
function renderAll(){
  arcs.forEach(p=>p.remove());arcs.length=0;
  ALL=D.concat(store.approved.map(x=>x.d));
  ALL.forEach((d,i)=>makeArc(d,i,i>=D.length));
  applyFilter();
  refreshFooter();
}

/* ---------- Filtres ---------- */
const active=new Set(Object.keys(THEMES));
const chipsEl=document.getElementById('chips');
function buildChips(){
  chipsEl.innerHTML="";
  Object.entries(THEMES).forEach(([key,v])=>{
    const b=document.createElement('button');
    b.className='chip';b.setAttribute('aria-pressed',active.has(key)?'true':'false');
    b.style.setProperty('--c',v.hex);
    b.innerHTML=`<span class="dot"></span>${v[LANG]} <span style="opacity:.55">${D.filter(d=>d[6]===key).length}</span>`;
    b.addEventListener('click',()=>{
      const on=b.getAttribute('aria-pressed')==='true';
      if(active.size===Object.keys(THEMES).length && on){
        active.clear();active.add(key);
        chipsEl.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed', c===b?'true':'false'));
      } else {
        if(on){active.delete(key);b.setAttribute('aria-pressed','false');}
        else{active.add(key);b.setAttribute('aria-pressed','true');}
        if(active.size===0){Object.keys(THEMES).forEach(k=>active.add(k));
          chipsEl.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed','true'));}
      }
      applyFilter();
    });
    chipsEl.appendChild(b);
  });
}
function applyFilter(){
  arcs.forEach(p=>p.classList.toggle('dim',!active.has(p.dataset.t)));
}

/* ---------- Sélection & panneau ---------- */
const panel=document.getElementById('panel');
let selIdx=-1;
function select(i,noScroll){
  selIdx=i;
  arcs.forEach(p=>p.classList.toggle('sel',+p.dataset.i===i));
  const d=ALL[i],th=THEMES[d[6]],comm=i>=D.length,L=loc(i),c=T[LANG];
  panel.innerHTML=`
    <div class="card">
      <span class="badge" style="--tc:${th.hex}">${th[LANG]}</span>${comm?`<span class="comm-badge">${c.commBadge}</span>`:''}
      <h2 class="display">${esc(L.t)}</h2>
      <div class="verse">
        <div class="ref">${esc(L.ra)}</div>
        <p>${c.q1}${esc(L.ta)}${c.q2}</p>
      </div>
      <div class="thread"><span class="l"></span>${c.accompli}<span class="l"></span></div>
      <div class="verse">
        <div class="ref">${esc(L.rn)}</div>
        <p>${c.q1}${esc(L.tn)}${c.q2}</p>
      </div>
      ${L.n?`<div class="note">${esc(L.n)}</div>`:""}
    </div>`;
  panel.classList.add('show');
  if(!noScroll&&window.innerWidth<900) panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ---------- Stockage partagé (prototype) ---------- */
const KEY="filrouge:data";
let store={pending:[],approved:[]};
const hasStorage=typeof window.storage!=="undefined";
async function loadStore(){
  if(!hasStorage)return;
  try{const r=await window.storage.get(KEY,true);if(r&&r.value)store=JSON.parse(r.value);}
  catch(e){/* clé absente : premier lancement */}
}
async function saveStore(){
  if(!hasStorage)return false;
  try{const r=await window.storage.set(KEY,JSON.stringify(store),true);return !!r;}
  catch(e){return false;}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ---------- Formulaire de proposition ---------- */
const $=id=>document.getElementById(id);
function fillSelects(){
  const th=$('f-theme');const tv=th.value;th.innerHTML="";
  Object.entries(THEMES).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v[LANG];th.appendChild(o);});
  if(tv)th.value=tv;
  const ob=$('f-ob'),nb=$('f-nb');const ov=ob.value,nv=nb.value;
  ob.innerHTML="";nb.innerHTML="";
  BOOKS.forEach((b,i)=>{
    const o=document.createElement('option');o.value=b[0];o.textContent=bookName(b[0]);
    (i<39?ob:nb).appendChild(o);
  });
  if(ov)ob.value=ov;if(nv)nb.value=nv;
}
function formMsg(t,err){const m=$('f-msg');m.textContent=t;m.className='msg'+(err?' err':'');}
$('f-send').addEventListener('click',async()=>{
  const c=T[LANG];
  const ob=$('f-ob').value,nb=$('f-nb').value;
  const oc=+$('f-oc').value,nc=+$('f-nc').value;
  const obk=BOOKS.find(b=>b[0]===ob),nbk=BOOKS.find(b=>b[0]===nb);
  const oref=$('f-oref').value.trim(),nref=$('f-nref').value.trim();
  const ot=$('f-otext').value.trim(),nt=$('f-ntext').value.trim();
  const title=$('f-title').value.trim(),note=$('f-note').value.trim(),name=$('f-name').value.trim();
  if(!title||!oref||!nref||!ot||!nt){formMsg(c.msgFill,true);return;}
  if(oc<1||oc>obk[2]){formMsg(c.msgChap.replace('{b}',bookName(ob)).replace('{n}',obk[2]),true);return;}
  if(nc<1||nc>nbk[2]){formMsg(c.msgChap.replace('{b}',bookName(nb)).replace('{n}',nbk[2]),true);return;}
  const d=[ob,oc,oref,nb,nc,nref,$('f-theme').value,title,ot,nt,note+(name?` — ${c.proposedBy} ${name}`:"")];
  store.pending.push({id:Date.now(),d:d});
  const ok=await saveStore();
  formMsg(ok?c.msgOk:c.msgLocal);
  ['f-title','f-oref','f-nref','f-otext','f-ntext','f-note','f-name'].forEach(i=>$(i).value="");
});

/* ---------- Modération (code de démonstration : AGNEAU-53) ---------- */
const ADMIN_CODE="AGNEAU-53";
$('mod-open').addEventListener('click',()=>{
  if($('mod-code').value!==ADMIN_CODE){$('mod-msg').textContent="Code incorrect.";return;}
  $('mod-lock').style.display='none';$('mod-list').style.display='block';renderMod();
});
function renderMod(){
  const box=$('mod-list');
  if(!store.pending.length){box.innerHTML='<p class="hint">Aucune proposition en attente.</p>';return;}
  box.innerHTML='<p class="hint">'+store.pending.length+' proposition(s) en attente de relecture :</p>';
  store.pending.forEach(item=>{
    const d=item.d,div=document.createElement('div');div.className='pending';
    div.innerHTML=`<div class="refs">${esc(d[2])} → ${esc(d[5])} · ${THEMES[d[6]]?THEMES[d[6]].fr:d[6]}</div>
      <strong>${esc(d[7])}</strong>
      <p>« ${esc(d[8])} »</p><p>« ${esc(d[9])} »</p>${d[10]?`<p>${esc(d[10])}</p>`:""}
      <div class="row"><button class="btn ok">Valider</button><button class="btn no">Refuser</button></div>`;
    div.querySelector('.ok').addEventListener('click',async()=>{
      store.pending=store.pending.filter(x=>x.id!==item.id);
      store.approved.push(item);
      await saveStore();renderAll();renderMod();
    });
    div.querySelector('.no').addEventListener('click',async()=>{
      store.pending=store.pending.filter(x=>x.id!==item.id);
      await saveStore();renderMod();
    });
    box.appendChild(div);
  });
}

/* ---------- Sections localisées ---------- */
function refreshFurther(){
  const c=T[LANG];
  document.getElementById('further').innerHTML=`
    <div class="flabel">${c.flabel}</div>
    <h2>${c.fh2}</h2>
    <div class="doors">${DOORS.map(d=>`
      <a class="doorcard" href="${d.href}" style="--dc:${d.c}">
        <div class="dtag"><span class="dot"></span>${d[LANG][0]}</div>
        <h3>${d[LANG][1]}</h3>
        <p>${d[LANG][2]}</p>
      </a>`).join("")}
    </div>
    <div class="allrooms"><a href="seuil-landing.html">${c.allrooms}</a></div>`;
}
function refreshFooter(){
  const c=T[LANG];
  const n=D.length+(store.approved.length?` (+ ${store.approved.length})`:"");
  document.getElementById('foot').innerHTML=c.foot.replace('{N}',n);
}

/* ---------- Rendu par langue ---------- */
function render(l){
  LANG=l;
  document.documentElement.lang=l;
  document.documentElement.dir=(l==='ar')?'rtl':'ltr';
  const c=T[l];
  $('brand').textContent=c.brand;
  $('salleslink').textContent=c.salles;
  $('eyebrow').textContent=c.eyebrow;
  $('h1').innerHTML=c.h1;
  $('epi').innerHTML=`${esc(c.epi)}<span class="eref">${esc(c.epiRef)}</span>`;
  $('lede').textContent=c.lede;
  $('bstats').innerHTML=c.bstats;
  $('c-summary').textContent=c.contribSummary;
  $('c-h3').textContent=c.contribH3;
  $('c-hint').textContent=c.contribHint;
  [['l-theme','lTheme'],['l-title','lTitle'],['l-ob','lObook'],['l-oc','lChap'],['l-oref','lOref'],['l-otext','lOtext'],
   ['l-nb','lNbook'],['l-nc','lChap'],['l-nref','lNref'],['l-ntext','lNtext'],['l-note','lNote'],['l-name','lName']]
   .forEach(([id,k])=>$(id).textContent=c[k]);
  $('f-send').textContent=c.send;
  buildChips();
  refreshSvgLabels();
  refreshFurther();
  refreshFooter();
  fillSelects();
  if(selIdx>=0){select(selIdx,true);}
  else{panel.innerHTML=`<div class="placeholder" id="ph">${esc(c.ph)}</div>`;}
  document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.l===l?'true':'false'));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.l)));

/* ---------- Initialisation ---------- */
loadStore().then(()=>{renderAll();render('fr');});
</script>
