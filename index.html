<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Fil Rouge — Les Écritures se répondent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e18;--bg2:#11141f;--ink:#e9e3d3;--muted:#9a94a8;--gold:#d3a94f;--line:#23273a;
    --agneau:#e0b04f;--prophetie:#6b9bd8;--alliance:#7cb47c;--paque:#d05c5c;--figures:#a583d6;--temple:#57b3ab;--filshomme:#c98a5e;--trinite:#ededed;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.55}
  html[dir="rtl"] body{font-family:'Amiri',serif;line-height:1.85}
  .display{font-family:'Cormorant Garamond',Georgia,serif}
  html[dir="rtl"] .display,html[dir="rtl"] h1,html[dir="rtl"] .card h2,html[dir="rtl"] .form h3,html[dir="rtl"] .doorcard h3,html[dir="rtl"] .further h2{font-family:'Amiri',serif}
  html[dir="rtl"] h1 em,html[dir="rtl"] .verse p,html[dir="rtl"] .epigraph,html[dir="rtl"] .card h2{font-style:normal}
  html[dir="rtl"] .eyebrow,html[dir="rtl"] .bstats,html[dir="rtl"] .flabel,html[dir="rtl"] .dtag,html[dir="rtl"] .verse .ref,html[dir="rtl"] .badge,html[dir="rtl"] .thread{letter-spacing:.05em}
  .stage,.stage svg{direction:ltr}
  /* barre haute */
  .top{max-width:1100px;margin:0 auto;padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.34em;color:var(--gold)}
  html[dir="rtl"] .brand{letter-spacing:.08em}
  .topr{display:flex;gap:10px;align-items:center}
  .langs{display:flex;gap:6px}
  .langs button{font-family:system-ui,sans-serif;font-size:12px;background:none;border:1px solid var(--line);border-radius:6px;color:var(--muted);padding:6px 12px;cursor:pointer}
  .langs button[aria-pressed="true"]{color:var(--ink);border-color:var(--gold)}
  .top a.salles{font-family:system-ui,sans-serif;font-size:12px;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 14px;transition:color .2s,border-color .2s}
  .top a.salles:hover{color:var(--ink);border-color:var(--gold)}
  header{max-width:1100px;margin:0 auto;padding:34px 20px 8px;text-align:center}
  .eyebrow{font-family:system-ui,-apple-system,sans-serif;font-size:11px;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(30px,5.4vw,52px);letter-spacing:.01em;line-height:1.1}
  h1 em{font-style:italic;color:var(--gold)}
  .epigraph{max-width:620px;margin:20px auto 0;font-style:italic;color:var(--ink);font-size:17px;line-height:1.6}
  .epigraph .eref{display:block;margin-top:7px;font-style:normal;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
  .lede{max-width:640px;margin:14px auto 0;color:var(--muted);font-size:15.5px}
  .bstats{font-family:system-ui,sans-serif;font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:16px}
  .bstats b{color:var(--gold);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:900px;margin:26px auto 6px;padding:0 16px}
  .chip{font-family:system-ui,-apple-system,sans-serif;font-size:12.5px;letter-spacing:.04em;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:border-color .2s,color .2s,background .2s}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#888);opacity:.85}
  .chip:hover{border-color:var(--c,#666);color:var(--ink)}
  .chip[aria-pressed="true"]{color:var(--ink);border-color:var(--c,var(--gold));background:color-mix(in srgb,var(--c,#888) 12%,transparent)}
  .chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .stage{max-width:1180px;margin:6px auto 0;padding:0 10px;position:relative}
  svg{width:100%;height:auto;display:block}
  .arc{fill:none;stroke-width:1.1;opacity:.62;cursor:pointer;transition:opacity .25s,stroke-width .2s}
  .arc:hover{opacity:1;stroke-width:2.4}
  .arc.dim{opacity:.08;pointer-events:none}
  .arc.sel{opacity:1;stroke-width:2.8;filter:drop-shadow(0 0 6px currentColor)}
  .bar{fill:#262b42}.bar:hover{fill:#3a4066}
  .tlabel{font-family:system-ui,sans-serif;font-size:10.5px;fill:var(--muted);letter-spacing:.24em}
  .blabel{font-family:system-ui,sans-serif;font-size:9px;fill:#6b6f85}
  .baseline{stroke:#3a3f58;stroke-width:1}
  .divider{stroke:var(--gold);stroke-width:1;stroke-dasharray:2 4;opacity:.5}
  .tooltip{position:absolute;pointer-events:none;z-index:5;background:#171a28;border:1px solid var(--line);border-radius:6px;padding:7px 11px;font-family:system-ui,sans-serif;font-size:12px;color:var(--ink);max-width:240px;display:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .tooltip .tt-refs{color:var(--gold);font-size:11px;margin-top:2px}
  .panel{max-width:760px;margin:26px auto 0;padding:0 18px;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s;min-height:120px}
  .panel.show{opacity:1;transform:none}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:30px 30px 26px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),#a33)}
  html[dir="rtl"] .card::before{left:auto;right:0}
  .badge{display:inline-block;font-family:system-ui,sans-serif;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--tc,var(--gold));border:1px solid color-mix(in srgb,var(--tc,var(--gold)) 45%,transparent);border-radius:999px;padding:4px 12px;margin-bottom:12px}
  .card h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(22px,4vw,30px);margin-bottom:20px;line-height:1.15}
  .verse .ref{font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
  .verse p{font-style:italic;font-size:17px;color:var(--ink)}
  .thread{display:flex;align-items:center;gap:10px;margin:16px 0;color:#7a5540;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.18em}
  .thread .l{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),#a33)}
  .note{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:14px}
  .placeholder{text-align:center;color:#5c6077;font-family:system-ui,sans-serif;font-size:13px;padding:26px 0}
  footer{max-width:760px;margin:34px auto 50px;padding:0 20px;color:#5c6077;font-size:12.5px;font-family:system-ui,sans-serif;text-align:center;line-height:1.7}
  .contrib{max-width:760px;margin:34px auto 0;padding:0 18px}
  .contrib summary{cursor:pointer;list-style:none;text-align:center;font-family:system-ui,sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:11px 20px;transition:border-color .2s}
  .contrib summary:hover{border-color:var(--gold)}
  .contrib summary::-webkit-details-marker{display:none}
  .form{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:26px;margin-top:14px}
  .form h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:24px;margin-bottom:4px}
  .form .hint{color:var(--muted);font-size:13px;font-family:system-ui,sans-serif;margin-bottom:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;background:#0a0c14;border:1px solid var(--line);border-radius:7px;color:var(--ink);font-family:Georgia,serif;font-size:15px;padding:9px 11px}
  html[dir="rtl"] .fld input,html[dir="rtl"] .fld select,html[dir="rtl"] .fld textarea{font-family:'Amiri',serif}
  .fld textarea{min-height:64px;resize:vertical}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--gold)}
  .btn{font-family:system-ui,sans-serif;font-size:13px;letter-spacing:.1em;background:var(--gold);color:#141018;border:none;border-radius:8px;padding:11px 22px;cursor:pointer;font-weight:600}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn.ok{background:#4d8a54;color:#eaf3ea}
  .btn.no{background:transparent;color:#c97a7a;border:1px solid #5a3232}
  .msg{font-family:system-ui,sans-serif;font-size:13.5px;margin-top:12px;color:#8fbe8f}
  .msg.err{color:#d08080}
  .pending{border:1px dashed var(--line);border-radius:10px;padding:16px;margin-top:12px}
  .pending .refs{color:var(--gold);font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.1em}
  .pending p{font-size:14px;color:var(--muted);margin:6px 0}
  .pending .row{display:flex;gap:10px;margin-top:10px}
  .arc.comm{stroke-dasharray:5 4}
  .comm-badge{display:inline-block;font-family:system-ui,sans-serif;font-size:10px;letter-spacing:.18em;color:#8fbe8f;border:1px solid #2e4a31;border-radius:999px;padding:3px 10px;margin-left:8px;vertical-align:middle}
  /* vérifier à la source · aller plus loin */
  .further{max-width:1100px;margin:48px auto 0;padding:0 18px}
  .further .flabel{text-align:center;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .further h2{text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(24px,4vw,34px)}
  .doors{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}
  @media(max-width:820px){.doors{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.doors{grid-template-columns:1fr}}
  .doorcard{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:20px 20px 18px;text-decoration:none;color:var(--ink);transition:transform .2s,border-color .2s}
  .doorcard:hover{transform:translateY(-3px);border-color:var(--dc,var(--gold))}
  .doorcard .dtag{font-family:system-ui,sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dc,var(--gold));margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .doorcard .dtag .dot{width:7px;height:7px;border-radius:50%;background:var(--dc,var(--gold))}
  .doorcard h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:22px;line-height:1.15;margin-bottom:6px}
  .doorcard p{color:var(--muted);font-size:13.5px}
  .allrooms{text-align:center;margin-top:18px}
  .allrooms a{font-family:system-ui,sans-serif;font-size:12.5px;color:var(--gold);text-decoration:none;letter-spacing:.08em}
  .allrooms a:hover{text-decoration:underline}
  @media (prefers-reduced-motion:no-preference){
    .arc.draw{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.6s ease forwards}
    @keyframes draw{to{stroke-dashoffset:0}}
  }
  @media(max-width:640px){.card{padding:22px 18px}.lede{font-size:14px}}
</style>
</head>
<body>

<div class="top">
  <div class="brand" id="brand"></div>
  <div class="topr">
    <div class="langs" role="group" aria-label="Langue">
      <button data-l="fr" aria-pressed="true">FR</button>
      <button data-l="en" aria-pressed="false">EN</button>
      <button data-l="ar" aria-pressed="false">عربي</button>
    </div>
    <a class="salles" id="salleslink" href="seuil-landing.html"></a>
  </div>
</div>

<header>
  <div class="eyebrow" id="eyebrow"></div>
  <h1 id="h1"></h1>
  <p class="epigraph" id="epi"></p>
  <p class="lede" id="lede"></p>
  <div class="bstats" id="bstats"></div>
</header>

<div class="chips" id="chips" role="group" aria-label="Filtrer par thème"></div>

<div class="stage">
  <svg id="viz" viewBox="0 0 1200 585" role="img" aria-label="Ancien Testament → Nouveau Testament"></svg>
  <div class="tooltip" id="tt"></div>
</div>

<div class="panel" id="panel">
  <div class="placeholder" id="ph"></div>
</div>

<section class="further" id="further"></section>

<details class="contrib" id="contrib">
  <summary id="c-summary"></summary>
  <div class="form">
    <h3 class="display" id="c-h3"></h3>
    <p class="hint" id="c-hint"></p>
    <div class="grid2">
      <div class="fld"><label id="l-theme"></label><select id="f-theme"></select></div>
      <div class="fld"><label id="l-title"></label><input id="f-title"></div>
    </div>
    <div class="grid2">
      <div>
        <div class="grid2">
          <div class="fld"><label id="l-ob"></label><select id="f-ob"></select></div>
          <div class="fld"><label id="l-oc"></label><input id="f-oc" type="number" min="1" value="1"></div>
        </div>
        <div class="fld"><label id="l-oref"></label><input id="f-oref"></div>
        <div class="fld"><label id="l-otext"></label><textarea id="f-otext"></textarea></div>
      </div>
      <div>
        <div class="grid2">
          <div class="fld"><label id="l-nb"></label><select id="f-nb"></select></div>
          <div class="fld"><label id="l-nc"></label><input id="f-nc" type="number" min="1" value="1"></div>
        </div>
        <div class="fld"><label id="l-nref"></label><input id="f-nref"></div>
        <div class="fld"><label id="l-ntext"></label><textarea id="f-ntext"></textarea></div>
      </div>
    </div>
    <div class="fld"><label id="l-note"></label><textarea id="f-note"></textarea></div>
    <div class="fld"><label id="l-name"></label><input id="f-name"></div>
    <button class="btn" id="f-send"></button>
    <div class="msg" id="f-msg"></div>
  </div>
</details>

<details class="contrib" id="modzone">
  <summary>Espace modération</summary>
  <div class="form">
    <div id="mod-lock">
      <p class="hint">Réservé à l'équipe. Entrez le code d'accès (démonstration).</p>
      <div class="grid2">
        <div class="fld"><input id="mod-code" type="password" placeholder="Code d'accès"></div>
        <div><button class="btn ghost" id="mod-open">Ouvrir</button></div>
      </div>
      <div class="msg err" id="mod-msg"></div>
    </div>
    <div id="mod-list" style="display:none"></div>
  </div>
</details>

<footer id="foot"></footer>

<script>
/* ---------- Canon : 66 livres, 1189 chapitres ---------- */
const BOOKS=[["Gen","Genèse",50],["Ex","Exode",40],["Lév","Lévitique",27],["Nb","Nombres",36],["Deut","Deutéronome",34],["Jos","Josué",24],["Jug","Juges",21],["Ruth","Ruth",4],["1S","1 Samuel",31],["2S","2 Samuel",24],["1R","1 Rois",22],["2R","2 Rois",25],["1Ch","1 Chroniques",29],["2Ch","2 Chroniques",36],["Esd","Esdras",10],["Néh","Néhémie",13],["Est","Esther",10],["Job","Job",42],["Ps","Psaumes",150],["Pr","Proverbes",31],["Ec","Ecclésiaste",12],["Ct","Cantique",8],["És","Ésaïe",66],["Jér","Jérémie",52],["Lam","Lamentations",5],["Éz","Ézéchiel",48],["Dan","Daniel",12],["Os","Osée",14],["Joël","Joël",3],["Am","Amos",9],["Ab","Abdias",1],["Jon","Jonas",4],["Mi","Michée",7],["Na","Nahum",3],["Ha","Habacuc",3],["So","Sophonie",3],["Ag","Aggée",2],["Za","Zacharie",14],["Mal","Malachie",4],["Mt","Matthieu",28],["Mc","Marc",16],["Lc","Luc",24],["Jn","Jean",21],["Ac","Actes",28],["Rm","Romains",16],["1Co","1 Corinthiens",16],["2Co","2 Corinthiens",13],["Ga","Galates",6],["Ép","Éphésiens",6],["Ph","Philippiens",4],["Col","Colossiens",4],["1Th","1 Thess.",5],["2Th","2 Thess.",3],["1Tm","1 Timothée",6],["2Tm","2 Timothée",4],["Tt","Tite",3],["Phm","Philémon",1],["Héb","Hébreux",13],["Jc","Jacques",5],["1Pi","1 Pierre",5],["2Pi","2 Pierre",3],["1Jn","1 Jean",5],["2Jn","2 Jean",1],["3Jn","3 Jean",1],["Jud","Jude",1],["Ap","Apocalypse",22]];
/* clé -> [abrégéEN, nomEN, abrégéAR, nomAR] */

","كولوسي"],"1Th":["1Th","1 Thessalonians","١تس","تسالونيكي الأولى"],"2Th":["2Th","2 Thessalonians","٢تس","تسالونيكي الثانية"],"1Tm":["1Ti","1 Timothy","١تي","تيموثاوس الأولى"],"2Tm":["2Ti","2 Timothy","٢تي","تيموثاوس الثانية"],"Tt":["Tit","Titus","تي","تيطس"],"Phm":["Phm","Philemon","فل","فليمون"],"Héb":["Heb","Hebrews","عب","العبرانيين"],"Jc":["Jas","James","يع","يعقوب"],"1Pi":["1Pe","1 Peter","١بط","بطرس الأولى"],"2Pi":["2Pe","2 Peter","٢بط","بطرس الثانية"],"1Jn":["1Jn","1 John","١يو","يوحنا الأولى"],"2Jn":["2Jn","2 John","٢يو","يوحنا الثانية"],"3Jn":["3Jn","3 John","٣يو","يوحنا الثالثة"],"Jud":["Jude","Jude","يه","يهوذا"],"Ap":["Rev","Revelation","رؤ","رؤيا يوحنا"]};

const D=[["Gen",4,"Genèse 4:4","Héb",11,"Hébreux 11:4","agneau","Abel : le premier agneau offert","Abel fit une offrande des premiers-nés de son troupeau ; l'Éternel porta un regard favorable sur son offrande.","C'est par la foi qu'Abel offrit à Dieu un sacrifice plus excellent que celui de Caïn.","Dès la quatrième page de la Bible, un agneau offert avec foi est agréé. Le fil commence ici."],["Gen",22,"Genèse 22:8","Jn",1,"Jean 1:29","agneau","« Dieu se pourvoira de l'agneau »","Mon fils, Dieu se pourvoira lui-même de l'agneau pour l'holocauste.","Voici l'Agneau de Dieu, qui ôte le péché du monde.","La réponse d'Abraham à Isaac reste suspendue pendant deux mille ans — jusqu'au cri de Jean-Baptiste au bord du Jourdain."],["Gen",22,"Genèse 22:6","Jn",19,"Jean 19:17","agneau","Le fils porte le bois","Abraham prit le bois pour l'holocauste, et le chargea sur son fils Isaac.","Jésus, portant sa croix, arriva au lieu du crâne, qui se nomme Golgotha.","Isaac gravit Morija sous le bois du sacrifice ; Jésus gravit Golgotha sous le bois de la croix. Même colline, selon la tradition."],["Gen",22,"Genèse 22:13","Rm",8,"Romains 8:32","agneau","Le substitut","Abraham prit le bélier, et l'offrit en holocauste à la place de son fils.","Lui qui n'a point épargné son propre Fils, mais l'a livré pour nous tous.","Sur Morija, Dieu épargne le fils d'Abraham. Au Calvaire, il n'épargne pas le sien."],["Ex",12,"Exode 12:5","1Pi",1,"1 Pierre 1:19","agneau","Sans défaut et sans tache","Ce sera un agneau sans défaut, mâle, âgé d'un an.","…par le sang précieux de Christ, comme d'un agneau sans défaut et sans tache.","Pierre décrit le Christ avec le vocabulaire exact du rituel pascal d'Exode 12."],["Ex",12,"Exode 12:13","Rm",5,"Romains 5:9","agneau","Le sang qui protège","Je verrai le sang, et je passerai par-dessus vous.","À plus forte raison, justifiés par son sang, serons-nous sauvés par lui de la colère.","En Égypte, le jugement passe au-dessus des maisons marquées du sang de l'agneau."],["Ex",12,"Exode 12:46","Jn",19,"Jean 19:36","agneau","Aucun os brisé","Vous ne briserez aucun de ses os.","Ces choses sont arrivées afin que l'Écriture fût accomplie : Aucun de ses os ne sera brisé.","On brise les jambes des deux crucifiés voisins — pas celles de Jésus. Jean y reconnaît la règle de l'agneau pascal."],["Lév",16,"Lévitique 16:22","Héb",9,"Hébreux 9:28","agneau","Celui qui porte les péchés","Le bouc emportera sur lui toutes leurs iniquités dans une terre désolée.","Christ s'est offert une seule fois pour porter les péchés de plusieurs.","Le grand jour des Expiations : les fautes du peuple posées sur une victime qui les emporte au loin."],["Lév",17,"Lévitique 17:11","Héb",9,"Hébreux 9:22","agneau","La vie est dans le sang","C'est par l'âme que le sang fait l'expiation.","Sans effusion de sang, il n'y a pas de pardon.","L'épître aux Hébreux lit tout le Lévitique comme la grammaire qui rend la croix intelligible."],["Nb",21,"Nombres 21:9","Jn",3,"Jean 3:14","agneau","Élevé pour que l'on vive","Quiconque avait été mordu et regardait le serpent d'airain, conservait la vie.","Comme Moïse éleva le serpent dans le désert, il faut de même que le Fils de l'homme soit élevé.","C'est Jésus lui-même qui fait ce rapprochement, la nuit, devant Nicodème — trois versets avant Jean 3:16."],["És",53,"Ésaïe 53:5","1Pi",2,"1 Pierre 2:24","agneau","Blessé pour nos péchés","Il était blessé pour nos péchés… et c'est par ses meurtrissures que nous sommes guéris.","Lui dont les meurtrissures vous ont guéris.","Écrit vers 700 av. J.-C. Le rouleau complet d'Ésaïe retrouvé à Qumrân date d'avant Jésus : la prophétie précède l'événement."],["És",53,"Ésaïe 53:7","Ac",8,"Actes 8:32-35","agneau","L'agneau muet","Semblable à un agneau qu'on mène à la boucherie, il n'a point ouvert la bouche.","L'Éthiopien lisait ce passage. Philippe, commençant par ce texte, lui annonça la bonne nouvelle de Jésus.","Le premier commentaire chrétien d'Ésaïe 53 est dans la Bible elle-même : un char, un rouleau, une question."],["És",53,"Ésaïe 53:6","1Pi",2,"1 Pierre 2:25","agneau","Les brebis errantes","Nous étions tous errants comme des brebis, chacun suivait sa propre voie.","Vous étiez comme des brebis errantes, mais vous êtes retournés vers le berger de vos âmes.",""],["És",53,"Ésaïe 53:12","Lc",22,"Luc 22:37","agneau","Compté parmi les malfaiteurs","Il a été mis au nombre des malfaiteurs.","Il faut que cette parole s'accomplisse en moi : Il a été mis au nombre des malfaiteurs.","Jésus cite Ésaïe 53 sur lui-même, quelques heures avant d'être crucifié entre deux brigands."],["Ps",22,"Psaume 22:2","Mt",27,"Matthieu 27:46","agneau","Le cri","Mon Dieu ! mon Dieu ! pourquoi m'as-tu abandonné ?","Jésus s'écria : Éli, Éli, lama sabachthani ? Mon Dieu, pourquoi m'as-tu abandonné ?","Sur la croix, Jésus prie le Psaume 22 — écrit près de mille ans plus tôt. Lisez la suite du psaume : elle décrit la scène."],["Ps",22,"Psaume 22:19","Jn",19,"Jean 19:24","agneau","La tunique tirée au sort","Ils se partagent mes vêtements, ils tirent au sort ma tunique.","Ils tirèrent au sort la tunique, afin que s'accomplît l'Écriture.",""],["Ps",22,"Psaume 22:17","Jn",20,"Jean 20:25","agneau","Mains et pieds percés","Ils ont percé mes mains et mes pieds.","Si je ne vois dans ses mains la marque des clous… je ne croirai point.","Le crucifiement n'existait pas encore quand ce psaume fut écrit."],["Za",12,"Zacharie 12:10","Jn",19,"Jean 19:37","agneau","Celui qu'ils ont percé","Ils tourneront les regards vers moi, celui qu'ils ont percé.","Et ailleurs l'Écriture dit encore : Ils verront celui qu'ils ont percé.","Dans Zacharie, c'est Dieu qui parle à la première personne."],["Za",13,"Zacharie 13:7","Mt",26,"Matthieu 26:31","agneau","Le berger frappé","Frappe le berger, et que les brebis se dispersent !","Je frapperai le berger, et les brebis du troupeau seront dispersées.","Jésus cite ce verset le soir même de son arrestation, pour annoncer la fuite des disciples."],["És",53,"Ésaïe 53:7","Ap",5,"Apocalypse 5:6","agneau","L'Agneau immolé règne","Semblable à un agneau qu'on mène à la boucherie…","Je vis, au milieu du trône, un agneau qui était là comme immolé.","Fin du fil : l'agneau égorgé d'Ésaïe est debout au centre du trône de Dieu. L'offrande est devenue royauté."],["Gen",3,"Genèse 3:15","Ga",4,"Galates 4:4","prophetie","Le premier évangile","Je mettrai inimitié entre ta postérité et sa postérité : celle-ci t'écrasera la tête.","Lorsque les temps ont été accomplis, Dieu a envoyé son Fils, né d'une femme.","La promesse d'un descendant vainqueur est faite le jour même de la chute. La tradition l'appelle le protévangile."],["Gen",12,"Genèse 12:3","Ga",3,"Galates 3:8","prophetie","Toutes les nations bénies","Toutes les familles de la terre seront bénies en toi.","L'Écriture annonça d'avance à Abraham : Toutes les nations seront bénies en toi.",""],["Gen",49,"Genèse 49:10","Ap",5,"Apocalypse 5:5","prophetie","Le lion de la tribu de Juda","Le sceptre ne s'éloignera point de Juda, jusqu'à ce que vienne celui à qui il appartient.","Voici, le lion de la tribu de Juda a vaincu.","Bénédiction de Jacob mourant sur son fils Juda — reprise à la dernière page de la Bible."],["Deut",18,"Deutéronome 18:15","Ac",3,"Actes 3:22","prophetie","Le Prophète à venir","L'Éternel suscitera du milieu de tes frères un prophète comme moi : vous l'écouterez.","Moïse a dit : Le Seigneur votre Dieu vous suscitera un prophète comme moi.",""],["2S",7,"2 Samuel 7:13","Lc",1,"Luc 1:32-33","prophetie","Le trône de David","J'affermirai pour toujours le trône de son royaume.","Le Seigneur Dieu lui donnera le trône de David, son père, et son règne n'aura point de fin.","L'annonce de l'ange à Marie reprend mot à mot la promesse faite à David mille ans plus tôt."],["Ps",2,"Psaume 2:7","Ac",13,"Actes 13:33","prophetie","« Tu es mon Fils »","Tu es mon fils ! Je t'ai engendré aujourd'hui.","Dieu a accompli la promesse en ressuscitant Jésus, selon ce qui est écrit dans le psaume second.",""],["Ps",16,"Psaume 16:10","Ac",2,"Actes 2:31","prophetie","Il ne verra pas la corruption","Tu ne livreras pas ton bien-aimé à la corruption.","C'est la résurrection du Christ que David a prévue : sa chair n'a pas vu la corruption.","Le premier sermon chrétien de l'histoire, à la Pentecôte, est un commentaire de ce psaume."],["Ps",110,"Psaume 110:1","Mt",22,"Matthieu 22:44","prophetie","Le Seigneur de David","L'Éternel a dit à mon Seigneur : Assieds-toi à ma droite.","Si donc David l'appelle Seigneur, comment est-il son fils ?","Le verset de l'Ancien Testament le plus cité dans tout le Nouveau."],["És",7,"Ésaïe 7:14","Mt",1,"Matthieu 1:23","prophetie","La vierge enfantera","La vierge deviendra enceinte, elle enfantera un fils, et lui donnera le nom d'Emmanuel.","Tout cela arriva afin que s'accomplît ce que le Seigneur avait annoncé par le prophète.","Emmanuel : « Dieu avec nous »."],["És",9,"Ésaïe 9:5","Lc",2,"Luc 2:11","prophetie","Un enfant nous est né","Un enfant nous est né… on l'appellera Dieu puissant, Prince de la paix.","Aujourd'hui, dans la ville de David, il vous est né un Sauveur, qui est le Christ, le Seigneur.",""],["És",40,"Ésaïe 40:3","Mc",1,"Marc 1:3","prophetie","La voix dans le désert","Une voix crie : Préparez au désert le chemin de l'Éternel.","C'est la voix de celui qui crie dans le désert : Préparez le chemin du Seigneur.","Les quatre évangiles ouvrent le ministère de Jean-Baptiste par ce même verset d'Ésaïe."],["És",61,"Ésaïe 61:1","Lc",4,"Luc 4:21","prophetie","« Aujourd'hui, cette parole est accomplie »","L'Esprit du Seigneur est sur moi, car il m'a oint pour porter de bonnes nouvelles aux pauvres.","Aujourd'hui cette parole de l'Écriture, que vous venez d'entendre, est accomplie.","À Nazareth, Jésus lit Ésaïe à la synagogue, referme le rouleau, et l'applique à lui-même."],["Mi",5,"Michée 5:1","Mt",2,"Matthieu 2:6","prophetie","Bethléhem","Et toi, Bethléhem… de toi sortira celui qui dominera sur Israël, et dont l'origine remonte aux temps anciens.","Interrogés par Hérode, les scribes répondent par Michée : c'est à Bethléhem que doit naître le Christ.","Le lieu de naissance du Messie était identifié sept siècles à l'avance — et connu de tous."],["Os",11,"Osée 11:1","Mt",2,"Matthieu 2:15","prophetie","Hors d'Égypte","Quand Israël était jeune, je l'aimais, et j'appelai mon fils hors d'Égypte.","…afin que s'accomplît ce que le Seigneur avait annoncé : J'ai appelé mon fils hors d'Égypte.","Jésus revit l'histoire d'Israël : descente en Égypte, sortie, désert, épreuve — mais sans faillir."],["Za",9,"Zacharie 9:9","Mt",21,"Matthieu 21:5","prophetie","Le roi humble, sur un âne","Voici, ton roi vient à toi ; il est juste et victorieux, il est humble et monté sur un âne.","Dites à la fille de Sion : Voici, ton roi vient à toi, plein de douceur, et monté sur un âne.","Les Rameaux, écrits cinq siècles à l'avance."],["Za",11,"Zacharie 11:12-13","Mt",27,"Matthieu 27:9","prophetie","Trente pièces d'argent","Ils pesèrent pour mon salaire trente sicles d'argent… je les jetai dans la maison de l'Éternel, pour le potier.","Ils prirent les trente pièces d'argent, le prix de celui qu'on a estimé, et les donnèrent pour le champ du potier.","Le prix, le lieu (le temple), la destination (le potier) : trois détails, un seul verset."],["Mal",3,"Malachie 3:1","Mt",11,"Matthieu 11:10","prophetie","Le messager qui prépare","Voici, j'enverrai mon messager ; il préparera le chemin devant moi.","C'est celui dont il est écrit : Voici, j'envoie mon messager devant ta face.","Le dernier prophète de l'Ancien Testament annonce le premier du Nouveau."],["Ps",118,"Psaume 118:22","Ac",4,"Actes 4:11","prophetie","La pierre rejetée","La pierre qu'ont rejetée ceux qui bâtissaient est devenue la principale de l'angle.","Jésus est la pierre rejetée par vous qui bâtissez, et qui est devenue la principale de l'angle.",""],["Ps",41,"Psaume 41:10","Jn",13,"Jean 13:18","prophetie","L'ami qui trahit","Celui qui mangeait mon pain a levé le talon contre moi.","Il faut que l'Écriture s'accomplisse : Celui qui mange avec moi le pain a levé son talon contre moi.","Cité par Jésus pendant le dernier repas, Judas encore à table."],["Ps",69,"Psaume 69:22","Jn",19,"Jean 19:29","prophetie","Le vinaigre","Ils me donnent du vinaigre à boire, pour apaiser ma soif.","Ils remplirent de vinaigre une éponge et l'approchèrent de sa bouche.",""],["Dan",7,"Daniel 7:13","Mt",26,"Matthieu 26:64","filshomme","Le Fils de l'homme sur les nuées","Sur les nuées des cieux arriva quelqu'un de semblable à un fils de l'homme.","Vous verrez le Fils de l'homme assis à la droite de la puissance, et venant sur les nuées du ciel.","Devant le grand prêtre, Jésus répond par Daniel 7 — et c'est cette citation qui décide de sa condamnation."],["És",25,"Ésaïe 25:8","1Co",15,"1 Corinthiens 15:54","prophetie","La mort engloutie","Il anéantit la mort pour toujours ; le Seigneur essuie les larmes de tous les visages.","Alors s'accomplira la parole qui est écrite : La mort a été engloutie dans la victoire.",""],["És",28,"Ésaïe 28:16","1Pi",2,"1 Pierre 2:6","prophetie","La pierre angulaire posée en Sion","Voici, j'ai mis pour fondement en Sion une pierre, une pierre angulaire, choisie, précieuse.","Il est dit dans l'Écriture : Voici, je mets en Sion une pierre angulaire, choisie, précieuse.",""],["Joël",3,"Joël 3:1","Ac",2,"Actes 2:17","prophetie","L'Esprit répandu sur toute chair","Je répandrai mon Esprit sur toute chair ; vos fils et vos filles prophétiseront.","C'est ici ce qui a été dit par le prophète Joël, déclare Pierre au matin de la Pentecôte.",""],["Ps",8,"Psaume 8:3","Mt",21,"Matthieu 21:16","prophetie","La louange des enfants","Par la bouche des enfants et de ceux qui sont à la mamelle, tu as fondé ta gloire.","N'avez-vous jamais lu : Tu as tiré des louanges de la bouche des enfants ?",""],["Gen",9,"Genèse 9:13","Ap",4,"Apocalypse 4:3","alliance","L'arc au-dessus du trône","J'ai placé mon arc dans la nue : il servira de signe d'alliance entre moi et la terre.","Le trône était environné d'un arc-en-ciel semblable à de l'émeraude.","Le signe donné à Noé entoure le trône de Dieu à la fin des temps : l'alliance tient toujours."],["Gen",15,"Genèse 15:6","Rm",4,"Romains 4:3","alliance","La foi comptée comme justice","Abram eut confiance en l'Éternel, qui le lui imputa à justice.","Que dit l'Écriture ? Abraham crut à Dieu, et cela lui fut imputé à justice.","Le verset-clé de Paul : la justice reçue par la foi précède la Loi de quatre siècles."],["Deut",30,"Deutéronome 30:6","Rm",2,"Romains 2:29","alliance","La circoncision du cœur","L'Éternel, ton Dieu, circoncira ton cœur, afin que tu aimes l'Éternel de tout ton cœur.","La circoncision, c'est celle du cœur, selon l'Esprit et non selon la lettre.","Déjà Moïse annonçait que le signe extérieur visait une transformation intérieure."],["Ex",19,"Exode 19:6","1Pi",2,"1 Pierre 2:9","alliance","Un royaume de prêtres","Vous serez pour moi un royaume de sacrificateurs et une nation sainte.","Vous êtes une race élue, un sacerdoce royal, une nation sainte, un peuple acquis.","La vocation donnée au Sinaï est étendue par Pierre à tous ceux qui appartiennent au Christ."],["Ex",24,"Exode 24:8","Mt",26,"Matthieu 26:28","alliance","Le sang de l'alliance","Moïse prit le sang et dit : Voici le sang de l'alliance que l'Éternel a faite avec vous.","Ceci est mon sang, le sang de l'alliance, qui est répandu pour plusieurs, pour le pardon des péchés.","Au dernier repas, Jésus reprend mot pour mot la formule du Sinaï — et se met à la place du sacrifice."],["Jér",31,"Jérémie 31:31","Lc",22,"Luc 22:20","alliance","La nouvelle alliance","Voici, les jours viennent, dit l'Éternel, où je ferai avec la maison d'Israël une alliance nouvelle.","Cette coupe est la nouvelle alliance en mon sang, qui est répandu pour vous.","Jérémie est le seul livre de l'AT à employer l'expression « nouvelle alliance ». Jésus la reprend, coupe en main."],["Jér",31,"Jérémie 31:33","Héb",8,"Hébreux 8:10","alliance","La loi écrite dans les cœurs","Je mettrai ma loi au dedans d'eux, je l'écrirai dans leur cœur.","L'épître aux Hébreux cite intégralement la promesse de Jérémie — la plus longue citation de l'AT dans le NT.",""],["Éz",36,"Ézéchiel 36:26","2Co",3,"2 Corinthiens 3:3","alliance","Un cœur de chair","Je vous donnerai un cœur nouveau… j'ôterai de votre corps le cœur de pierre.","Une lettre écrite non sur des tables de pierre, mais sur des tables de chair, sur les cœurs.",""],["Os",2,"Osée 2:25","Rm",9,"Romains 9:25","alliance","« Pas-mon-peuple » devient mon peuple","Je dirai à Lo-Ammi : Tu es mon peuple ! et il répondra : Mon Dieu !","Selon qu'il le dit dans Osée : J'appellerai mon peuple celui qui n'était pas mon peuple.","L'ouverture de l'alliance aux nations était déjà dans les prophètes."],["Gen",2,"Genèse 2:24","Ép",5,"Éphésiens 5:31-32","alliance","L'alliance nuptiale","L'homme quittera son père et sa mère, et s'attachera à sa femme, et ils deviendront une seule chair.","Ce mystère est grand ; je dis cela par rapport à Christ et à l'Église.","Paul relit le tout premier mariage comme figure de l'union du Christ et de son peuple."],["Ex",12,"Exode 12:6","1Co",5,"1 Corinthiens 5:7","paque","Christ, notre Pâque","Toute l'assemblée d'Israël immolera l'agneau entre les deux soirs.","Christ, notre Pâque, a été immolé.","Quatre mots de Paul suffisent : toute la nuit d'Égypte trouve son sens à la croix."],["Ex",12,"Exode 12:14","Lc",22,"Luc 22:15","paque","La Pâque désirée","Vous conserverez le souvenir de ce jour… vous le célébrerez comme une loi perpétuelle.","J'ai désiré vivement manger cette Pâque avec vous, avant de souffrir.","C'est pendant le mémorial de la première délivrance que Jésus institue le mémorial de la seconde."],["Ex",16,"Exode 16:4","Jn",6,"Jean 6:32-35","paque","Le vrai pain du ciel","Voici, je ferai pleuvoir pour vous du pain, du haut des cieux.","Mon Père vous donne le vrai pain du ciel… Je suis le pain de vie.","Tout Jean 6 est un commentaire de la manne : le don du désert annonçait un don plus grand."],["Ps",78,"Psaume 78:24","Jn",6,"Jean 6:31","paque","Le blé des cieux","Il fit pleuvoir sur eux la manne… il leur donna le blé du ciel.","Nos pères ont mangé la manne dans le désert, selon qu'il est écrit : Il leur donna le pain du ciel à manger.","La foule cite ce psaume à Jésus — qui répond en se désignant lui-même."],["Ex",17,"Exode 17:6","1Co",10,"1 Corinthiens 10:4","paque","Le rocher frappé","Tu frapperas le rocher, et il en sortira de l'eau, et le peuple boira.","Ils buvaient à un rocher spirituel qui les suivait, et ce rocher était Christ.","Frappé une fois, et l'eau jaillit pour tout un peuple."],["Gen",14,"Genèse 14:18","Héb",7,"Hébreux 7:1-3","paque","Le pain et le vin de Melchisédek","Melchisédek, roi de Salem, fit apporter du pain et du vin : il était sacrificateur du Dieu Très-Haut.","Melchisédek… rendu semblable au Fils de Dieu, demeure sacrificateur à perpétuité.","Un roi-prêtre sans généalogie, du pain, du vin, une bénédiction — quatorze chapitres après le début de la Bible."],["Pr",9,"Proverbes 9:5","Jn",6,"Jean 6:51","paque","« Venez, mangez de mon pain »","La Sagesse crie : Venez, mangez de mon pain, et buvez du vin que j'ai mêlé.","Je suis le pain vivant descendu du ciel. Si quelqu'un mange de ce pain, il vivra éternellement.","L'invitation de la Sagesse devient l'invitation du Christ."],["Lév",23,"Lévitique 23:10","1Co",15,"1 Corinthiens 15:20","paque","Les prémices","Vous apporterez au sacrificateur une gerbe, prémices de votre moisson.","Christ est ressuscité des morts, il est les prémices de ceux qui sont morts.","La fête des prémices tombait le lendemain du sabbat de la Pâque — le matin même de la résurrection."],["És",55,"Ésaïe 55:1","Ap",22,"Apocalypse 22:17","paque","Venez, sans argent","Vous tous qui avez soif, venez aux eaux ; achetez sans argent, sans rien payer.","Que celui qui a soif vienne ; que celui qui veut prenne de l'eau de la vie, gratuitement.","L'avant-dernier verset d'invitation de la Bible répond à Ésaïe : tout est don."],["Gen",2,"Genèse 2:7","1Co",15,"1 Corinthiens 15:45","figures","Le premier et le dernier Adam","L'Éternel Dieu forma l'homme… et l'homme devint une âme vivante.","Le premier homme, Adam, devint une âme vivante ; le dernier Adam est devenu un esprit vivifiant.","Paul lit toute l'histoire entre deux hommes : celui par qui la mort entre, celui par qui la vie revient."],["Gen",3,"Genèse 3:6","Rm",5,"Romains 5:19","figures","Par un seul homme","Elle prit de son fruit, et en mangea ; elle en donna aussi à son mari, et il en mangea.","Par l'obéissance d'un seul, beaucoup seront rendus justes.","Un arbre au jardin, un arbre au Calvaire : la désobéissance défaite par l'obéissance."],["Gen",6,"Genèse 6:14","1Pi",3,"1 Pierre 3:20-21","figures","L'arche et le baptême","Fais-toi une arche de bois de gopher… j'établirai mon alliance avec toi.","Huit personnes furent sauvées à travers l'eau : c'était une figure du baptême.","Pierre emploie lui-même le mot « figure » (antitype) : la Bible enseigne sa propre lecture typologique."],["Gen",28,"Genèse 28:12","Jn",1,"Jean 1:51","figures","L'échelle de Jacob","Une échelle était appuyée sur la terre, et son sommet touchait au ciel ; les anges montaient et descendaient.","Vous verrez le ciel ouvert et les anges de Dieu monter et descendre sur le Fils de l'homme.","Jésus se désigne comme l'échelle elle-même : le lieu où ciel et terre se rejoignent."],["Gen",37,"Genèse 37:28","Mt",26,"Matthieu 26:15","figures","Vendu par les siens","Ils vendirent Joseph pour vingt sicles d'argent aux Ismaélites.","Ils lui payèrent trente pièces d'argent.","Joseph : trahi par ses frères, vendu, condamné injustement, puis élevé pour sauver ceux qui l'avaient livré. Une vie entière en miniature."],["Ex",2,"Exode 2:14","Ac",7,"Actes 7:35","figures","Le libérateur d'abord rejeté","Qui t'a établi chef et juge sur nous ?","Ce Moïse qu'ils avaient renié… c'est lui que Dieu envoya comme chef et comme libérateur.","Étienne, dans son dernier discours, lit Moïse comme figure du Christ : rejeté la première fois, reconnu la seconde."],["Jos",1,"Josué 1:2","Héb",4,"Hébreux 4:8","figures","Un repos plus grand que Josué","Lève-toi, passe ce Jourdain, toi et tout ce peuple, pour entrer dans le pays que je leur donne.","Si Josué leur eût donné le repos, Dieu ne parlerait pas après cela d'un autre jour.","Josué et Jésus portent le même nom hébreu : Yeshoua, « l'Éternel sauve »."],["Jon",2,"Jonas 2:1","Mt",12,"Matthieu 12:40","figures","Le signe de Jonas","Jonas fut dans le ventre du poisson trois jours et trois nuits.","De même le Fils de l'homme sera trois jours et trois nuits dans le sein de la terre.","Le seul « signe » que Jésus promet à sa génération : sa mort et sa résurrection, préfigurées par Jonas."],["2R",4,"2 Rois 4:43-44","Jn",6,"Jean 6:11-13","figures","Les pains multipliés","Donne à ces gens, et qu'ils mangent ; car ainsi parle l'Éternel : On mangera, et on en aura de reste.","Jésus prit les pains, rendit grâces, et les distribua… et l'on remplit douze paniers des morceaux qui restaient.","Élisée nourrit cent hommes avec vingt pains ; Jésus, cinq mille avec cinq. La figure est dépassée de toutes parts."],["Ex",25,"Exode 25:8","Jn",1,"Jean 1:14","temple","Dieu habite parmi nous","Ils me feront un sanctuaire, et j'habiterai au milieu d'eux.","La Parole a été faite chair, et elle a habité parmi nous.","Le verbe grec de Jean signifie littéralement « dresser sa tente » : le tabernacle du désert devient une personne."],["Ex",26,"Exode 26:33","Mt",27,"Matthieu 27:51","temple","Le voile déchiré","Le voile vous servira de séparation entre le lieu saint et le lieu très saint.","Voici, le voile du temple se déchira en deux, depuis le haut jusqu'en bas.","Déchiré depuis le haut : ce n'est pas l'homme qui a ouvert le passage."],["Ex",26,"Exode 26:33","Héb",10,"Hébreux 10:20","temple","Un chemin au travers du voile","Le voile vous servira de séparation…","…la route nouvelle et vivante qu'il a inaugurée pour nous au travers du voile, c'est-à-dire de sa chair.",""],["Lév",16,"Lévitique 16:15","Héb",9,"Hébreux 9:12","temple","Le grand prêtre entre une fois","Aaron entrera dans le lieu très saint avec le sang, une fois par an.","Christ est entré une fois pour toutes dans le lieu très saint, avec son propre sang.","Une fois par an devient une fois pour toutes ; le sang d'un animal devient le sien."],["Ps",110,"Psaume 110:4","Héb",7,"Hébreux 7:17","temple","Prêtre pour toujours","Tu es sacrificateur pour toujours, à la manière de Melchisédek.","Car ce témoignage lui est rendu : Tu es sacrificateur pour toujours, selon l'ordre de Melchisédek.","Un sacerdoce plus ancien que celui d'Aaron, et qui ne finit pas."],["1R",8,"1 Rois 8:11","Jn",2,"Jean 2:19-21","temple","Le temple de son corps","La gloire de l'Éternel remplissait la maison de l'Éternel.","Détruisez ce temple, et en trois jours je le relèverai… Mais il parlait du temple de son corps.","La gloire qui remplissait le temple de Salomon habite désormais un corps."],["Éz",47,"Ézéchiel 47:1","Jn",7,"Jean 7:38","temple","Le fleuve qui sort du temple","Des eaux sortaient de dessous le seuil de la maison, du côté de l'orient.","Celui qui croit en moi, des fleuves d'eau vive couleront de son sein, comme dit l'Écriture.",""],["Éz",47,"Ézéchiel 47:1","Ap",22,"Apocalypse 22:1","temple","Le fleuve de la vie","Des eaux sortaient de dessous le seuil de la maison…","Il me montra un fleuve d'eau de la vie, sortant du trône de Dieu et de l'Agneau.","À la fin, plus de temple de pierre : le trône de l'Agneau est la source."],["Za",6,"Zacharie 6:12","Jn",2,"Jean 2:19","temple","Le Germe bâtira le temple","Voici un homme dont le nom est Germe… il bâtira le temple de l'Éternel.","Détruisez ce temple, et en trois jours je le relèverai.",""],["És",66,"Ésaïe 66:1","Ac",7,"Actes 7:49","temple","Le ciel est mon trône","Ainsi parle l'Éternel : Le ciel est mon trône, et la terre mon marchepied. Quelle maison pourriez-vous me bâtir ?","Le Très-Haut n'habite pas dans ce qui est fait de main d'homme, comme dit le prophète.",""],["Dan",7,"Daniel 7:14","Mt",28,"Matthieu 28:18","filshomme","Une domination éternelle","On lui donna la domination, la gloire et le règne ; et tous les peuples, les nations, les hommes de toutes langues le servirent.","Tout pouvoir m'a été donné dans le ciel et sur la terre.","La dernière scène de Matthieu, sur la montagne, est l'intronisation du Fils de l'homme annoncée par Daniel."],["Ps",8,"Psaume 8:5-7","Héb",2,"Hébreux 2:8-9","filshomme","« Qu'est-ce que le fils de l'homme ? »","Qu'est-ce que l'homme, pour que tu te souviennes de lui, et le fils de l'homme, pour que tu prennes garde à lui ? Tu as tout mis sous ses pieds.","Nous voyons Jésus, couronné de gloire et d'honneur à cause de la mort qu'il a soufferte.","Le psaume qui s'émerveille de l'homme en général devient, en Hébreux, le portrait de l'Homme par excellence."],["Éz",2,"Ézéchiel 2:1","Mc",2,"Marc 2:10","filshomme","Le titre préféré de Jésus","Fils de l'homme, tiens-toi sur tes pieds, et je te parlerai.","Le Fils de l'homme a sur la terre le pouvoir de pardonner les péchés.","« Fils de l'homme » : 93 fois adressé à Ézéchiel — l'homme fragile devant Dieu — et une fois au personnage céleste de Daniel 7. En choisissant ce titre, Jésus assume les deux : l'abaissement et la gloire."],["Dan",7,"Daniel 7:13","Ap",1,"Apocalypse 1:13","filshomme","Au milieu des chandeliers","…et voici, sur les nuées des cieux arriva quelqu'un de semblable à un fils de l'homme.","Je vis quelqu'un qui ressemblait à un fils d'homme, vêtu d'une longue robe, et ayant une ceinture d'or.","Jean, à Patmos, reconnaît dans le Ressuscité la figure exacte de la vision de Daniel."],["Dan",7,"Daniel 7:13","Ap",14,"Apocalypse 14:14","filshomme","La moisson du Fils de l'homme","…sur les nuées des cieux arriva quelqu'un de semblable à un fils de l'homme.","Sur la nuée était assis quelqu'un qui ressemblait à un fils d'homme, une couronne d'or sur la tête, une faucille tranchante dans la main.",""],["Ps",80,"Psaume 80:18","Lc",22,"Luc 22:69","filshomme","L'homme de ta droite","Que ta main soit sur l'homme de ta droite, sur le fils de l'homme que tu t'es choisi !","Désormais le Fils de l'homme sera assis à la droite de la puissance de Dieu.","Le psaume unissait déjà les deux images que Jésus joint devant ses juges : le fils de l'homme et la droite de Dieu."],["Ps",8,"Psaume 8:7","1Co",15,"1 Corinthiens 15:27","filshomme","Tout sous ses pieds","Tu lui as donné la domination sur les œuvres de tes mains, tu as tout mis sous ses pieds.","Dieu a tout mis sous ses pieds.",""],["Gen",1,"Genèse 1:26","Col",1,"Colossiens 1:16","trinite","« Faisons l'homme »","Dieu dit : Faisons l'homme à notre image, selon notre ressemblance.","En lui tout a été créé dans les cieux et sur la terre… Tout a été créé par lui et pour lui.","Dès la première page, Dieu délibère à un pluriel mystérieux. Le Nouveau Testament nomme la Parole et l'Esprit présents à la création."],["Gen",1,"Genèse 1:2","Lc",1,"Luc 1:35","trinite","L'Esprit qui couvre","L'Esprit de Dieu se mouvait au-dessus des eaux.","Le Saint-Esprit viendra sur toi, et la puissance du Très-Haut te couvrira de son ombre.","L'Esprit qui planait sur la première création couvre Marie au commencement de la nouvelle."],["Ps",33,"Psaume 33:6","Jn",1,"Jean 1:3","trinite","Par sa Parole et son Souffle","Les cieux ont été faits par la parole de l'Éternel, et toute leur armée par le souffle de sa bouche.","Toutes choses ont été faites par elle, et rien de ce qui a été fait n'a été fait sans elle.","Parole et Souffle à l'œuvre dans la création : ce que le psaume chante, Jean le nomme."],["Ex",3,"Exode 3:14","Jn",8,"Jean 8:58","trinite","« JE SUIS »","Dieu dit à Moïse : Je suis celui qui suis. Tu diras aux enfants d'Israël : Celui qui s'appelle JE SUIS m'a envoyé vers vous.","En vérité, en vérité, je vous le dis, avant qu'Abraham fût, je suis.","Les auditeurs comprennent parfaitement : ils ramassent des pierres. Jésus vient de prononcer sur lui-même le Nom du buisson ardent."],["Deut",6,"Deutéronome 6:4","1Co",8,"1 Corinthiens 8:6","trinite","Le Shema élargi","Écoute, Israël ! l'Éternel, notre Dieu, est le seul Éternel.","Il n'y a qu'un seul Dieu, le Père, de qui viennent toutes choses… et un seul Seigneur, Jésus-Christ, par qui sont toutes choses.","Paul, juif fervent, réécrit la confession de foi d'Israël en y plaçant Jésus — sans cesser une seconde de confesser un seul Dieu."],["És",6,"Ésaïe 6:3","Jn",12,"Jean 12:41","trinite","La gloire qu'Ésaïe a vue","Saint, saint, saint est l'Éternel des armées ! Toute la terre est pleine de sa gloire !","Ésaïe dit ces choses, lorsqu'il vit sa gloire, et qu'il parla de lui.","Jean l'affirme : la gloire que le prophète a contemplée dans le temple, c'était celle du Christ."],["Ps",45,"Psaume 45:7-8","Héb",1,"Hébreux 1:8-9","trinite","« Ton trône, ô Dieu »","Ton trône, ô Dieu, est à toujours… C'est pourquoi, ô Dieu, ton Dieu t'a oint d'une huile de joie.","Mais il a dit au Fils : Ton trône, ô Dieu, est éternel.","Le psaume appelle « Dieu » celui que « son Dieu » oint : deux personnes, une seule divinité. Hébreux l'applique au Fils."],["Ps",102,"Psaume 102:26-28","Héb",1,"Hébreux 1:10-12","trinite","Le Fils créateur","Tu as anciennement fondé la terre, et les cieux sont l'ouvrage de tes mains… Tu restes le même, et tes années ne finiront point.","Et encore : Toi, Seigneur, tu as au commencement fondé la terre, et les cieux sont l'ouvrage de tes mains.","Un psaume adressé à l'Éternel est cité, dans Hébreux, comme adressé au Fils — sans une ligne de justification : cela allait de soi."],["Joël",3,"Joël 3:5","Rm",10,"Romains 10:13","trinite","Invoquer le Nom","Alors quiconque invoquera le nom de l'Éternel sera sauvé.","Quiconque invoquera le nom du Seigneur sera sauvé.","Chez Joël, le Nom invoqué est celui de l'Éternel ; chez Paul, le Seigneur confessé trois versets plus haut est Jésus."],["És",44,"Ésaïe 44:6","Ap",22,"Apocalypse 22:13","trinite","Le premier et le dernier","Ainsi parle l'Éternel : Je suis le premier et je suis le dernier, et hors moi il n'y a point de Dieu.","Je suis l'alpha et l'oméga, le premier et le dernier, le commencement et la fin.","Le titre que Dieu se réserve exclusivement dans Ésaïe, le Christ le porte à la dernière page de la Bible."],["És",42,"Ésaïe 42:1","Mt",3,"Matthieu 3:16-17","trinite","La scène du Jourdain","Voici mon serviteur… mon élu, en qui mon âme prend plaisir. J'ai mis mon Esprit sur lui.","L'Esprit de Dieu descendit comme une colombe. Et voici, une voix fit entendre : Celui-ci est mon Fils bien-aimé, en qui j'ai mis toute mon affection.","Au baptême de Jésus : le Père parle du ciel, le Fils se tient dans l'eau, l'Esprit descend. La scène qu'Ésaïe annonçait, trois présences, un seul Dieu."],["Ps",69,"Psaume 69:10","Jn",2,"Jean 2:17","prophetie","Le zèle de ta maison","Le zèle de ta maison me dévore.","Ses disciples se souvinrent qu'il est écrit : Le zèle de ta maison me dévore.","Cité au premier geste public de Jésus dans le Temple."],["Ps",69,"Psaume 69:5","Jn",15,"Jean 15:25","prophetie","Haï sans cause","Ils sont plus nombreux que les cheveux de ma tête, ceux qui me haïssent sans cause.","Afin que s'accomplît la parole écrite dans leur loi : Ils m'ont haï sans cause.",""],["És",8,"Ésaïe 8:14","Rm",9,"Romains 9:33","prophetie","Pierre d'achoppement","Il sera un sanctuaire, mais aussi une pierre d'achoppement, un rocher de scandale.","Voici, je mets en Sion une pierre d'achoppement… et celui qui croit en lui ne sera point confus.","La même pierre : fondation pour les uns, obstacle pour les autres."],["És",11,"Ésaïe 11:10","Rm",15,"Romains 15:12","prophetie","La racine d'Isaï","Le rejeton d'Isaï sera comme une bannière pour les peuples ; les nations se tourneront vers lui.","Ésaïe dit aussi : Il sortira d'Isaï un rejeton… les nations espéreront en lui.",""],["És",49,"Ésaïe 49:6","Ac",13,"Actes 13:47","prophetie","Lumière des nations","Je t'établis pour être la lumière des nations, pour porter mon salut jusqu'aux extrémités de la terre.","Ainsi nous l'a ordonné le Seigneur : Je t'ai établi pour être la lumière des nations.","Paul et Barnabas lisent leur propre mission dans le chant du Serviteur."],["És",50,"Ésaïe 50:6","Mt",26,"Matthieu 26:67","prophetie","Le dos livré","J'ai livré mon dos à ceux qui me frappaient, et mes joues à ceux qui m'arrachaient la barbe.","Là-dessus, ils lui crachèrent au visage et le frappèrent à coups de poing.",""],["Am",8,"Amos 8:9","Mt",27,"Matthieu 27:45","prophetie","Le soleil couché à midi","Je ferai coucher le soleil à midi, et j'obscurcirai la terre en plein jour.","Depuis la sixième heure jusqu'à la neuvième, il y eut des ténèbres sur toute la terre.",""],["Ps",31,"Psaume 31:6","Lc",23,"Luc 23:46","prophetie","Entre tes mains","Je remets mon esprit entre tes mains ; tu me délivreras, Éternel, Dieu de vérité.","Jésus s'écria d'une voix forte : Père, je remets mon esprit entre tes mains.","La dernière parole de la croix est un verset de psaume — la prière du soir des enfants d'Israël."],["És",35,"Ésaïe 35:5-6","Mt",11,"Matthieu 11:5","prophetie","Les signes du Messie","Alors s'ouvriront les yeux des aveugles… alors le boiteux sautera comme un cerf.","Les aveugles voient, les boiteux marchent… et la bonne nouvelle est annoncée aux pauvres.","La réponse de Jésus aux envoyés de Jean-Baptiste est une mosaïque d'Ésaïe."],["Mal",4,"Malachie 4:5","Mt",17,"Matthieu 17:11-13","prophetie","Élie doit venir","Voici, je vous enverrai Élie, le prophète, avant que le jour de l'Éternel arrive.","Élie est déjà venu… Les disciples comprirent alors qu'il leur parlait de Jean-Baptiste.",""],["Os",6,"Osée 6:2","1Co",15,"1 Corinthiens 15:4","prophetie","Le troisième jour","Il nous rendra la vie dans deux jours ; le troisième jour il nous relèvera.","Il est ressuscité le troisième jour, selon les Écritures.","Paul dit « selon les Écritures » sans citer ; Osée est l'un des textes que la tradition entend derrière la formule."],["Ps",68,"Psaume 68:19","Ép",4,"Éphésiens 4:8","prophetie","Monté en haut","Tu es monté dans les hauteurs, tu as emmené des captifs.","C'est pourquoi il est dit : Étant monté en haut, il a emmené des captifs.",""],["Nb",24,"Nombres 24:17","Mt",2,"Matthieu 2:2","prophetie","L'étoile de Jacob","Un astre sort de Jacob, un sceptre s'élève d'Israël.","Où est le roi des Juifs qui vient de naître ? Car nous avons vu son étoile en Orient.","L'oracle de Balaam, lu comme messianique bien avant la venue des mages."],["És",60,"Ésaïe 60:6","Mt",2,"Matthieu 2:11","prophetie","L'or et l'encens","Tous viendront de Séba ; ils porteront de l'or et de l'encens, et publieront les louanges de l'Éternel.","Ils lui offrirent en présents de l'or, de l'encens et de la myrrhe.",""],["Ps",22,"Psaume 22:9","Mt",27,"Matthieu 27:43","prophetie","« Qu'il le délivre ! »","Recommande-toi à l'Éternel ! L'Éternel le sauvera, il le délivrera, puisqu'il l'aime !","Il s'est confié en Dieu ; que Dieu le délivre maintenant, s'il l'aime !","Au pied de la croix, les moqueurs citent le Psaume 22 sans le savoir."],["És",52,"Ésaïe 52:15","Rm",15,"Romains 15:21","prophetie","Ceux qui n'avaient pas entendu","Ceux à qui il n'avait point été annoncé verront, et ceux qui n'en avaient point entendu parler comprendront.","Selon qu'il est écrit : Ceux à qui il n'avait point été annoncé verront.","Paul fait du dernier verset d'introduction du chant du Serviteur sa feuille de route missionnaire."],["Ps",118,"Psaume 118:26","Mt",21,"Matthieu 21:9","prophetie","Béni soit celui qui vient","Béni soit celui qui vient au nom de l'Éternel !","Hosanna au Fils de David ! Béni soit celui qui vient au nom du Seigneur !",""],["Lév",1,"Lévitique 1:4","2Co",5,"2 Corinthiens 5:21","agneau","La main posée sur la tête","Il posera sa main sur la tête de l'holocauste, qui sera agréé de l'Éternel, pour lui servir d'expiation.","Celui qui n'a point connu le péché, il l'a fait devenir péché pour nous.","Le geste du transfert : la faute passe de l'offrant à la victime."],["Deut",21,"Deutéronome 21:23","Ga",3,"Galates 3:13","agneau","La malédiction du bois","Celui qui est pendu est un objet de malédiction auprès de Dieu.","Christ nous a rachetés de la malédiction de la loi, étant devenu malédiction pour nous : Maudit est quiconque est pendu au bois.",""],["És",53,"Ésaïe 53:4","Mt",8,"Matthieu 8:17","agneau","Nos maladies portées","Ce sont nos souffrances qu'il a portées, c'est de nos douleurs qu'il s'est chargé.","Afin que s'accomplît la parole d'Ésaïe : Il a pris nos infirmités, et il s'est chargé de nos maladies.","Matthieu applique Ésaïe 53 déjà aux guérisons : le portement commence avant la croix."],["És",53,"Ésaïe 53:9","1Pi",2,"1 Pierre 2:22","agneau","Ni violence ni fraude","Il n'avait point commis de violence, et il n'y avait point eu de fraude dans sa bouche.","Lui qui n'a point commis de péché, et dans la bouche duquel il ne s'est point trouvé de fraude.",""],["Ps",34,"Psaume 34:21","Jn",19,"Jean 19:36","agneau","Il garde tous ses os","Il garde tous ses os, aucun d'eux n'est brisé.","Ces choses sont arrivées afin que l'Écriture fût accomplie : Aucun de ses os ne sera brisé.","Derrière Jean 19:36, deux textes se superposent : la règle de l'agneau pascal et la promesse faite au juste."],["Lév",16,"Lévitique 16:27","Héb",13,"Hébreux 13:12","agneau","Hors du camp","Le taureau et le bouc expiatoires seront brûlés hors du camp.","C'est pour cela que Jésus aussi, afin de sanctifier le peuple par son propre sang, a souffert hors de la porte.",""],["Nb",19,"Nombres 19:9","Héb",9,"Hébreux 9:13-14","agneau","La cendre qui purifie","On recueillera la cendre de la vache : c'est une eau expiatoire.","Si la cendre d'une vache sanctifie ceux qui sont souillés… combien plus le sang de Christ purifiera-t-il votre conscience !",""],["Ps",40,"Psaume 40:7-9","Héb",10,"Hébreux 10:5-7","paque","« Me voici »","Tu ne désires ni sacrifice ni offrande… Alors je dis : Voici, je viens.","Christ, entrant dans le monde, dit : Tu n'as voulu ni sacrifice ni offrande, mais tu m'as formé un corps… Voici, je viens pour faire ta volonté.","Le psaume devient, en Hébreux, la prière du Fils entrant dans le monde."],["Ex",16,"Exode 16:18","2Co",8,"2 Corinthiens 8:15","paque","Ni trop, ni trop peu","Celui qui avait ramassé beaucoup n'avait rien de trop, et celui qui avait ramassé peu n'en manquait pas.","Selon qu'il est écrit : Celui qui avait ramassé beaucoup n'avait rien de trop.","La règle de la manne devient la règle du partage chrétien."],["Deut",8,"Deutéronome 8:3","Mt",4,"Matthieu 4:4","paque","Pas de pain seulement","L'homme ne vit pas de pain seulement, mais de toute parole qui sort de la bouche de l'Éternel.","Il est écrit : L'homme ne vivra pas de pain seulement, mais de toute parole qui sort de la bouche de Dieu.","Au désert, Jésus répond à la tentation par la leçon même de la manne."],["Ps",116,"Psaume 116:13","1Co",10,"1 Corinthiens 10:16","paque","La coupe du salut","J'élèverai la coupe des délivrances, et j'invoquerai le nom de l'Éternel.","La coupe de bénédiction que nous bénissons n'est-elle pas la communion au sang de Christ ?","« Coupe de bénédiction » : un terme du repas pascal, repris tel quel par Paul."],["Ex",24,"Exode 24:11","Ap",3,"Apocalypse 3:20","paque","Ils virent Dieu, et ils mangèrent","Ils virent Dieu, et ils mangèrent et burent.","Si quelqu'un entend ma voix et ouvre la porte, j'entrerai chez lui, je souperai avec lui, et lui avec moi.","L'alliance se scelle à table — du Sinaï jusqu'à la porte de Laodicée."],["Gen",3,"Genèse 3:6","Ap",19,"Apocalypse 19:9","paque","Du fruit pris au festin offert","Elle prit de son fruit, et en mangea.","Heureux ceux qui sont appelés au festin des noces de l'Agneau !","Le mal est entré par une bouche ; la communion revient par une table. Première et dernière page : un repas."],["És",25,"Ésaïe 25:6","Ap",19,"Apocalypse 19:9","paque","Le festin pour tous les peuples","L'Éternel des armées prépare pour tous les peuples un festin de mets succulents.","Heureux ceux qui sont appelés au festin des noces de l'Agneau !",""],["Ex",12,"Exode 12:22","Jn",19,"Jean 19:29","paque","L'hysope","Vous prendrez un bouquet d'hysope, vous le tremperez dans le sang.","Ils fixèrent à une branche d'hysope une éponge imbibée de vinaigre, et l'approchèrent de sa bouche.","L'instrument du sang pascal reparaît à l'instant précis où meurt l'Agneau."],["Gen",22,"Genèse 22:16-17","Héb",6,"Hébreux 6:13-14","alliance","Le serment de Morija","Je le jure par moi-même… je te bénirai et je multiplierai ta postérité.","Dieu, ne pouvant jurer par un plus grand que lui, jura par lui-même : Certainement je te bénirai.",""],["2S",7,"2 Samuel 7:14","Héb",1,"Hébreux 1:5","alliance","« Je serai pour lui un père »","Je serai pour lui un père, et il sera pour moi un fils.","Et encore : Je serai pour lui un père, et il sera pour moi un fils.",""],["És",54,"Ésaïe 54:13","Jn",6,"Jean 6:45","alliance","Tous enseignés de Dieu","Tous tes fils seront disciples de l'Éternel.","Il est écrit dans les prophètes : Ils seront tous enseignés de Dieu.",""],["Jér",32,"Jérémie 32:40","Héb",13,"Hébreux 13:20","alliance","Une alliance éternelle","Je traiterai avec eux une alliance éternelle : je ne me détournerai plus d'eux.","…par le sang d'une alliance éternelle.",""],["Éz",34,"Ézéchiel 34:23","Jn",10,"Jean 10:11","alliance","Un seul berger","J'établirai sur elles un seul pasteur, qui les fera paître, mon serviteur David.","Je suis le bon berger. Le bon berger donne sa vie pour ses brebis.","Chez Ézéchiel, Dieu dit « moi-même je paîtrai mes brebis », puis annonce « un seul berger » : Jean 10 tient les deux bouts."],["Deut",30,"Deutéronome 30:14","Rm",10,"Romains 10:8","alliance","La parole tout près","La parole est tout près de toi, dans ta bouche et dans ton cœur.","Que dit-elle donc ? La parole est près de toi… c'est la parole de la foi, que nous prêchons.",""],["Lév",26,"Lévitique 26:12","2Co",6,"2 Corinthiens 6:16","alliance","« Je marcherai au milieu de vous »","Je marcherai au milieu de vous, je serai votre Dieu, et vous serez mon peuple.","Comme Dieu l'a dit : J'habiterai et je marcherai au milieu d'eux ; je serai leur Dieu, et ils seront mon peuple.",""],["És",59,"Ésaïe 59:20","Rm",11,"Romains 11:26","alliance","Le libérateur de Sion","Un rédempteur viendra pour Sion.","Selon qu'il est écrit : Le libérateur viendra de Sion.",""],["Ruth",4,"Ruth 4:14","Lc",1,"Luc 1:68","figures","Le proche rédempteur","Béni soit l'Éternel, qui ne t'a point laissé manquer aujourd'hui d'un rédempteur !","Béni soit le Seigneur, le Dieu d'Israël, de ce qu'il a visité et racheté son peuple.","Boaz, le goël — le parent qui a le droit et le cœur de racheter — dessine de loin le Rédempteur né de sa lignée (Matthieu 1:5)."],["1R",17,"1 Rois 17:22","Lc",7,"Luc 7:14-15","figures","Le fils rendu à sa mère","L'Éternel écouta la voix d'Élie, et l'âme de l'enfant revint en lui.","Jeune homme, je te le dis, lève-toi !… Et Jésus le rendit à sa mère.","À Naïn, la foule s'écrie « un grand prophète » : elle a reconnu la scène d'Élie à Sarepta. Mais Élie priait ; Jésus commande."],["Jos",2,"Josué 2:18","Mt",1,"Matthieu 1:5","figures","Le cordon écarlate","Tu attacheras ce cordon de fil cramoisi à la fenêtre.","Salmon engendra Boaz de Rahab.","La femme au fil écarlate entre dans la généalogie du Messie ; la tradition ancienne a vu dans son cordon le fil du salut à la fenêtre."],["2S",17,"2 Samuel 17:23","Mt",27,"Matthieu 27:5","figures","Le conseiller qui se pend","Achitophel… mit ordre à sa maison, et se pendit.","Judas jeta les pièces d'argent dans le temple, se retira, et alla se pendre.","L'ami de David qui trahit puis se pend : l'ombre portée de Judas (voir Psaume 41:10)."],["Ex",29,"Exode 29:38-39","Héb",10,"Hébreux 10:11-12","temple","Chaque jour — une seule fois","Voici ce que tu offriras sur l'autel : deux agneaux chaque jour, à perpétuité.","Tout sacrificateur se tient chaque jour debout… lui, après avoir offert un seul sacrifice, s'est assis pour toujours à la droite de Dieu.","Le tamid s'arrête là où l'offrande unique commence — et le prêtre toujours debout s'assied enfin."],["Ex",34,"Exode 34:34","2Co",3,"2 Corinthiens 3:16","temple","Le voile ôté","Lorsque Moïse entrait devant l'Éternel, il ôtait le voile.","Quand les cœurs se convertissent au Seigneur, le voile est ôté.",""],["Ag",2,"Aggée 2:9","Lc",2,"Luc 2:27-32","temple","La gloire de la seconde maison","La gloire de cette dernière maison sera plus grande que celle de la première.","Siméon reçut l'enfant dans le temple : Mes yeux ont vu ton salut… lumière pour éclairer les nations.","Le second Temple n'eut ni arche ni nuée — mais un enfant de quarante jours y fut porté."],["Mal",3,"Malachie 3:1","Mt",21,"Matthieu 21:12","temple","Le Seigneur entre dans son temple","Et soudain entrera dans son temple le Seigneur que vous cherchez.","Jésus entra dans le temple de Dieu, et il chassa tous ceux qui vendaient et qui achetaient.",""],["És",56,"Ésaïe 56:7","Mc",11,"Marc 11:17","temple","Maison de prière pour tous","Ma maison sera appelée une maison de prière pour tous les peuples.","N'est-il pas écrit : Ma maison sera appelée une maison de prière pour toutes les nations ?",""],["És",48,"Ésaïe 48:16","Jn",20,"Jean 20:21-22","trinite","Trois dans un verset","Et maintenant, le Seigneur, l'Éternel, m'a envoyé avec son esprit.","Comme le Père m'a envoyé, moi aussi je vous envoie. Puis il souffla sur eux : Recevez le Saint-Esprit.","Chez Ésaïe déjà : un Envoyé parle, un Envoyeur envoie, un Esprit accompagne."],["Pr",30,"Proverbes 30:4","Jn",3,"Jean 3:13","trinite","« Quel est le nom de son fils ? »","Qui est monté aux cieux, et qui en est descendu ?… Quel est son nom, et quel est le nom de son fils ? Le sais-tu ?","Personne n'est monté au ciel, si ce n'est celui qui est descendu du ciel, le Fils de l'homme.","La question laissée ouverte par les Proverbes ; Jésus répond à Nicodème dans les mêmes termes."],["És",63,"Ésaïe 63:10","Ép",4,"Éphésiens 4:30","trinite","L'Esprit que l'on peut attrister","Ils ont été rebelles, ils ont attristé son Esprit Saint.","N'attristez pas le Saint-Esprit de Dieu.","Un Esprit qui peut être « attristé » n'est pas une force : c'est quelqu'un — déjà chez Ésaïe."]];
/* ---------- Traductions alignées sur D : [titre, réf AT, texte AT, réf NT, texte NT, note] ---------- */
const TR={"en":[["Abel: the first lamb offered","Genesis 4:4","Abel brought some of the firstborn of his flock; Yahweh respected his offering.","Hebrews 11:4","By faith Abel offered to God a more excellent sacrifice than Cain.","By the fourth page of the Bible, a lamb offered in faith is accepted. The thread begins here."],["“God will provide the lamb”","Genesis 22:8","God will provide himself the lamb for a burnt offering, my son.","John 1:29","Behold, the Lamb of God, who takes away the sin of the world!","Abraham's answer to Isaac hangs suspended for two thousand years — until John the Baptist's cry on the banks of the Jordan."],["The son carries the wood","Genesis 22:6","Abraham took the wood of the burnt offering and laid it on Isaac his son.","John 19:17","He went out, bearing his cross, to the place called the Place of a Skull, which is called Golgotha.","Isaac climbs Moriah under the wood of the sacrifice; Jesus climbs Golgotha under the wood of the cross. The same hill, according to tradition."],["The substitute","Genesis 22:13","Abraham took the ram, and offered him up for a burnt offering instead of his son.","Romans 8:32","He who didn't spare his own Son, but delivered him up for us all.","On Moriah, God spares Abraham's son. At Calvary, he does not spare his own."],["Without blemish or spot","Exodus 12:5","Your lamb shall be without defect, a male a year old.","1 Peter 1:19","…with precious blood, as of a lamb without blemish or spot, the blood of Christ.","Peter describes Christ in the precise vocabulary of the Passover ritual of Exodus 12."],["The blood that protects","Exodus 12:13","When I see the blood, I will pass over you.","Romans 5:9","Much more then, being now justified by his blood, we will be saved from God's wrath through him.","In Egypt, judgment passes over the houses marked with the blood of the lamb."],["No bone broken","Exodus 12:46","You shall not break a bone of it.","John 19:36","These things happened that the Scripture might be fulfilled: A bone of him will not be broken.","The legs of the two crucified beside him are broken — but not those of Jesus. John recognizes in this the rule of the Passover lamb."],["The sin-bearer","Leviticus 16:22","The goat shall carry all their iniquities on himself to a solitary land.","Hebrews 9:28","Christ also, having been offered once to bear the sins of many.","The great Day of Atonement: the people's sins laid upon a victim that carries them far away."],["The life is in the blood","Leviticus 17:11","It is the blood that makes atonement by reason of the life.","Hebrews 9:22","Apart from shedding of blood, there is no remission.","The letter to the Hebrews reads the whole of Leviticus as the grammar that makes the cross intelligible."],["Lifted up, that we might live","Numbers 21:9","If a serpent had bitten any man, when he looked at the serpent of bronze, he lived.","John 3:14","As Moses lifted up the serpent in the wilderness, even so must the Son of Man be lifted up.","It is Jesus himself who draws this parallel, by night, before Nicodemus — three verses before John 3:16."],["Pierced for our transgressions","Isaiah 53:5","He was pierced for our transgressions… and by his wounds we are healed.","1 Peter 2:24","By whose stripes you were healed.","Written around 700 BC. The complete Isaiah scroll found at Qumran predates Jesus: the prophecy comes before the event."],["The silent lamb","Isaiah 53:7","As a lamb that is led to the slaughter, he didn't open his mouth.","Acts 8:32-35","The Ethiopian was reading this passage. Beginning from this Scripture, Philip preached to him the good news of Jesus.","The first Christian commentary on Isaiah 53 stands within the Bible itself: a chariot, a scroll, a question."],["The straying sheep","Isaiah 53:6","All we like sheep have gone astray. Everyone has turned to his own way.","1 Peter 2:25","You were going astray like sheep, but now you have returned to the Shepherd of your souls.",""],["Counted with the transgressors","Isaiah 53:12","He was counted with the transgressors.","Luke 22:37","This which is written must still be fulfilled in me: He was counted with transgressors.","Jesus quotes Isaiah 53 of himself, only hours before being crucified between two criminals."],["The cry","Psalm 22:2","My God, my God, why have you forsaken me?","Matthew 27:46","Jesus cried: Eli, Eli, lima sabachthani? My God, why have you forsaken me?","On the cross, Jesus prays Psalm 22 — written nearly a thousand years earlier. Read the rest of the psalm: it describes the scene."],["Lots cast for the tunic","Psalm 22:19","They divide my garments among them. They cast lots for my clothing.","John 19:24","They cast lots for the coat, that the Scripture might be fulfilled.",""],["Pierced hands and feet","Psalm 22:17","They have pierced my hands and feet.","John 20:25","Unless I see in his hands the print of the nails… I will not believe.","Crucifixion did not yet exist when this psalm was written."],["The one they pierced","Zechariah 12:10","They will look to me whom they have pierced.","John 19:37","Again another Scripture says: They will look on him whom they pierced.","In Zechariah, it is God who speaks in the first person."],["The shepherd struck","Zechariah 13:7","Strike the shepherd, and the sheep will be scattered!","Matthew 26:31","I will strike the shepherd, and the sheep of the flock will be scattered.","Jesus quotes this verse on the very night of his arrest, foretelling the flight of the disciples."],["The slain Lamb reigns","Isaiah 53:7","As a lamb that is led to the slaughter…","Revelation 5:6","I saw in the middle of the throne a Lamb standing, as though it had been slain.","The end of the thread: the slaughtered lamb of Isaiah stands at the center of the throne of God. The offering has become kingship."],["The first gospel","Genesis 3:15","I will put hostility between your offspring and her offspring. He will bruise your head.","Galatians 4:4","When the fullness of the time came, God sent out his Son, born to a woman.","The promise of a victorious offspring is given on the very day of the fall. Tradition calls it the protoevangelium."],["All nations blessed","Genesis 12:3","All the families of the earth will be blessed through you.","Galatians 3:8","The Scripture preached the Good News beforehand to Abraham: In you all the nations will be blessed.",""],["The Lion of the tribe of Judah","Genesis 49:10","The scepter will not depart from Judah, until he comes to whom it belongs.","Revelation 5:5","Behold, the Lion who is of the tribe of Judah has overcome.","The blessing of the dying Jacob on his son Judah — taken up again on the last page of the Bible."],["The Prophet to come","Deuteronomy 18:15","Yahweh your God will raise up to you a prophet from among your brothers, like me. You shall listen to him.","Acts 3:22","Moses indeed said, The Lord God will raise up a prophet for you, like me.",""],["The throne of David","2 Samuel 7:13","I will establish the throne of his kingdom forever.","Luke 1:32-33","The Lord God will give him the throne of his father David, and there will be no end to his Kingdom.","The angel's announcement to Mary echoes word for word the promise made to David a thousand years earlier."],["“You are my Son”","Psalm 2:7","You are my son. Today I have become your father.","Acts 13:33","God has fulfilled the promise in that he raised up Jesus, as it is written in the second psalm.",""],["He will not see corruption","Psalm 16:10","You will not allow your holy one to see corruption.","Acts 2:31","Foreseeing this, David spoke about the resurrection of the Christ: his flesh didn't see decay.","The first Christian sermon in history, at Pentecost, is a commentary on this psalm."],["David's Lord","Psalm 110:1","Yahweh says to my Lord: Sit at my right hand.","Matthew 22:44","If then David calls him Lord, how is he his son?","The Old Testament verse most often quoted in the entire New."],["The virgin will bear a son","Isaiah 7:14","The virgin will conceive, and bear a son, and shall call his name Immanuel.","Matthew 1:23","All this has happened that it might be fulfilled which was spoken by the Lord through the prophet.","Immanuel: “God with us.”"],["To us a child is born","Isaiah 9:5","For to us a child is born… his name will be called Mighty God, Prince of Peace.","Luke 2:11","There is born to you today, in David's city, a Savior, who is Christ the Lord.",""],["The voice in the wilderness","Isaiah 40:3","The voice of one who calls out: Prepare the way of Yahweh in the wilderness!","Mark 1:3","The voice of one crying in the wilderness: Make ready the way of the Lord!","All four Gospels open John the Baptist's ministry with this same verse from Isaiah."],["“Today this Scripture is fulfilled”","Isaiah 61:1","The Lord Yahweh's Spirit is on me, because Yahweh has anointed me to preach good news to the humble.","Luke 4:21","Today, this Scripture has been fulfilled in your hearing.","In Nazareth, Jesus reads Isaiah in the synagogue, closes the scroll, and applies it to himself."],["Bethlehem","Micah 5:1","But you, Bethlehem… out of you one will come out to me that is to be ruler in Israel, whose goings out are from of old, from ancient times.","Matthew 2:6","Questioned by Herod, the scribes answer with Micah: it is in Bethlehem that the Christ is to be born.","The Messiah's birthplace was identified seven centuries in advance — and known to all."],["Out of Egypt","Hosea 11:1","When Israel was a child, then I loved him, and called my son out of Egypt.","Matthew 2:15","…that it might be fulfilled which was spoken by the Lord through the prophet: Out of Egypt I called my son.","Jesus relives Israel's history: descent into Egypt, exodus, wilderness, testing — but without failing."],["The humble king, on a donkey","Zechariah 9:9","Behold, your King comes to you! He is righteous, and having salvation; lowly, and riding on a donkey.","Matthew 21:5","Tell the daughter of Zion: Behold, your King comes to you, humble, and riding on a donkey.","Palm Sunday, written five centuries in advance."],["Thirty pieces of silver","Zechariah 11:12-13","They weighed for my wages thirty pieces of silver… I took the thirty pieces of silver and threw them to the potter in Yahweh's house.","Matthew 27:9","They took the thirty pieces of silver, the price of him upon whom a price had been set, and they gave them for the potter's field.","The price, the place (the temple), the destination (the potter): three details, a single verse."],["The messenger who prepares","Malachi 3:1","Behold, I send my messenger, and he will prepare the way before me.","Matthew 11:10","This is he, of whom it is written: Behold, I send my messenger before your face.","The last prophet of the Old Testament announces the first of the New."],["The rejected stone","Psalm 118:22","The stone which the builders rejected has become the cornerstone.","Acts 4:11","Jesus is the stone which was regarded as worthless by you, the builders, which has become the head of the corner.",""],["The friend who betrays","Psalm 41:10","He who ate bread with me has lifted up his heel against me.","John 13:18","That the Scripture may be fulfilled: He who eats bread with me has lifted up his heel against me.","Quoted by Jesus during the Last Supper, with Judas still at the table."],["The vinegar","Psalm 69:22","In my thirst, they gave me vinegar to drink.","John 19:29","They put a sponge full of the vinegar and held it at his mouth.",""],["The Son of Man on the clouds","Daniel 7:13","There came with the clouds of the sky one like a son of man.","Matthew 26:64","You will see the Son of Man sitting at the right hand of Power, and coming on the clouds of the sky.","Before the high priest, Jesus answers with Daniel 7 — and it is this quotation that seals his condemnation."],["Death swallowed up","Isaiah 25:8","He has swallowed up death forever! The Lord Yahweh will wipe away tears from off all faces.","1 Corinthians 15:54","Then what is written will happen: Death is swallowed up in victory.",""],["The cornerstone laid in Zion","Isaiah 28:16","Behold, I lay in Zion for a foundation a stone, a tried stone, a precious cornerstone.","1 Peter 2:6","It is contained in Scripture: Behold, I lay in Zion a chief cornerstone, chosen and precious.",""],["The Spirit poured out on all flesh","Joel 3:1","I will pour out my Spirit on all flesh; and your sons and your daughters will prophesy.","Acts 2:17","This is what has been spoken through the prophet Joel, Peter declares on the morning of Pentecost.",""],["The praise of children","Psalm 8:3","From the lips of babes and infants you have established strength.","Matthew 21:16","Did you never read, Out of the mouth of children you have perfected praise?",""],["The bow above the throne","Genesis 9:13","I set my rainbow in the cloud, and it will be a sign of a covenant between me and the earth.","Revelation 4:3","There was a rainbow around the throne, like an emerald to look at.","The sign given to Noah surrounds God's throne at the end of time: the covenant still stands."],["Faith counted as righteousness","Genesis 15:6","He believed in Yahweh, who credited it to him for righteousness.","Romans 4:3","For what does the Scripture say? Abraham believed God, and it was accounted to him for righteousness.","Paul's key verse: the righteousness received by faith precedes the Law by four centuries."],["The circumcision of the heart","Deuteronomy 30:6","Yahweh your God will circumcise your heart, to love Yahweh your God with all your heart.","Romans 2:29","Circumcision is that of the heart, in the spirit, not in the letter.","Moses was already announcing that the outward sign pointed to an inward transformation."],["A kingdom of priests","Exodus 19:6","You shall be to me a kingdom of priests and a holy nation.","1 Peter 2:9","You are a chosen race, a royal priesthood, a holy nation, a people for God's own possession.","The calling given at Sinai is extended by Peter to all who belong to Christ."],[
