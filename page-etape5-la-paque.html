<style>
  :root{
    --bg:#0c0e18;--bg2:#11141f;--ink:#e9e3d3;--muted:#9a94a8;
    --gold:#d3a94f;--line:#23273a;--crimson:#a33;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.65}
  html[dir="rtl"] body{font-family:'Amiri',Georgia,serif;line-height:1.9}
  .display{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500}
  html[dir="rtl"] .display{font-family:'Amiri',serif;font-weight:700}
  .ui{font-family:system-ui,-apple-system,sans-serif}
  html[dir="rtl"] .ui{font-family:'Amiri',system-ui,sans-serif}

  /* top bar */
  .top{
    max-width:1060px;margin:0 auto;padding:18px 20px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--line);
  }
  .brand{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.34em;color:var(--gold)}
  .langs{display:flex;gap:6px}
  .langs button{
    font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.08em;
    background:none;border:1px solid var(--line);border-radius:6px;
    color:var(--muted);padding:6px 12px;cursor:pointer;
  }
  .langs button[aria-pressed="true"]{color:var(--ink);border-color:var(--gold)}
  .langs button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* fil / étapes */
  .thread{max-width:1060px;margin:26px auto 0;padding:0 20px}
  .thread .lbl{font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;text-align:center}
  html[dir="rtl"] .thread .lbl{letter-spacing:.06em}
  .dots{display:flex;justify-content:center;align-items:center;gap:0;margin-top:14px;flex-wrap:wrap}
  .dot{display:flex;flex-direction:column;align-items:center;width:86px}
  .dot .pt{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg)}
  .dot.on .pt{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(211,169,79,.6)}
  .dot .nm{font-family:system-ui,sans-serif;font-size:9.5px;color:var(--muted);margin-top:7px;text-align:center;line-height:1.3}
  html[dir="rtl"] .dot .nm{font-size:11px}
  .dot.on .nm{color:var(--gold)}
  .dots .seg{height:1px;width:34px;background:var(--line);margin-bottom:22px}

  /* hero */
  .hero{max-width:820px;margin:0 auto;padding:58px 22px 30px;text-align:center}
  .eyebrow{font-family:system-ui,sans-serif;font-size:11.5px;letter-spacing:.26em;color:var(--gold);text-transform:uppercase;margin-bottom:22px}
  html[dir="rtl"] .eyebrow{letter-spacing:.05em;font-family:'Amiri',sans-serif;font-size:15px}
  .verse{font-size:clamp(30px,6vw,54px);line-height:1.22;font-style:italic}
  html[dir="rtl"] .verse{font-style:normal}
  .verse .g{color:var(--gold)}
  .scene{max-width:600px;margin:26px auto 0;color:var(--muted);font-size:16px}

  /* strates */
  main{max-width:820px;margin:0 auto;padding:10px 22px 70px}
  .strate{margin-top:54px}
  .shead{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .snum{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--gold);
    color:var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:18px;flex:none;
  }
  .shead h2{font-family:system-ui,sans-serif;font-size:12.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);font-weight:600}
  html[dir="rtl"] .shead h2{letter-spacing:.05em;font-family:'Amiri',sans-serif;font-size:17px}
  .shead .l{flex:1;height:1px;background:var(--line)}
  .strate p{font-size:17.5px;margin-bottom:16px}
  .strate p .g{color:var(--gold)}

  .mental{
    border:1px solid var(--line);border-inline-start:3px solid var(--gold);
    background:var(--bg2);border-radius:0 10px 10px 0;
    padding:18px 22px;margin-top:8px;font-size:16.5px;
  }
  html[dir="rtl"] .mental{border-radius:10px 0 0 10px}
  .mental b{color:var(--gold);font-weight:normal}

  h3.sub{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:26px;margin:34px 0 12px}
  html[dir="rtl"] h3.sub{font-family:'Amiri',serif;font-weight:700}

  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 6px}
  @media(max-width:680px){.cards{grid-template-columns:1fr}}
  .cardE{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:20px 18px}
  .cardE .cref{font-family:system-ui,sans-serif;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  html[dir="rtl"] .cardE .cref{letter-spacing:.05em;font-family:'Amiri',sans-serif;font-size:13px}
  .cardE h4{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:20px;margin-bottom:8px}
  html[dir="rtl"] .cardE h4{font-family:'Amiri',serif}
  .cardE p{font-size:14.5px;color:#c6c0b2;margin:0}
  .cardE .key{display:block;margin-top:10px;color:var(--gold);font-style:italic;font-size:14.5px}

  details.deep{border:1px solid var(--line);border-radius:10px;background:var(--bg2);margin-bottom:10px}
  details.deep summary{
    cursor:pointer;list-style:none;padding:16px 20px;
    font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  html[dir="rtl"] details.deep summary{font-family:'Amiri',serif}
  details.deep summary::-webkit-details-marker{display:none}
  details.deep summary::after{content:"+";color:var(--gold);font-size:22px;flex:none}
  details.deep[open] summary::after{content:"−"}
  details.deep .body{padding:0 20px 18px;color:#c6c0b2;font-size:15.5px}

  .next{
    margin-top:60px;border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(135deg,var(--bg2),#171426);
    padding:28px;display:block;text-decoration:none;color:var(--ink);
    position:relative;overflow:hidden;
  }
  .next::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--crimson))}
  .next .nlbl{font-family:system-ui,sans-serif;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold)}
  html[dir="rtl"] .next .nlbl{letter-spacing:.05em;font-family:'Amiri',sans-serif;font-size:13px}
  .next h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:8px 0 6px}
  html[dir="rtl"] .next h3{font-family:'Amiri',serif;font-weight:700}
  .next p{color:var(--muted);font-size:15px;margin:0}

  footer{max-width:820px;margin:0 auto 46px;padding:0 22px;color:#5c6077;font-size:12.5px;font-family:system-ui,sans-serif;text-align:center;line-height:1.8;border-top:1px solid var(--line);padding-top:22px}

  @media (prefers-reduced-motion:no-preference){
    .hero,.strate,.next{animation:rise .7s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  }
</style>

  steps:["Voici l'Agneau","L'Agneau règne","La croix","Isaïe 53","La Pâque","Morija","Le commencement"],
  eyebrow:"Exode 12 · Égypte, XVe ou XIIIe siècle av. J.-C. selon les datations — récit fondateur porté par une mémoire rituelle ininterrompue depuis trente-trois siècles",
  verse:"« Je verrai <span class='g'>le sang</span>, et je passerai par-dessus vous. »",
  scene:"Dernière nuit de l'esclavage. À chaque famille, un ordre étrange : prenez un agneau sans défaut, gardez-le quatre jours, immolez-le au crépuscule, mettez son sang sur les portes, mangez-le en hâte. Cette nuit-là naît un peuple — et le mot « agneau » reçoit son sens pour toujours.",
  s1:"L'essentiel · 90 secondes",s2:"Comprendre",s3:"Aller plus loin",
  s1p:[
  "La Pâque (<i>pessah</i>, « passer par-dessus ») est l'événement fondateur d'Israël : Dieu juge l'Égypte et épargne les maisons marquées du sang de l'agneau. Ce n'est pas la valeur des habitants qui protège la maison — c'est <span class='g'>le sang sur la porte</span>.",
  "L'agneau doit être « sans défaut », gardé du 10 au 14 du mois — quatre jours dans la maison, le temps de s'y attacher — puis immolé « entre les deux soirs », rôti et mangé entièrement, en famille, ceinture aux reins, prêts à partir.",
  "Et l'ordre s'accompagne d'une loi de mémoire : « vous célébrerez ce jour de génération en génération » (12:14). Trente-trois siècles plus tard, la Pâque est toujours célébrée. Et c'est dans ce cadre-là — un soir de Pâque — que Jésus dira : « ceci est mon corps »."],
  mental:"<b>L'image à retenir :</b> une porte marquée de sang. Le jugement ne regarde pas qui habite la maison, mais ce qui couvre la porte.",
  h1:"Les règles de l'agneau",
  intro:"Chaque prescription d'Exode 12 deviendra un trait du Christ dans le Nouveau Testament :",
  cards:[
  ["Exode 12:5 → 1 Pierre 1:19","Sans défaut","L'agneau est choisi parfait : la victime ne peut pas être elle-même endettée. Pierre reprend les mots exacts — « un agneau sans défaut et sans tache » — après que Pilate a déclaré : « je ne trouve en lui aucun crime ».","L'innocence est la condition de l'offrande."],
  ["Exode 12:7, 13 → Romains 5:9","Le sang sur la porte","Le sang n'est pas magique : il est le signe qu'une vie a été donnée à la place de la maison. « Je verrai le sang, et je passerai. » Paul dira : « justifiés par son sang ».","Une vie donnée couvre la maison."],
  ["Exode 12:8-11, 46 → Jean 19:36","Mangé, non brisé","L'agneau est mangé : la délivrance se reçoit à table, en communauté. Et « vous ne briserez aucun de ses os » — la règle que Jean verra accomplie à Golgotha, à la lettre.","La Pâque est un repas, et l'Agneau reste entier."]],
  h2:"Une nuit qui devient calendrier",
  s2b:[
  "« Ce mois-ci sera pour vous le premier des mois » (12:2) : la délivrance remet les horloges à zéro. Israël ne compte plus le temps depuis la création, mais depuis la libération. Le Nouveau Testament fera de même : la Cène institue un mémorial — « faites ceci en mémoire de moi » — et le premier jour de la semaine, jour de la résurrection, devient le rendez-vous des chrétiens.",
  "Notez l'ordre des événements : d'abord la délivrance, ensuite la Loi — le Sinaï vient <span class='g'>après</span> la sortie d'Égypte. Dieu sauve avant d'exiger. Cet ordre-là est déjà l'Évangile en germe."],
  h3:"Et l'agneau, aujourd'hui ?",
  s2c:["Depuis la destruction du Temple en l'an 70, plus aucun agneau n'est immolé à la Pâque juive : le plateau du seder garde un os (<i>zeroa</i>) en mémorial. Deux mille ans de Pâque sans agneau — le fait donne à réfléchir, et le Nouveau Testament propose sa lecture : l'Agneau a été donné, une fois pour toutes (Hébreux 10:10-14)."],
  deep:[
  ["« Entre les deux soirs »","L'hébreu <i>ben ha-arbayim</i> (12:6) désigne la fin d'après-midi ; au Ier siècle, l'immolation au Temple se faisait environ de la neuvième à la onzième heure (15 h – 17 h). Les évangiles situent la mort de Jésus « vers la neuvième heure » (Marc 15:34) — au commencement de l'heure des agneaux."],
  ["Les quatre jours de garde","L'agneau entre dans la maison le 10 du mois et meurt le 14 (12:3-6) : le temps que la famille le connaisse. Beaucoup de lecteurs relèvent le parallèle : Jésus entre à Jérusalem quelques jours avant la Pâque, enseigne publiquement au Temple, est examiné par toutes les autorités — puis meurt le 14. Le parallèle est suggestif ; nous le présentons comme tel, sans le durcir en chronologie stricte."],
  ["Pessah : l'étymologie du passage","Le verbe <i>pasah</i> signifie « passer par-dessus », « épargner » — certains y entendent aussi « protéger » (cf. Isaïe 31:5, où le même verbe décrit l'Éternel protégeant Jérusalem « comme des oiseaux qui couvrent leurs petits »). La Septante en tire le mot <i>pascha</i> — celui de « Christ, notre Pâque » (1 Corinthiens 5:7) et du vocabulaire pascal de toutes les Églises."],
  ["Un mémorial, pas un souvenir","« Ce jour sera pour vous un mémorial » (<i>zikkaron</i>, 12:14) : dans la Bible, le mémorial ne rappelle pas seulement le passé — il rend la délivrance présente à chaque génération. La Haggada de Pâque le dit : « en chaque génération, chacun doit se regarder comme étant lui-même sorti d'Égypte ». C'est l'arrière-plan exact de « faites ceci en mémoire de moi » (Luc 22:19) — la clé de notre section L'Offrande."],
  ["La datation de l'Exode","Deux écoles principales : le XVe siècle av. J.-C. (lecture littérale de 1 Rois 6:1) ou le XIIIe (données archéologiques sur Pithom et Ramsès, Exode 1:11). Le site n'a pas à trancher : aucune des deux datations ne change le sens de la nuit. Nous documentons les deux positions dans le dossier de référence — dire honnêtement ce qui est débattu fait partie d'être une référence."]],
  nlbl:"Étape suivante",ntitle:"Morija — Genèse 22",

  foot:"Textes bibliques : Louis Segond 1910 (FR) · World English Bible (EN) · Van Dyck (AR).<br>Parcours « Le fil de l'Agneau » — étape 5 sur 7."

en:{
  dir:"ltr",brand:"THE LAMB OF GOD",
  steplbl:"The thread of the Lamb · step 5 of 7",
  steps:["Behold the Lamb","The Lamb Reigns","The Cross","Isaiah 53","The Passover","Moriah","The Beginning"],
  eyebrow:"Exodus 12 · Egypt, 15th or 13th century BC depending on the dating — a founding account carried by an unbroken ritual memory for thirty-three centuries",
  verse:"“When I see <span class='g'>the blood</span>, I will pass over you.”",
  scene:"The last night of slavery. To every family, a strange order: take a lamb without defect, keep it four days, slaughter it at twilight, put its blood on the doorposts, eat it in haste. That night a people is born — and the word “lamb” receives its meaning forever.",
  s1:"The essentials · 90 seconds",s2:"Understand",s3:"Go deeper",
  s1p:[
  "The Passover (<i>pesach</i>, “to pass over”) is Israel's founding event: God judges Egypt and spares the houses marked with the lamb's blood. It is not the worth of the inhabitants that protects the house — it is <span class='g'>the blood on the door</span>.",
  "The lamb must be “without defect”, kept from the 10th to the 14th of the month — four days in the house, long enough to grow attached — then slaughtered “between the two evenings”, roasted and eaten whole, as a family, belts fastened, ready to leave.",
  "And the order comes with a law of memory: “you shall keep this day throughout your generations” (12:14). Thirty-three centuries later, Passover is still kept. And it is within that very frame — on a Passover evening — that Jesus will say: “this is my body”."],
  mental:"<b>The image to keep:</b> a door marked with blood. The judgment does not look at who lives in the house, but at what covers the door.",
  h1:"The rules of the lamb",
  intro:"Every prescription of Exodus 12 will become a trait of Christ in the New Testament:",
  cards:[
  ["Exodus 12:5 → 1 Peter 1:19","Without defect","The lamb is chosen perfect: the victim cannot itself be in debt. Peter takes up the exact words — “a lamb without blemish or spot” — after Pilate had declared: “I find no basis for a charge against him”.","Innocence is the condition of the offering."],
  ["Exodus 12:7, 13 → Romans 5:9","The blood on the door","The blood is not magic: it is the sign that a life has been given in the place of the household. “When I see the blood, I will pass over.” Paul will say: “justified by his blood”.","A life given covers the house."],
  ["Exodus 12:8-11, 46 → John 19:36","Eaten, not broken","The lamb is eaten: deliverance is received at table, in community. And “you shall not break a bone of it” — the rule John will see fulfilled at Golgotha, to the letter.","The Passover is a meal, and the Lamb remains whole."]],
  h2:"A night that becomes a calendar",
  s2b:[
  "“This month shall be to you the beginning of months” (12:2): deliverance resets the clocks. Israel no longer counts time from creation, but from liberation. The New Testament will do the same: the Supper institutes a memorial — “do this in memory of me” — and the first day of the week, the day of the resurrection, becomes the Christians' appointed meeting.",
  "Note the order of events: first the deliverance, then the Law — Sinai comes <span class='g'>after</span> the exodus from Egypt. God saves before he commands. That order is already the Gospel in seed."],
  h3:"And the lamb, today?",
  s2c:["Since the destruction of the Temple in AD 70, no lamb has been slaughtered at the Jewish Passover: the seder plate keeps a bone (<i>zeroa</i>) as a memorial. Two thousand years of Passover without a lamb — the fact gives pause, and the New Testament offers its reading: the Lamb has been given, once for all (Hebrews 10:10-14)."],
  deep:[
  ["“Between the two evenings”","The Hebrew <i>ben ha-arbayim</i> (12:6) designates the late afternoon; in the first century, the slaughter at the Temple took place roughly from the ninth to the eleventh hour (3–5 pm). The Gospels place the death of Jesus “at the ninth hour” (Mark 15:34) — at the opening of the hour of the lambs."],
  ["The four days of keeping","The lamb enters the house on the 10th of the month and dies on the 14th (12:3-6): time enough for the family to know it. Many readers note the parallel: Jesus enters Jerusalem a few days before Passover, teaches publicly in the Temple, is examined by every authority — then dies on the 14th. The parallel is suggestive; we present it as such, without hardening it into strict chronology."],
  ["Pesach: the etymology of the passing","The verb <i>pasach</i> means “to pass over”, “to spare” — some also hear “to protect” (cf. Isaiah 31:5, where the same verb describes the Lord protecting Jerusalem “like birds hovering” over their young). From it the Septuagint drew the word <i>pascha</i> — that of “Christ, our Passover” (1 Corinthians 5:7) and of the paschal vocabulary of all the churches."],
  ["A memorial, not a souvenir","“This day shall be to you for a memorial” (<i>zikkaron</i>, 12:14): in the Bible, a memorial does not merely recall the past — it makes the deliverance present to each generation. The Passover Haggadah says it: “in every generation, each person must regard himself as having personally come out of Egypt”. This is the exact background of “do this in memory of me” (Luke 22:19) — the key to our section The Offering."],
  ["The dating of the Exodus","Two main schools: the 15th century BC (a literal reading of 1 Kings 6:1) or the 13th (archaeological data on Pithom and Rameses, Exodus 1:11). The site does not have to decide: neither dating changes the meaning of the night. We document both positions in the reference dossier — saying honestly what is debated is part of being a reference."]],
  nlbl:"Next step",ntitle:"Moriah — Genesis 22",

},

  steps:["هوذا الحمل","الحمل يملك","الصليب","إشعياء ٥٣","الفصح","المريّا","البداية"],

  s1:"الخلاصة · ٩٠ ثانية",s2:"للفهم",s3:"للتعمّق",
