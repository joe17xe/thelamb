<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le seuil — une porte, des salles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0d16;--bg2:#11141f;--ink:#e9e3d3;--muted:#9a94a8;--gold:#d3a94f;--line:#23273a;--crimson:#a33;
   --agneau:#d3a94f;--trinite:#8fb8d8;--eucharistie:#c98a5e;--bible:#7cb47c;--prophetes:#a583d6;--soon:#3a3f52}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,serif;line-height:1.6;overflow-x:hidden}
  html[dir="rtl"] body{font-family:'Amiri',serif;line-height:1.9}
  .display{font-family:'Cormorant Garamond',serif;font-weight:500}
  html[dir="rtl"] .display{font-family:'Amiri',serif;font-weight:700}
  .ui{font-family:system-ui,sans-serif}
  .top{max-width:1180px;margin:0 auto;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
  .brand{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.34em;color:var(--gold)}
  .langs{display:flex;gap:6px}
  .langs button{font-family:system-ui,sans-serif;font-size:12px;background:none;border:1px solid var(--line);border-radius:6px;color:var(--muted);padding:6px 12px;cursor:pointer}
  .langs button[aria-pressed="true"]{color:var(--ink);border-color:var(--gold)}
  /* le seuil */
  .threshold{max-width:760px;margin:0 auto;padding:70px 22px 30px;text-align:center;position:relative}
  .halo{position:absolute;top:0;left:50%;transform:translateX(-50%);width:520px;height:520px;max-width:96vw;
    background:radial-gradient(circle,color-mix(in srgb,var(--gold) 12%,transparent),transparent 62%);pointer-events:none;z-index:0}
  .threshold>*{position:relative;z-index:1}
  .kicker{font-family:system-ui,sans-serif;font-size:11.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
  html[dir="rtl"] .kicker{letter-spacing:.06em}
  .door{font-size:clamp(34px,7vw,66px);line-height:1.08;font-style:italic}
  html[dir="rtl"] .door{font-style:normal}
  .door .g{color:var(--gold)}
  .sub{max-width:560px;margin:22px auto 0;color:var(--muted);font-size:16.5px}
  .oneline{margin-top:20px;font-family:system-ui,sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6b6f85}
  html[dir="rtl"] .oneline{letter-spacing:.04em}
  /* la rotonde : salles en 360 */
  .rotonde{max-width:1180px;margin:20px auto 0;padding:10px 22px 20px}
  .rlabel{text-align:center;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
  html[dir="rtl"] .rlabel{letter-spacing:.05em}
  .rooms{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:820px){.rooms{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.rooms{grid-template-columns:1fr}}
  .room{position:relative;display:block;background:linear-gradient(160deg,var(--bg2),#0d1019);border:1px solid var(--line);
    border-radius:16px;padding:26px 24px 24px;text-decoration:none;color:var(--ink);overflow:hidden;transition:transform .2s,border-color .2s}
  .room:hover{transform:translateY(-3px);border-color:var(--rc,var(--gold))}
  .room::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;
    background:linear-gradient(160deg,color-mix(in srgb,var(--rc,var(--gold)) 40%,transparent),transparent 55%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .rtag{font-family:system-ui,sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--rc,var(--gold));margin-bottom:12px;display:flex;align-items:center;gap:7px}
  html[dir="rtl"] .rtag{letter-spacing:.04em}
  .rtag .dot{width:8px;height:8px;border-radius:50%;background:var(--rc,var(--gold))}
  .room h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;margin-bottom:6px;line-height:1.05}
  html[dir="rtl"] .room h2{font-family:'Amiri',serif}
  .room .q{color:#cfc9bb;font-size:14.5px;font-style:italic;margin-bottom:14px}
  html[dir="rtl"] .room .q{font-style:normal}
  .room .enter{font-family:system-ui,sans-serif;font-size:12.5px;color:var(--rc,var(--gold));display:inline-flex;align-items:center;gap:6px}
  .room .arw{transition:transform .2s}
  html[dir="rtl"] .room .arw{transform:scaleX(-1)}
  .room:hover .arw{transform:translateX(4px)}
  html[dir="rtl"] .room:hover .arw{transform:scaleX(-1) translateX(4px)}
  .room.soon{opacity:.62;pointer-events:none;background:linear-gradient(160deg,#0d0f18,#0b0d14)}
  .room.soon .rtag,.room.soon .enter{color:var(--muted)}
  .room.soon::before{background:linear-gradient(160deg,color-mix(in srgb,var(--soon) 60%,transparent),transparent 55%)}
  .badge-soon{position:absolute;top:16px;inset-inline-end:16px;font-family:system-ui,sans-serif;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 9px}
  /* le fil qui relie */
  .link360{max-width:820px;margin:36px auto 0;padding:22px 26px;border:1px dashed var(--line);border-radius:14px;text-align:center;background:color-mix(in srgb,var(--gold) 3%,transparent)}
  .link360 .t{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);margin-bottom:6px}
  html[dir="rtl"] .link360 .t{font-family:'Amiri',serif}
  .link360 p{color:var(--muted);font-size:14.5px;max-width:600px;margin:0 auto}
  footer{max-width:820px;margin:40px auto 46px;padding:22px 22px 0;border-top:1px solid var(--line);text-align:center;color:#5c6077;font-size:12.5px;font-family:system-ui,sans-serif;line-height:1.8}
  @media (prefers-reduced-motion:no-preference){
    .threshold,.rotonde,.link360{animation:rise .8s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div class="top">
  <div class="brand" id="brand"></div>
  <div class="langs" role="group" aria-label="Langue">
    <button data-l="fr" aria-pressed="true">FR</button>
    <button data-l="en" aria-pressed="false">EN</button>
    <button data-l="ar" aria-pressed="false">عربي</button>
  </div>
</div>

<section class="threshold">
  <div class="halo"></div>
  <div class="kicker" id="kicker"></div>
  <h1 class="door display" id="door"></h1>
  <p class="sub" id="sub"></p>
  <div class="oneline" id="oneline"></div>
</section>

<section class="rotonde">
  <div class="rlabel" id="rlabel"></div>
  <div class="rooms" id="rooms"></div>
</section>

<section class="link360">
  <div class="t" id="l360t"></div>
  <p id="l360p"></p>
</section>

<footer id="foot"></footer>

<script>
const ROOMS={
 agneau:{c:"var(--agneau)",href:"page-fondatrice-emmaus.html"},
 trinite:{c:"var(--trinite)",href:"salle-trinite.html"},
 eucharistie:{c:"var(--eucharistie)",href:"section-offrande.html"},
 bible:{c:"var(--bible)",href:"section-bible-fiable.html"},
 bibliotheque:{c:"#b07d54",href:"salle-bibliotheque.html"},
 prophetes:{c:"var(--prophetes)",href:"frise-prophetes.html"}
};
const T={
fr:{dir:"ltr",brand:"LE SEUIL",
 kicker:"Une seule porte",
 door:"Entrez. Puis choisissez la <span class='g'>salle</span> qui vous appelle.",
 sub:"Ce site est une maison à plusieurs salles. On entre par un seul seuil — le Christ — et de là, chaque salle éclaire les autres. Vous ne vous perdrez pas : toutes communiquent.",
 oneline:"66 livres · un seul fil · un seul Seigneur",
 rlabel:"Les salles",
 rooms:[
  {k:"agneau",tag:"Ouverte",title:"L'Agneau de Dieu",q:"Pourquoi Jésus meurt-il à l'heure des agneaux ?",enter:"Entrer par la route d'Emmaüs",soon:false},
  {k:"trinite",tag:"Nouvelle salle",title:"Le Père, le Fils, l'Esprit",q:"Un seul Dieu, révélé en trois. Qui l'a révélé, et comment ?",enter:"Entrer dans la salle",soon:false},
  {k:"eucharistie",tag:"Ouverte",title:"L'Offrande",q:"Pourquoi « ceci est mon corps » ? La table, par les Écritures.",enter:"Entrer dans la salle",soon:false},
  {k:"bibliotheque",tag:"Nouvelle salle",title:"La bibliothèque",q:"Comment la Bible est-elle composée ? Les 66 livres, les fêtes.",enter:"Entrer dans la salle",soon:false},
  {k:"bible",tag:"Ouverte",title:"Une Bible fiable",q:"Peut-on lui faire confiance ? Manuscrits, prophéties, faits.",enter:"Entrer dans la salle",soon:false},
  {k:"prophetes",tag:"Ouverte",title:"Les veilleurs",q:"Mille ans d'annonces datées, jusqu'au Christ.",enter:"Parcourir la frise",soon:false},
  {k:"soon",tag:"À venir",title:"D'autres salles",q:"La prière, l'Esprit qui agit, la fin des temps, l'Église… petit à petit.",enter:"",soon:true}],
 soonBadge:"Bientôt",
 l360t:"Une maison en 360°, pas un couloir",
 l360p:"Chaque salle a une porte vers les autres. De l'Agneau, on passe à la Trinité (car c'est le Fils qui se donne) ; de la Trinité à la Bible (car c'est elle qui la révèle) ; de la Bible aux veilleurs. Où que vous entriez, tout se tient.",
 foot:"Textes bibliques : Segond 1910 · World English Bible · Van Dyck.<br>Le seuil — une porte, des salles connectées. Le site grandit salle après salle."},
en:{dir:"ltr",brand:"THE THRESHOLD",
 kicker:"One single door",
 door:"Enter. Then choose the <span class='g'>room</span> that calls you.",
 sub:"This site is a house of many rooms. You enter by one threshold — Christ — and from there, each room lights up the others. You will not get lost: they all connect.",
 oneline:"66 books · one single thread · one single Lord",
 rlabel:"The rooms",
 rooms:[
  {k:"agneau",tag:"Open",title:"The Lamb of God",q:"Why does Jesus die at the hour of the lambs?",enter:"Enter by the road to Emmaus",soon:false},
  {k:"trinite",tag:"New room",title:"The Father, the Son, the Spirit",q:"One God, revealed as three. Who revealed it, and how?",enter:"Enter the room",soon:false},
  {k:"eucharistie",tag:"Open",title:"The Offering",q:"Why “this is my body”? The table, by the Scriptures.",enter:"Enter the room",soon:false},
  {k:"bibliotheque",tag:"New room",title:"The library",q:"How is the Bible composed? The 66 books, the feasts.",enter:"Enter the room",soon:false},
  {k:"bible",tag:"Open",title:"A trustworthy Bible",q:"Can it be trusted? Manuscripts, prophecies, facts.",enter:"Enter the room",soon:false},
  {k:"prophetes",tag:"Open",title:"The watchmen",q:"A thousand years of dated announcements, up to Christ.",enter:"Walk the timeline",soon:false},
  {k:"soon",tag:"Coming",title:"More rooms",q:"Prayer, the Spirit at work, the end times, the Church… little by little.",enter:"",soon:true}],
 soonBadge:"Soon",
 l360t:"A house in 360°, not a corridor",
 l360p:"Each room has a door to the others. From the Lamb you pass to the Trinity (for it is the Son who gives himself); from the Trinity to the Bible (for it reveals it); from the Bible to the watchmen. Wherever you enter, it all holds together.",
 foot:"Bible texts: Segond 1910 · World English Bible · Van Dyck.<br>The threshold — one door, connected rooms. The site grows room by room."},
ar:{dir:"rtl",brand:"العتبة",
 kicker:"بابٌ واحد",
 door:"ادخل. ثم اختر <span class='g'>القاعة</span> التي تناديك.",
 sub:"هذا الموقع بيتٌ ذو قاعاتٍ كثيرة. تدخل من عتبةٍ واحدة — المسيح — ومنها تُضيء كلُّ قاعةٍ الأخريات. لن تضيع: كلُّها متصلة.",
 oneline:"٦٦ سفرًا · خيطٌ واحد · ربٌّ واحد",
 rlabel:"القاعات",
 rooms:[
  {k:"agneau",tag:"مفتوحة",title:"حمل الله",q:"لماذا يموت يسوع في ساعة الحملان؟",enter:"ادخل من طريق عمواس",soon:false},
  {k:"trinite",tag:"قاعة جديدة",title:"الآب والابن والروح",q:"إلهٌ واحد، مُعلَنٌ ثلاثةً. من أعلنه، وكيف؟",enter:"ادخل القاعة",soon:false},
  {k:"eucharistie",tag:"مفتوحة",title:"التقدمة",q:"لماذا «هذا هو جسدي»؟ المائدة، بالكتاب.",enter:"ادخل القاعة",soon:false},
  {k:"bibliotheque",tag:"قاعة جديدة",title:"المكتبة",q:"كيف يتألف الكتاب المقدس؟ الأسفار الـ٦٦، والأعياد.",enter:"ادخل القاعة",soon:false},
  {k:"bible",tag:"مفتوحة",title:"كتابٌ جدير بالثقة",q:"أيمكن الوثوق به؟ مخطوطات، ونبوءات، ووقائع.",enter:"ادخل القاعة",soon:false},
  {k:"prophetes",tag:"مفتوحة",title:"الحرّاس",q:"ألفُ سنة من الإعلانات المؤرَّخة، حتى المسيح.",enter:"تصفّح الخط الزمني",soon:false},
  {k:"soon",tag:"قادمة",title:"قاعاتٌ أخرى",q:"الصلاة، والروحُ العامل، وآخرُ الزمان، والكنيسة… شيئًا فشيئًا.",enter:"",soon:true}],
 soonBadge:"قريبًا",
 l360t:"بيتٌ في ٣٦٠ درجة، لا ممرّ",
 l360p:"لكل قاعةٍ بابٌ إلى الأخريات. من الحمل تنتقل إلى الثالوث (فالابنُ هو الذي يبذل نفسه)؛ ومن الثالوث إلى الكتاب (فهو الذي يُعلنه)؛ ومن الكتاب إلى الحرّاس. أينما دخلت، كلُّ شيءٍ متماسك.",
 foot:"النصوص الكتابية: سيجون ١٩١٠ · World English Bible · فانديك.<br>العتبة — بابٌ واحد، وقاعاتٌ متصلة. الموقعُ ينمو قاعةً بعد قاعة."}};

function render(l){
  const c=T[l];
  document.documentElement.lang=l;document.documentElement.dir=c.dir;
  document.getElementById('brand').textContent=c.brand;
  document.getElementById('kicker').textContent=c.kicker;
  document.getElementById('door').innerHTML=c.door;
  document.getElementById('sub').textContent=c.sub;
  document.getElementById('oneline').textContent=c.oneline;
  document.getElementById('rlabel').textContent=c.rlabel;
  const box=document.getElementById('rooms');box.innerHTML="";
  c.rooms.forEach(r=>{
    const meta=ROOMS[r.k]||{c:"var(--soon)",href:"#"};
    const a=document.createElement('a');
    a.className='room'+(r.soon?' soon':'');
    a.href=r.soon?'#':meta.href;
    a.style.setProperty('--rc',meta.c);
    a.innerHTML=`${r.soon?`<span class="badge-soon">${c.soonBadge}</span>`:''}
      <div class="rtag"><span class="dot"></span>${r.tag}</div>
      <h2>${r.title}</h2>
      <div class="q">${r.q}</div>
      ${r.enter?`<span class="enter">${r.enter} <span class="arw">→</span></span>`:''}`;
    box.appendChild(a);
  });
  document.getElementById('l360t').textContent=c.l360t;
  document.getElementById('l360p').textContent=c.l360p;
  document.getElementById('foot').innerHTML=c.foot;
  document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.l===l?'true':'false'));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.l)));
render('fr');
</script>
</body>
</html>
