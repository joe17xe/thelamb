  h3:"« L'Agneau de Dieu »",
  s2c:["Deux mots décisifs. Dans toute l'histoire biblique, c'est l'homme qui apporte la victime. Ici, le mouvement s'inverse : c'est <span class='g'>Dieu qui fournit l'Agneau</span>. Abraham l'avait dit à Isaac sur le chemin de Morija : « Dieu se pourvoira lui-même de l'agneau » (Genèse 22:8). Au Jourdain, cette promesse trouve son visage."],

  ["John's hour","In the fourth Gospel, Jesus is condemned “about the sixth hour” of “the preparation day of the Passover” (John 19:14) — the hour when the slaughter of the lambs began at the Temple. And John notes that none of his bones was broken (19:36), the rule of the Passover lamb (Exodus 12:46). The evangelist wants the reader to see what he saw."],
  ["The sound in the background","The historian Flavius Josephus reports that at a single Passover, more than 250,000 lambs could be slaughtered in Jerusalem. When John says “behold the Lamb”, he speaks to a people for whom that word has a smell, a sound and a cost."],

  ["كلمتان يونانيتان للحمل","يستعمل يوحنا ١: ٢٩ كلمة <i>أمنوس</i>، وهي كلمة الذبائح، ولا ترد في العهد الجديد إلا أربع مرات (يوحنا ١: ٢٩ و٣٦؛ أعمال ٨: ٣٢؛ ١ بطرس ١: ١٩) وكلّها في سياق الذبيحة. أما سفر الرؤيا فيستعمل كلمة أخرى، <i>أرنيون</i>، ثماني وعشرين مرة: الحمل المذبوح وقد صار صورةَ المجد."],

function render(l){
  const c=C[l];
  document.documentElement.lang=l;
  document.documentElement.dir=c.dir;
  document.getElementById('brand').textContent=c.brand;
  document.getElementById('steplbl').textContent=c.steplbl;
  const dots=document.getElementById('dots');dots.innerHTML="";
  c.steps.forEach((s,i)=>{
    if(i>0){const seg=document.createElement('div');seg.className='seg';dots.appendChild(seg);}
    const d=document.createElement('div');d.className='dot'+(i===0?' on':'');
    d.innerHTML=`<div class="pt"></div><div class="nm">${s}</div>`;dots.appendChild(d);
  });
  document.getElementById('eyebrow').textContent=c.eyebrow;
  document.getElementById('verse').innerHTML=c.verse;
  document.getElementById('scene').textContent=c.scene;
  const m=document.getElementById('main');
  m.innerHTML=`
  <section class="strate">
    <div class="shead"><div class="snum display">Ⅰ</div><h2>${c.s1}</h2><div class="l"></div></div>
    ${c.s1p.map(p=>`<p>${p}</p>`).join("")}
    <div class="mental">${c.mental}</div>
  </section>
  <section class="strate">
    <div class="shead"><div class="snum display">Ⅱ</div><h2>${c.s2}</h2><div class="l"></div></div>
    <h3 class="sub">${c.h1}</h3>
    <p>${c.intro}</p>
    <div class="cards">${c.cards.map(k=>`
      <div class="cardE"><div class="cref">${k[0]}</div><h4>${k[1]}</h4><p>${k[2]}</p><span class="key">${k[3]}</span></div>`).join("")}
    </div>
    <h3 class="sub">${c.h2}</h3>
    ${c.s2b.map(p=>`<p>${p}</p>`).join("")}
    <h3 class="sub">${c.h3}</h3>
    ${c.s2c.map(p=>`<p>${p}</p>`).join("")}
  </section>
  <section class="strate">
    <div class="shead"><div class="snum display">Ⅲ</div><h2>${c.s3}</h2><div class="l"></div></div>
    ${c.deep.map(d=>`<details class="deep"><summary>${d[0]}</summary><div class="body"><p>${d[1]}</p></div></details>`).join("")}
  </section>
  <a class="next" href="#">
    <div class="nlbl">${c.nlbl}</div>
    <h3>${c.ntitle}</h3>
    <p>${c.ntext}</p>
  </a>`;
  document.getElementById('foot').innerHTML=c.foot;
  document.querySelectorAll('.langs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.l===l?'true':'false'));
}
document.querySelectorAll('.langs button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.l)));
render('fr');
</script>
